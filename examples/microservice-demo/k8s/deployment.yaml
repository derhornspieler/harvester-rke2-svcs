apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-demo
  namespace: microservice-demo
  labels:
    app.kubernetes.io/name: microservice-demo
    app.kubernetes.io/instance: microservice-demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: server
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 3
  selector:
    matchLabels:
      app: microservice-demo
  template:
    metadata:
      labels:
        app: microservice-demo
        app.kubernetes.io/name: microservice-demo
    spec:
      serviceAccountName: microservice-demo
      containers:
        - name: app
          image: harbor.CHANGEME_DOMAIN/library/microservice-demo:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - microservice-demo
                topologyKey: kubernetes.io/hostname
      nodeSelector:
        workload-type: general
