apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservice-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.CHANGEME_DOMAIN/your-org/microservice-demo.git
    targetRevision: main
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: microservice-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Validate=true
