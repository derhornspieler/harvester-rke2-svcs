apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: microservice-demo
  namespace: microservice-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: microservice-demo
  template:
    metadata:
      labels:
        app: microservice-demo
    spec:
      containers:
        - name: app
          image: harbor.CHANGEME_DOMAIN/library/microservice-demo:latest
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 50
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: error-rate
        - setWeight: 100
