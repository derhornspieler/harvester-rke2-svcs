stages:
  - build
  - scan
  - deploy

variables:
  REGISTRY: harbor.dev.${DOMAIN}
  HARBOR_PROXY: harbor.${DOMAIN}
  IMAGE_NAME: ${REGISTRY}/library/microservice-demo
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# Build Docker image with Buildah
build:image:
  stage: build
  image: quay.io/buildah/stable:v1.39
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.${DOMAIN}
  variables:
    STORAGE_DRIVER: vfs
    VAULT_ADDR: "https://vault.${DOMAIN}"
  before_script:
    - |
      cat > /etc/containers/registries.conf <<REGISTRIES
      unqualified-search-registries = ["docker.io"]

      [[registry]]
      prefix = "docker.io"
      location = "${HARBOR_PROXY}/docker.io"

      [[registry]]
      prefix = "gcr.io"
      location = "${HARBOR_PROXY}/gcr.io"

      [[registry]]
      prefix = "ghcr.io"
      location = "${HARBOR_PROXY}/ghcr.io"

      [[registry]]
      prefix = "quay.io"
      location = "${HARBOR_PROXY}/quay.io"

      [[registry]]
      prefix = "registry.k8s.io"
      location = "${HARBOR_PROXY}/registry.k8s.io"
      REGISTRIES
    - |
      if [ -f /etc/ssl/certs/vault-root-ca.pem ]; then
        cp /etc/ssl/certs/vault-root-ca.pem /etc/pki/ca-trust/source/anchors/ 2>/dev/null || true
        update-ca-trust 2>/dev/null || true
      fi
    - buildah login -u "${HARBOR_CI_USER}" -p "${HARBOR_CI_PASSWORD}" "${REGISTRY}"
  script:
    - |
      buildah bud --layers \
        -f "$CI_PROJECT_DIR/Dockerfile" \
        -t "$IMAGE_NAME:$IMAGE_TAG" \
        "$CI_PROJECT_DIR"
    - buildah push "$IMAGE_NAME:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Scan image with Trivy
scan:image:
  stage: scan
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: [""]
  script:
    - trivy image --severity HIGH,CRITICAL "$IMAGE_NAME:$IMAGE_TAG"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Deploy to dev via platform-deployments (SSH deploy key from Vault)
# For production projects, use the reusable template instead of inline:
#   include:
#     - project: 'infra_and_platform_services/harvester-rke2-svcs'
#       ref: main
#       file: '/services/gitlab/ci-templates/jobs/deploy.yml'
#   deploy:dev:
#     extends: .deploy:platform-deployments
#     variables:
#       DEPLOY_TEAM: library
#       DEPLOY_APP: microservice-demo
deploy:dev:
  stage: deploy
  image: docker.io/alpine/k8s:1.32.4
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.${DOMAIN}
  variables:
    VAULT_ADDR: "https://vault.${DOMAIN}"
    DEPLOY_TEAM: library
    DEPLOY_APP: microservice-demo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache git openssh-client curl jq
  script:
    - |
      # Auth to Vault
      VAULT_TOKEN=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        --request POST \
        --data "{\"jwt\": \"${VAULT_ID_TOKEN}\", \"role\": \"gitlab-ci\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login" | jq -r '.auth.client_token')

      # Fetch SSH deploy key from Vault
      DEPLOY_KEY=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        -H "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/kv/data/services/ci/platform-deploy-key" | \
        jq -r '.data.data["private_key"] // .data.data["private-key"]')

      if [ -z "${DEPLOY_KEY}" ] || [ "${DEPLOY_KEY}" = "null" ]; then
        echo "ERROR: No deploy key in Vault at kv/services/ci/platform-deploy-key"
        exit 1
      fi

      # Configure SSH
      mkdir -p ~/.ssh
      echo "${DEPLOY_KEY}" > ~/.ssh/deploy_key
      chmod 600 ~/.ssh/deploy_key
      ssh-keyscan "gitlab.${DOMAIN}" >> ~/.ssh/known_hosts 2>/dev/null
      export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

      # Clone platform-deployments (dev branch) via SSH
      git config --global user.name "CI Deploy"
      git config --global user.email "ci@deploy.local"
      git clone --branch dev --depth 1 \
        "git@gitlab.${DOMAIN}:platform/platform-deployments.git" \
        /tmp/deploy

      # Update image tag
      cd "/tmp/deploy/dev/${DEPLOY_TEAM}/${DEPLOY_APP}"
      kustomize edit set image \
        "CHANGEME_IMAGE=${REGISTRY}/${DEPLOY_TEAM}/${DEPLOY_APP}:${CI_COMMIT_SHORT_SHA}"

      # Commit and push
      git add .
      if git diff --cached --quiet; then
        echo "No changes — image tag already up to date"
      else
        git commit -m "deploy: ${DEPLOY_APP} ${CI_COMMIT_SHORT_SHA} to dev"
        git push origin dev
        echo "Deployed to dev — ArgoCD syncs within ~3 minutes"
      fi
