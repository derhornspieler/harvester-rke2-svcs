apiVersion: v1
kind: Service
metadata:
  name: platform-demo
  labels:
    app: platform-demo
spec:
  selector:
    app: platform-demo
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-demo
  labels:
    app: platform-demo
spec:
  selector:
    matchLabels:
      app: platform-demo
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
