# =============================================================================
# GitLab CI — harvester-rke2-svcs
# =============================================================================
# Wiki sync pipeline: keeps docs/ and GitLab wiki in sync bidirectionally.
# Also syncs to GitHub remote on push.
# =============================================================================

stages:
  - lint
  - sync

default:
  tags:
    - shared

# ---------------------------------------------------------------------------
# Lint: yamllint on push
# ---------------------------------------------------------------------------
yamllint:
  stage: lint
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache yamllint
  script:
    - yamllint -c .yamllint.yml . || true
  allow_failure: true

# ---------------------------------------------------------------------------
# Sync: docs/ -> GitLab wiki (on push to main when docs change)
# ---------------------------------------------------------------------------
sync-docs-to-wiki:
  stage: sync
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docs/**/*
  before_script:
    - apk add --no-cache git bash
    - git config --global user.name "Wiki Sync Bot"
    - git config --global user.email "wiki-sync@ci.local"
  script:
    - |
      mkdir -p /tmp/wiki-out
      bash fleet-gitops/scripts/sync-wiki.sh docs-to-wiki --output /tmp/wiki-out
      git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git" /tmp/wiki
      cp /tmp/wiki-out/*.md /tmp/wiki/
      cd /tmp/wiki
      git add -A
      git diff --cached --quiet && echo "No wiki changes" && exit 0
      git commit -m "sync: docs/ -> wiki from ${CI_COMMIT_SHORT_SHA} [skip ci]"
      git push

# ---------------------------------------------------------------------------
# Sync: GitLab wiki -> docs/ (scheduled every 15 min)
# ---------------------------------------------------------------------------
sync-wiki-to-docs:
  stage: sync
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - apk add --no-cache git bash curl
    - git config --global user.name "Wiki Sync Bot"
    - git config --global user.email "wiki-sync@ci.local"
  script:
    - |
      git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git" /tmp/wiki
      mkdir -p /tmp/docs-converted
      bash fleet-gitops/scripts/sync-wiki.sh wiki-to-docs --input /tmp/wiki --output /tmp/docs-converted
      git fetch origin main
      git checkout main
      cp -r /tmp/docs-converted/* docs/
      git add docs/
      git diff --cached --quiet && echo "No wiki edits to sync" && exit 0
      BRANCH="wiki-sync/$(date +%Y%m%d-%H%M%S)"
      git checkout -b "${BRANCH}"
      git commit -m "sync: wiki edits -> docs/"
      git push -u origin "${BRANCH}"
      curl --fail --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"source_branch\":\"${BRANCH}\",\"target_branch\":\"main\",\"title\":\"Wiki sync: edits from GitLab wiki\",\"description\":\"Automated sync of wiki edits back to docs/ directory.\",\"remove_source_branch\":true}" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests"
      echo "MR created for wiki edits"

# ---------------------------------------------------------------------------
# Sync: Sanitized push to GitHub mirror (on push to main)
# ---------------------------------------------------------------------------
# Replaces PII (domain, usernames, org) with generic placeholders and removes
# sensitive files before pushing to the public GitHub mirror.
# Sanitized push to GitHub + CI status verification.
# All credentials fetched from Vault via JWT auth — no GitLab CI variables needed.
# Vault path: kv/services/ci/github-mirror (api-token, mirror-url, mirror-repo, ssh-private-key)
sync-to-github:
  stage: sync
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  variables:
    VAULT_ADDR: "https://vault.${CI_SERVER_HOST}"
  before_script:
    - apk add --no-cache git openssh-client python3 py3-pip curl jq
    - pip install git-filter-repo --break-system-packages 2>/dev/null
    - git config --global user.name "GitLab Mirror"
    - git config --global user.email "mirror@ci.local"
  script:
    - |
      # Authenticate to Vault via GitLab JWT
      VAULT_TOKEN=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        --request POST \
        --data "{\"jwt\": \"${CI_JOB_JWT_V2}\", \"role\": \"gitlab-ci\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/gitlab/login" | \
        jq -r '.auth.client_token')

      if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
        echo "ERROR: Failed to authenticate to Vault"
        exit 1
      fi

      # Fetch GitHub mirror credentials from Vault
      GH_CREDS=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        -H "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/kv/data/services/ci/github-mirror")

      GITHUB_MIRROR_URL=$(echo "${GH_CREDS}" | jq -r '.data.data["mirror-url"]')
      GITHUB_REPO=$(echo "${GH_CREDS}" | jq -r '.data.data["mirror-repo"]')
      GITHUB_API_TOKEN=$(echo "${GH_CREDS}" | jq -r '.data.data["api-token"]')
      GH_SSH_KEY=$(echo "${GH_CREDS}" | jq -r '.data.data["ssh-private-key"]')

      if [ -z "${GITHUB_MIRROR_URL}" ] || [ "${GITHUB_MIRROR_URL}" = "null" ]; then
        echo "ERROR: GitHub mirror credentials not found in Vault (kv/services/ci/github-mirror)"
        exit 1
      fi

      # Set up SSH for GitHub push
      mkdir -p ~/.ssh
      echo "${GH_SSH_KEY}" > ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      WORK_DIR="/tmp/github-sanitize"
      rm -rf "${WORK_DIR}"

      # Clone the full repo
      git clone --branch main "${CI_REPOSITORY_URL}" "${WORK_DIR}"
      cd "${WORK_DIR}"

      # Create PII replacement map
      cat > /tmp/replacements.txt << 'REPLACEMENTS'
      example.com==>example.com
      Example Org==>Example Org
      admin.user==>admin.user
      Platform Admin==>Platform Admin
      dev.user==>dev.user
      Senior Developer==>Senior Developer
      REPLACEMENTS

      # Pass 1: Replace PII in file content + remove sensitive files
      git filter-repo \
        --replace-text /tmp/replacements.txt \
        --path-glob 'fleet-gitops/root-ca.pem' --invert-paths \
        --path-glob 'GIT_LOG.txt' --invert-paths \
        --path-glob 'scripts/github-sanitize.sh' --invert-paths \
        --path-glob '.gitlab-ci.yml' --invert-paths \
        --force

      # Pass 2: Replace PII in commit messages
      git filter-repo \
        --message-callback '
      msg = message
      msg = msg.replace(b"example.com", b"example.com")
      msg = msg.replace(b"Example Org", b"Example Org")
      msg = msg.replace(b"admin.user", b"admin.user")
      msg = msg.replace(b"Platform Admin", b"Platform Admin")
      msg = msg.replace(b"dev.user", b"dev.user")
      msg = msg.replace(b"Senior Developer", b"Senior Developer")
      return msg
      ' --force

      # Force push sanitized history to GitHub
      git remote add github "${GITHUB_MIRROR_URL}"
      git push github main --force --tags
      echo "Sanitized push to GitHub complete"

      # Wait for GitHub Actions CI to trigger and complete
      if [ -z "${GITHUB_API_TOKEN:-}" ]; then
        echo "GITHUB_API_TOKEN not set — skipping CI status check"
        exit 0
      fi

      GH_API="https://api.github.com/repos/${GITHUB_REPO}"
      GH_AUTH="Authorization: token ${GITHUB_API_TOKEN}"

      echo "Waiting for GitHub Actions to start..."
      sleep 15

      # Find the latest workflow run on main
      MAX_WAIT=300
      ELAPSED=0
      RUN_ID=""
      while [ "${ELAPSED}" -lt "${MAX_WAIT}" ]; do
        RUN_ID=$(curl -sf -H "${GH_AUTH}" \
          "${GH_API}/actions/runs?branch=main&per_page=1" | \
          jq -r '.workflow_runs[0].id // empty')

        if [ -n "${RUN_ID}" ]; then
          STATUS=$(curl -sf -H "${GH_AUTH}" \
            "${GH_API}/actions/runs/${RUN_ID}" | \
            jq -r '.status')
          CONCLUSION=$(curl -sf -H "${GH_AUTH}" \
            "${GH_API}/actions/runs/${RUN_ID}" | \
            jq -r '.conclusion // "null"')

          if [ "${STATUS}" = "completed" ]; then
            break
          fi
          echo "GitHub CI: ${STATUS} (${ELAPSED}/${MAX_WAIT}s)..."
        fi

        sleep 15
        ELAPSED=$((ELAPSED + 15))
      done

      if [ -z "${RUN_ID}" ]; then
        echo "WARNING: Could not find GitHub Actions run"
        exit 1
      fi

      if [ "${CONCLUSION}" = "success" ]; then
        echo "GitHub CI passed (run ${RUN_ID})"
      elif [ "${CONCLUSION}" = "null" ] || [ "${STATUS}" != "completed" ]; then
        echo "WARNING: GitHub CI did not complete within ${MAX_WAIT}s (status: ${STATUS})"
        exit 1
      else
        echo "ERROR: GitHub CI failed (run ${RUN_ID}, conclusion: ${CONCLUSION})"
        echo "See: https://github.com/${GITHUB_REPO}/actions/runs/${RUN_ID}"
        exit 1
      fi
