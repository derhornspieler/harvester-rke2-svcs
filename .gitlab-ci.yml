# =============================================================================
# GitLab CI — harvester-rke2-svcs
# =============================================================================
# Wiki sync pipeline: keeps docs/ and GitLab wiki in sync bidirectionally.
# Also syncs to GitHub remote on push.
# =============================================================================

stages:
  - lint
  - sync

# ---------------------------------------------------------------------------
# Lint: yamllint on push
# ---------------------------------------------------------------------------
yamllint:
  stage: lint
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache yamllint
  script:
    - yamllint -c .yamllint.yml . || true
  allow_failure: true

# ---------------------------------------------------------------------------
# Sync: docs/ -> GitLab wiki (on push to main when docs change)
# ---------------------------------------------------------------------------
sync-docs-to-wiki:
  stage: sync
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docs/**/*
  before_script:
    - apk add --no-cache git bash
    - git config --global user.name "Wiki Sync Bot"
    - git config --global user.email "wiki-sync@${CI_SERVER_HOST}"
  script:
    - mkdir -p /tmp/wiki-out
    - bash fleet-gitops/scripts/sync-wiki.sh docs-to-wiki --output /tmp/wiki-out
    # Clone wiki using CI job token
    - git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git" /tmp/wiki
    - cp /tmp/wiki-out/*.md /tmp/wiki/
    - cd /tmp/wiki
    - git add -A
    - git diff --cached --quiet && echo "No wiki changes" && exit 0
    - git commit -m "sync: docs/ -> wiki from ${CI_COMMIT_SHORT_SHA} [skip ci]"
    - git push

# ---------------------------------------------------------------------------
# Sync: GitLab wiki -> docs/ (scheduled every 15 min)
# ---------------------------------------------------------------------------
sync-wiki-to-docs:
  stage: sync
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - apk add --no-cache git bash
    - git config --global user.name "Wiki Sync Bot"
    - git config --global user.email "wiki-sync@${CI_SERVER_HOST}"
  script:
    # Clone wiki
    - git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git" /tmp/wiki
    # Convert wiki to docs format into a temp directory
    - mkdir -p /tmp/docs-converted
    - bash fleet-gitops/scripts/sync-wiki.sh wiki-to-docs --input /tmp/wiki --output /tmp/docs-converted
    # Check out the repo and compare
    - git fetch origin main
    - git checkout main
    - cp -r /tmp/docs-converted/* docs/
    - git add docs/
    - git diff --cached --quiet && echo "No wiki edits to sync" && exit 0
    # Changes detected — create MR
    - BRANCH="wiki-sync/$(date +%Y%m%d-%H%M%S)"
    - git checkout -b "$BRANCH"
    - git commit -m "sync: wiki edits -> docs/"
    - git push -u origin "$BRANCH"
    - apk add --no-cache curl
    - |
      curl --fail --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"source_branch\":\"${BRANCH}\",\"target_branch\":\"main\",\"title\":\"Wiki sync: edits from GitLab wiki\",\"description\":\"Automated sync of wiki edits back to docs/ directory.\",\"remove_source_branch\":true}" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests"
    - echo "MR created for wiki edits"

# ---------------------------------------------------------------------------
# Sync: Sanitized push to GitHub mirror (on push to main)
# ---------------------------------------------------------------------------
# Replaces PII (domain, usernames, org) with generic placeholders and removes
# sensitive files before pushing to the public GitHub mirror.
# Requires CI variables: GITHUB_SSH_PRIVATE_KEY, GITHUB_MIRROR_URL
sync-to-github:
  stage: sync
  image: docker.io/alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  before_script:
    - apk add --no-cache git openssh-client python3 py3-pip
    - pip install git-filter-repo --break-system-packages 2>/dev/null
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
    - git config --global user.name "GitLab Mirror"
    - git config --global user.email "mirror@ci.local"
  script:
    - |
      WORK_DIR="/tmp/github-sanitize"
      rm -rf "${WORK_DIR}"

      # Clone the full repo
      git clone --branch main "${CI_REPOSITORY_URL}" "${WORK_DIR}"
      cd "${WORK_DIR}"

      # Create PII replacement map
      cat > /tmp/replacements.txt << 'REPLACEMENTS'
      example.com==>example.com
      Example Org==>Example Org
      admin.user==>admin.user
      Platform Admin==>Platform Admin
      dev.user==>dev.user
      Senior Developer==>Senior Developer
      REPLACEMENTS

      # Pass 1: Replace PII in file content + remove sensitive files
      git filter-repo \
        --replace-text /tmp/replacements.txt \
        --path-glob 'fleet-gitops/root-ca.pem' --invert-paths \
        --path-glob 'GIT_LOG.txt' --invert-paths \
        --path-glob 'scripts/github-sanitize.sh' --invert-paths \
        --path-glob '.gitlab-ci.yml' --invert-paths \
        --force

      # Pass 2: Replace PII in commit messages
      git filter-repo \
        --message-callback '
      msg = message
      msg = msg.replace(b"example.com", b"example.com")
      msg = msg.replace(b"Example Org", b"Example Org")
      msg = msg.replace(b"admin.user", b"admin.user")
      msg = msg.replace(b"Platform Admin", b"Platform Admin")
      msg = msg.replace(b"dev.user", b"dev.user")
      msg = msg.replace(b"Senior Developer", b"Senior Developer")
      return msg
      ' --force

      # Force push sanitized history to GitHub
      git remote add github "${GITHUB_MIRROR_URL}"
      git push github main --force --tags
  allow_failure: true
