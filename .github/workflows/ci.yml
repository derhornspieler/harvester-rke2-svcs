name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: ShellCheck
        run: |
          find . -name '*.sh' -not -path './.git/*' | xargs shellcheck --severity=warning

      - name: yamllint
        run: |
          find services/ -name '*.yaml' -not -name '*dashboard*' | xargs yamllint -d relaxed

      - name: Kustomize build (Vault)
        run: kustomize build services/vault/

      - name: Kustomize build (cert-manager)
        run: kustomize build services/cert-manager/

      - name: Kustomize build (external-secrets)
        run: kustomize build services/external-secrets/
