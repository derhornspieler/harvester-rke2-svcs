apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-dashboard
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: traefik.CHANGEME_DOMAIN
      tls:
        mode: Terminate
        certificateRefs:
          - name: traefik-CHANGEME_DOMAIN_DASHED-tls
      allowedRoutes:
        namespaces:
          from: Same
