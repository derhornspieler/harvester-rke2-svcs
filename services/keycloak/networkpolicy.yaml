apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-ingress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik ingress controller (runs in kube-system as RKE2 DaemonSet)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rke2-traefik
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus scraping metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9000
    # Intra-namespace communication (Keycloak <-> oauth2-proxy)
    - from:
        - podSelector: {}
    # OIDC clients (Grafana, ArgoCD, GitLab, Harbor, Argo Workflows, Argo Rollouts, Hubble)
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - monitoring
                  - argocd
                  - gitlab
                  - harbor
                  - argo-workflows
                  - argo-rollouts
                  - kube-system
      ports:
        - protocol: TCP
          port: 8080
