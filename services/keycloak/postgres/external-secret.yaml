apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-pg-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: keycloak-pg-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: services/database/keycloak-pg
        property: username
    - secretKey: password
      remoteRef:
        key: services/database/keycloak-pg
        property: password
