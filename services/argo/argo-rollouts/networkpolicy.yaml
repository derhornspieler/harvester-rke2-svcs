apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: argo-rollouts
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argo-rollouts-ingress
  namespace: argo-rollouts
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik ingress controller (runs in kube-system as RKE2 DaemonSet)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rke2-traefik
      ports:
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 4180
    # Prometheus scraping metrics (rollouts controller + oauth2-proxy)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8090
        - protocol: TCP
          port: 44180
    # Intra-namespace communication
    - from:
        - podSelector: {}
