apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-redis-credentials
  namespace: argo-rollouts
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: oauth2-proxy-redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: services/argo-rollouts/oauth2-proxy-redis
        property: password
