apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-
    # Existing cluster configuration — MUST be preserved
    externalIPs:
      enabled: true
    gatewayAPI:
      enabled: true
    k8sClientRateLimit:
      burst: 50
      qps: 25
    k8sServiceHost: "127.0.0.1"
    k8sServicePort: 6443
    kubeProxyReplacement: true
    l2announcements:
      enabled: true
    operator:
      replicas: 1
    prometheus:
      enabled: true

    # Hubble observability — new configuration
    hubble:
      enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_namespace,source_workload,destination_namespace,destination_workload,traffic_direction"
        serviceMonitor:
          enabled: false
      export:
        static:
          enabled: true
          content:
            flowLogs:
              - filePath: "/var/run/cilium/hubble/events.log"
                fieldMask:
                  - time
                  - source
                  - destination
                  - verdict
                  - drop_reason
                  - ethernet
                  - IP
                  - l4
                  - l7
                  - Type
      relay:
        enabled: true
        replicas: 2
        nodeSelector:
          workload-type: general
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: k8s-app
                        operator: In
                        values:
                          - hubble-relay
                  topologyKey: kubernetes.io/hostname
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
      ui:
        enabled: true
        replicas: 1
        nodeSelector:
          workload-type: general
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
