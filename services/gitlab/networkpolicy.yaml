apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: gitlab
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-ingress
  namespace: gitlab
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik ingress controller (runs in kube-system as RKE2 DaemonSet)
    # 8181=workhorse, 8080=webservice/shell, 2222=gitlab-shell SSH
    # 8150=KAS (k8s agent), 9000=MinIO (object storage)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rke2-traefik
      ports:
        - protocol: TCP
          port: 8181
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 2222
        - protocol: TCP
          port: 8150
        - protocol: TCP
          port: 9000
    # Prometheus scraping metrics (redis-exporter 9121, gitlab-exporter 9168, sidekiq 3807)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9121
        - protocol: TCP
          port: 9168
        - protocol: TCP
          port: 3807
    # Intra-namespace communication (webservice <-> gitaly, workhorse, sidekiq, etc.)
    - from:
        - podSelector: {}
