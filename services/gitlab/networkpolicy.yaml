apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: gitlab
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-ingress
  namespace: gitlab
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik ingress controller (webservice, shell, registry)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8181
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    # Prometheus scraping metrics (redis-exporter, gitlab-exporter)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9121
        - protocol: TCP
          port: 9168
    # Intra-namespace communication (webservice <-> gitaly, workhorse, sidekiq, etc.)
    - from:
        - podSelector: {}
