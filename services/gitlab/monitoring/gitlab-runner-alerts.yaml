apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gitlab-runner-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: gitlab-runner-alerts
      rules:
        - alert: GitLabRunnerDown
          expr: |
            sum(kube_deployment_status_replicas_ready{namespace="gitlab-runners", deployment=~".*runner.*"}) == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "All GitLab Runners are down"
            description: "No GitLab Runner pods are ready in the gitlab-runners namespace for more than 10 minutes."

        - alert: GitLabRunnerHighFailureRate
          expr: |
            (
              sum(rate(gitlab_runner_jobs{state="failed", namespace="gitlab-runners"}[10m]))
              /
              clamp_min(sum(rate(gitlab_runner_jobs{namespace="gitlab-runners"}[10m])), 1)
            ) * 100 > 30
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "GitLab Runner failure rate is high"
            description: 'GitLab Runner failure rate is {{ $value | printf "%.1f" }}% over the last 30 minutes.'

        - alert: GitLabRunnerQueueBacklog
          expr: |
            sum(gitlab_runner_jobs{state="pending", namespace="gitlab-runners"}) > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "GitLab Runner queue backlog"
            description: "More than 10 jobs have been pending in the gitlab-runners queue for over 15 minutes."
