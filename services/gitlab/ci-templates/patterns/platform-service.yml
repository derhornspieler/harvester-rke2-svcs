# Platform service pipeline pattern
#
# Complete build-test-scan-deploy pipeline for GitOps-managed services.
# Includes ESO self-service provisioning and Blue/Green rollout support.
#
# Required CI/CD variables:
#   Harbor credentials are fetched from Vault at runtime (no CI variables needed)
#   ESO_NAMESPACE — namespace for ESO provisioning (project-level)
#   ESO_VAULT_PATHS — Vault KV paths for ESO (project-level)
#   DEPLOY_REPO — GitLab path for deploy repo (project-level)
#
# Usage in .gitlab-ci.yml:
#   include:
#     - project: 'platform_services/gitlab-ci-templates'
#       file:
#         - '/stages.yml'
#         - '/patterns/platform-service.yml'

include:
  - local: '/base.yml'
  - local: '/jobs/eso-provision.yml'
  - local: '/jobs/lint.yml'
  - local: '/jobs/build.yml'
  - local: '/jobs/test.yml'
  - local: '/jobs/scan.yml'
  - local: '/jobs/deploy.yml'
  - local: '/jobs/rollout.yml'
  - local: '/jobs/promote.yml'

variables:
  DEPLOY_BRANCH: deploy

eso-provision:
  extends: .provision:eso

secret-detection:
  extends: .scan:gitleaks

hadolint:
  extends: .lint:hadolint

build:
  extends: .build:kaniko

image-scan:
  extends: .scan:trivy-image
  needs:
    - build

sbom:
  extends: .scan:sbom
  needs:
    - build

deploy:
  extends: .deploy:blue-green
  needs:
    - build
    - image-scan

promote-production:
  extends: .promote:tag-image
  needs:
    - deploy
    - image-scan
