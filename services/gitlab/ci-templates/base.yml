# Base CI/CD Template — shared by all platform pipelines
# Include: project: 'platform_services/gitlab-ci-templates', file: '/base.yml'

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  HARBOR_REGISTRY: harbor.dev.${DOMAIN}
  IMAGE_NAME: ${HARBOR_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  IMAGE_FULL: ${IMAGE_NAME}:${IMAGE_TAG}
  VAULT_ADDR: https://vault.${DOMAIN}
  # Airgap mode — overridden by group-level CI/CD variables when AIRGAPPED=true
  CI_AIRGAPPED: "false"
  CI_GOPROXY: ""
  CI_GONOSUMDB: ""
  CI_NPM_REGISTRY: ""
  CI_PIP_INDEX_URL: ""
  CI_PIP_TRUSTED_HOST: ""

default:
  tags:
    - kubernetes

.vault_jwt_auth: &vault_jwt_auth
  before_script:
    - |
      export VAULT_TOKEN=$(vault write -field=token auth/jwt/gitlab/login \
        role="${VAULT_ROLE:-gitlab-ci}" \
        jwt="${CI_JOB_JWT_V2}")

# Fetch Harbor robot credentials from Vault via JWT auth.
# Sets HARBOR_CI_USER and HARBOR_CI_PASSWORD for use in build/push jobs.
# Requires: vault CLI or curl + jq available in the job image.
.harbor_auth:
  before_script:
    - |
      # Authenticate to Vault via GitLab JWT
      VAULT_TOKEN=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        --request POST \
        --data "{\"jwt\": \"${CI_JOB_JWT_V2}\", \"role\": \"gitlab-ci\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/gitlab/login" | \
        sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')
      if [ -z "${VAULT_TOKEN}" ]; then
        echo "ERROR: Failed to authenticate to Vault"
        exit 1
      fi
      # Fetch Harbor robot credentials
      HARBOR_CREDS=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        -H "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/kv/data/services/harbor/ci-robot")
      export HARBOR_CI_USER=$(echo "${HARBOR_CREDS}" | sed -n 's/.*"username":"\([^"]*\)".*/\1/p')
      export HARBOR_CI_PASSWORD=$(echo "${HARBOR_CREDS}" | sed -n 's/.*"password":"\([^"]*\)".*/\1/p')
      if [ -z "${HARBOR_CI_USER}" ] || [ -z "${HARBOR_CI_PASSWORD}" ]; then
        echo "ERROR: Failed to fetch Harbor credentials from Vault"
        exit 1
      fi
      echo "Harbor credentials loaded from Vault (user: ${HARBOR_CI_USER})"
