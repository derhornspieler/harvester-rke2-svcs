# Lint job templates

.lint:hadolint:
  stage: lint
  image: hadolint/hadolint:v2.12.0-alpine
  script:
    - hadolint ${DOCKERFILE:-Dockerfile}
  rules:
    - exists:
        - Dockerfile
        - "*.Dockerfile"

.lint:yamllint:
  stage: lint
  image: cytopia/yamllint:0.14
  script:
    - yamllint -c .yamllint.yml . || yamllint .
  rules:
    - exists:
        - "*.yaml"
        - "*.yml"
  allow_failure: true

.lint:shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - find . -name '*.sh' -exec shellcheck {} +
  rules:
    - exists:
        - "*.sh"
  allow_failure: true
