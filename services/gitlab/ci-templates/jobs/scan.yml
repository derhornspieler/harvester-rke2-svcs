# Security scanning templates

.scan:gitleaks:
  stage: pre-check
  image:
    name: zricethezav/gitleaks:v8.30.1
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose --redact
  rules:
    - if: '$CI_COMMIT_BRANCH'
  allow_failure: false

.scan:semgrep:
  stage: scan
  image: semgrep/semgrep:1.156.0
  variables:
    SEMGREP_RULES: "auto"
  script:
    - semgrep ci --json --output=semgrep-results.json || true
    - semgrep ci
  artifacts:
    paths:
      - semgrep-results.json
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH'
  allow_failure: true

.scan:trivy-fs:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --format table .
  rules:
    - if: '$CI_COMMIT_BRANCH'

.scan:trivy-image:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    # Fetch Harbor credentials from Vault
    - |
      VAULT_RESP=$(wget -qO- --no-check-certificate \
        --header="Content-Type: application/json" \
        --post-data="{\"jwt\": \"${VAULT_ID_TOKEN}\", \"role\": \"gitlab-ci\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login" 2>/dev/null || echo "")
      VAULT_TOKEN=$(echo "${VAULT_RESP}" | sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')
      HARBOR_CREDS=$(wget -qO- --no-check-certificate \
        --header="X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/kv/data/services/harbor/ci-robot" 2>/dev/null || echo "")
      export TRIVY_USERNAME=$(echo "${HARBOR_CREDS}" | sed -n 's/.*"username":"\([^"]*\)".*/\1/p')
      export TRIVY_PASSWORD=$(echo "${HARBOR_CREDS}" | sed -n 's/.*"password":"\([^"]*\)".*/\1/p')
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --format table "${IMAGE_FULL}"
  rules:
    - if: '$CI_COMMIT_BRANCH'

.scan:sbom:
  stage: scan
  image:
    name: anchore/syft:v1.42.3
    entrypoint: [""]
  script:
    - syft "${IMAGE_FULL}" -o spdx-json=sbom.spdx.json
  artifacts:
    paths:
      - sbom.spdx.json
  rules:
    - if: '$CI_COMMIT_BRANCH'

.scan:license:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy fs --scanners license --severity HIGH,CRITICAL --exit-code 1 .
  allow_failure: true
