# Security scanning templates

.scan:gitleaks:
  stage: pre-check
  image:
    name: zricethezav/gitleaks:v8.30.0
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose --redact
  rules:
    - if: '$CI_COMMIT_BRANCH'
  allow_failure: false

.scan:semgrep:
  stage: scan
  image: semgrep/semgrep:1.153.1
  variables:
    SEMGREP_RULES: "auto"
  script:
    - semgrep ci --json --output=semgrep-results.json || true
    - semgrep ci
  artifacts:
    paths:
      - semgrep-results.json
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH'
  allow_failure: true

.scan:trivy-fs:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --format table .
  rules:
    - if: '$CI_COMMIT_BRANCH'

.scan:trivy-image:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: ${HARBOR_CI_USER}
    TRIVY_PASSWORD: ${HARBOR_CI_PASSWORD}
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --format table "${IMAGE_FULL}"
  rules:
    - if: '$CI_COMMIT_BRANCH'

.scan:sbom:
  stage: scan
  image:
    name: anchore/syft:v1.38.0
    entrypoint: [""]
  script:
    - syft "${IMAGE_FULL}" -o spdx-json=sbom.spdx.json
  artifacts:
    paths:
      - sbom.spdx.json
  rules:
    - if: '$CI_COMMIT_BRANCH'

.scan:license:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy fs --scanners license --severity HIGH,CRITICAL --exit-code 1 .
  allow_failure: true
