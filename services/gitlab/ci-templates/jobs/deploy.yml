# Deployment templates — platform-deployments GitOps push
#
# MinimalCD pattern: push image tag updates to platform/platform-deployments.
# ArgoCD watches the repo and auto-syncs within ~3 minutes.
#
# Authentication: SSH deploy key fetched from Vault via GitLab JWT auth.
# The key is seeded by gitlab-admin-setup and stored at
# kv/services/ci/platform-deploy-key (private_key field).
#
# Required variables (set by project or include):
#   DEPLOY_TEAM  — team/group directory in platform-deployments (e.g. forge)
#   DEPLOY_APP   — application directory (e.g. forge-core)
#
# Usage:
#   deploy:dev:
#     extends: .deploy:platform-deployments
#     variables:
#       DEPLOY_TEAM: forge
#       DEPLOY_APP: forge-core

# --- Hidden helper: fetch SSH deploy key from Vault ---
.deploy:vault-ssh-setup:
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.${DOMAIN}
  variables:
    VAULT_ADDR: "https://vault.${DOMAIN}"
  before_script:
    - apk add --no-cache git openssh-client curl jq
    - |
      # Authenticate to Vault via JWT
      VAULT_TOKEN=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        --request POST \
        --data "{\"jwt\": \"${VAULT_ID_TOKEN}\", \"role\": \"gitlab-ci\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login" | jq -r '.auth.client_token')

      if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
        echo "ERROR: Vault JWT auth failed"
        exit 1
      fi

      # Fetch SSH deploy key
      DEPLOY_KEY=$(curl -sf --cacert /etc/ssl/certs/vault-root-ca.pem \
        -H "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/kv/data/services/ci/platform-deploy-key" | \
        jq -r '.data.data["private_key"] // .data.data["private-key"]')

      if [ -z "${DEPLOY_KEY}" ] || [ "${DEPLOY_KEY}" = "null" ]; then
        echo "ERROR: No deploy key in Vault at kv/services/ci/platform-deploy-key"
        exit 1
      fi

      # Configure SSH
      mkdir -p ~/.ssh
      echo "${DEPLOY_KEY}" > ~/.ssh/deploy_key
      chmod 600 ~/.ssh/deploy_key
      ssh-keyscan "gitlab.${DOMAIN}" >> ~/.ssh/known_hosts 2>/dev/null
      export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
      git config --global user.name "CI Deploy"
      git config --global user.email "ci@deploy.local"

# --- Deploy to dev: auto-push image tag to platform-deployments ---
.deploy:platform-deployments:
  stage: deploy-staging
  image: ${IMAGE_ALPINE_K8S:-docker.io/alpine/k8s:1.32.4}
  extends: .deploy:vault-ssh-setup
  variables:
    DEPLOY_TEAM: ""
    DEPLOY_APP: ""
    DEPLOY_ENV: dev
    DEPLOY_BRANCH: dev
    REGISTRY: "harbor.dev.${DOMAIN}"
  script:
    - |
      if [ -z "${DEPLOY_TEAM}" ] || [ -z "${DEPLOY_APP}" ]; then
        echo "ERROR: DEPLOY_TEAM and DEPLOY_APP must be set"
        exit 1
      fi

      # Clone platform-deployments
      git clone --branch "${DEPLOY_BRANCH}" --depth 1 \
        "git@gitlab.${DOMAIN}:platform/platform-deployments.git" \
        /tmp/deploy

      # Update image tag in kustomization
      cd "/tmp/deploy/${DEPLOY_ENV}/${DEPLOY_TEAM}/${DEPLOY_APP}"
      kustomize edit set image \
        "CHANGEME_IMAGE=${REGISTRY}/${DEPLOY_TEAM}/${DEPLOY_APP}:${CI_COMMIT_SHORT_SHA}"

      # Commit and push
      git add .
      if git diff --cached --quiet; then
        echo "No changes — image tag already up to date"
      else
        git commit -m "deploy: ${DEPLOY_APP} ${CI_COMMIT_SHORT_SHA} to ${DEPLOY_ENV}"
        git push origin "${DEPLOY_BRANCH}"
        echo "Deployed to ${DEPLOY_ENV} — ArgoCD syncs within ~3 minutes"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- Promote to staged: create MR from dev to staged ---
.deploy:promote-staged:
  stage: deploy-staging
  image: ${IMAGE_ALPINE_K8S:-docker.io/alpine/k8s:1.32.4}
  extends: .deploy:vault-ssh-setup
  variables:
    DEPLOY_TEAM: ""
    DEPLOY_APP: ""
  script:
    - |
      apk add --no-cache python3

      # Clone and create MR branch
      git clone --branch dev --depth 50 \
        "git@gitlab.${DOMAIN}:platform/platform-deployments.git" \
        /tmp/deploy
      cd /tmp/deploy

      # Cherry-pick the latest deploy commit to a promote branch
      PROMOTE_BRANCH="promote/${DEPLOY_APP}-staged-$(date +%Y%m%d%H%M%S)"
      git checkout -b "${PROMOTE_BRANCH}" origin/staged
      git checkout dev -- "staged/${DEPLOY_TEAM}/${DEPLOY_APP}/" 2>/dev/null || \
        git checkout dev -- "dev/${DEPLOY_TEAM}/${DEPLOY_APP}/"
      git add .
      git commit -m "promote: ${DEPLOY_APP} to staged" || { echo "No changes to promote"; exit 0; }
      git push origin "${PROMOTE_BRANCH}"

      echo "Branch ${PROMOTE_BRANCH} pushed — create MR in GitLab UI"
      echo "https://gitlab.${DOMAIN}/platform/platform-deployments/-/merge_requests/new?merge_request[source_branch]=${PROMOTE_BRANCH}&merge_request[target_branch]=staged"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true

# --- Promote to prod: create MR from staged to prod ---
.deploy:promote-prod:
  stage: deploy-production
  image: ${IMAGE_ALPINE_K8S:-docker.io/alpine/k8s:1.32.4}
  extends: .deploy:vault-ssh-setup
  variables:
    DEPLOY_TEAM: ""
    DEPLOY_APP: ""
  script:
    - |
      apk add --no-cache python3

      git clone --branch staged --depth 50 \
        "git@gitlab.${DOMAIN}:platform/platform-deployments.git" \
        /tmp/deploy
      cd /tmp/deploy

      PROMOTE_BRANCH="promote/${DEPLOY_APP}-prod-$(date +%Y%m%d%H%M%S)"
      git checkout -b "${PROMOTE_BRANCH}" origin/prod
      git checkout staged -- "prod/${DEPLOY_TEAM}/${DEPLOY_APP}/" 2>/dev/null || \
        git checkout staged -- "staged/${DEPLOY_TEAM}/${DEPLOY_APP}/"
      git add .
      git commit -m "promote: ${DEPLOY_APP} to prod" || { echo "No changes to promote"; exit 0; }
      git push origin "${PROMOTE_BRANCH}"

      echo "Branch ${PROMOTE_BRANCH} pushed — create MR in GitLab UI"
      echo "https://gitlab.${DOMAIN}/platform/platform-deployments/-/merge_requests/new?merge_request[source_branch]=${PROMOTE_BRANCH}&merge_request[target_branch]=prod"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
