apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-oidc-secret
  namespace: gitlab
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: provider
      remoteRef:
        key: services/gitlab/oidc-secret
        property: provider
