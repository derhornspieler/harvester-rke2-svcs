apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  # Ingress / networking
  - gateway.yaml
  - tcproute-ssh.yaml
  # PostgreSQL CNPG
  - cloudnativepg-cluster.yaml
  - cloudnativepg-scheduled-backup.yaml
  # Redis Sentinel
  - redis/replication.yaml
  - redis/sentinel.yaml
  - redis/external-secret.yaml
  # External secrets (Gitaly, Praefect, OIDC, root password)
  - gitaly/external-secret.yaml
  - praefect/external-secret-dbsecret.yaml
  - praefect/external-secret-token.yaml
  - oidc/external-secret.yaml
  - root/external-secret.yaml
  # Volume autoscalers (PVC expansion)
  - volume-autoscalers.yaml
  # Monitoring
  - networkpolicy.yaml
  - monitoring/
