## GitLab Helm Chart — RKE2-Prod Cluster Values (Medium Production)
##
## Cluster: rke2-prod (Harvester/RKE2 v1.34.2, Cilium CNI, Traefik v3.5.4)
## Workers:
##   - general  (workload-type=general):  4 vCPU,  8 GiB, 100Gi, autoscale 2-10
##   - compute  (workload-type=compute):  8 vCPU, 32 GiB, 200Gi, autoscale 2-10
##   - database (workload-type=database): 4 vCPU, 16 GiB, 200Gi, fixed 3 nodes
##
## Node scheduling strategy:
##   - Lightweight (shell, kas, exporter, toolbox, registry, minio)  → general
##   - Heavy       (webservice, sidekiq, gitaly, praefect)           → compute
##   - Stateful    (CNPG PostgreSQL, OpsTree Redis)                  → database
##
## TLS: cert-manager with vault-issuer ClusterIssuer (already deployed)
## Storage class: harvester (Harvester CSI, default)
## Ingress: Gateway API (Traefik as GatewayClass) — NOT standard Ingress
## Redis: OpsTree Redis Operator (RedisReplication + RedisSentinel CRs)
## PostgreSQL: CloudNativePG operator (Cluster CR in services/gitlab/cloudnativepg-cluster.yaml)
##
## Deploy with:
##   ./scripts/setup-gitlab.sh
## ──────────────────────────────────────────────────────────────────────────────

global:
  edition: ee

  ## ── MinIO — using shared MinIO from minio namespace (Bundle 2) ────────────
  ## Shared MinIO serves Harbor, GitLab, and CNPG backups.
  ## Dedicated user: gitlab-minio-admin (readwrite policy)
  minio:
    enabled: false

  ## ── Hostnames ──────────────────────────────────────────────────────────────
  hosts:
    domain: CHANGEME_DOMAIN
    https: true

  ## ── Gateway API (Traefik) ─────────────────────────────────────────────────
  ## Uses Gateway API instead of standard Ingress. Our own Gateway is defined
  ## in services/gitlab/gateway.yaml — the chart creates HTTPRoutes that
  ## reference it via gatewayRef.
  ingress:
    enabled: false
  gatewayApi:
    enabled: true
    installEnvoy: false          # We use Traefik, not Envoy
    configureCertmanager: false   # We use vault-issuer, not ACME
    gatewayRef:
      name: gitlab
      namespace: gitlab

  ## ── External PostgreSQL (CloudNativePG) ────────────────────────────────────
  ## Primary (read-write): CNPG -rw service targets only the current primary.
  ## Read replicas: CNPG -ro service load-balances across standby replicas.
  ## GitLab Rails routes SELECT queries to replicas via load_balancing.hosts,
  ## reducing primary load and improving read-heavy workload performance.
  psql:
    host: gitlab-pg-pooler-rw.database.svc.cluster.local
    port: 5432
    username: gitlab
    database: gitlabhq_production
    preparedStatements: false
    applicationName: gitlab-rke2-prod
    password:
      useSecret: true
      secret: gitlab-postgresql-app
      key: password
    connectTimeout: 10
    keepalives: 1
    keepalivesIdle: 30
    keepalivesInterval: 10
    keepalivesCount: 3
    tcpUserTimeout: 60000
    ## ── Read-Replica Load Balancing ──────────────────────────────────────────
    ## PgBouncer pooler-ro distributes connections across standby replicas.
    ## Rails checks replication lag and falls back to primary if replicas
    ## are too far behind (default: 8MB difference or 60s lag).
    load_balancing:
      hosts:
        - gitlab-pg-pooler-ro.database.svc.cluster.local

  ## ── External Redis (OpsTree Sentinel HA) ──────────────────────────────────
  ## Sentinel-aware: GitLab discovers the current primary via Sentinel.
  ## "host" is the Sentinel master name, NOT a hostname.
  ## Uses the ClusterIP service created by OpsTree Redis Operator — it
  ## load-balances across all sentinel pods, so a single entry suffices.
  redis:
    host: mymaster
    port: 6379
    auth:
      enabled: true
      secret: gitlab-redis-credentials
      key: password
    sentinels:
      - host: gitlab-redis-sentinel.gitlab.svc.cluster.local
        port: 26379

  ## ── Gitaly ─────────────────────────────────────────────────────────────────
  ## Praefect manages virtual storages and Gitaly routing
  gitaly:
    enabled: true
    authToken:
      secret: gitlab-gitaly-secret
      key: token

  ## ── Praefect (Gitaly HA) ──────────────────────────────────────────────────
  ## Praefect sits in front of Gitaly, providing replication, load balancing,
  ## and automatic failover across 3 Gitaly replicas.
  praefect:
    enabled: true
    replaceInternalGitaly: true
    autoMigrate: true
    dbSecret:
      secret: gitlab-praefect-dbsecret
      key: secret
    virtualStorages:
      - name: default
        gitalyReplicas: 3
        maxUnavailable: 1
    psql:
      host: gitlab-pg-pooler-rw.database.svc.cluster.local
      port: 5432
      user: praefect
      dbName: praefect
      sslMode: disable

  ## ── Monitoring ─────────────────────────────────────────────────────────────
  ## kube-prometheus-stack (Phase 3) provides Prometheus Operator CRDs.
  ## Chart creates ServiceMonitors for all GitLab components.
  monitoring:
    enabled: true

  shell:
    port: 22

  time_zone: UTC

  ## ── Default node selector ──────────────────────────────────────────────────
  ## Most components land on general workers by default.
  ## Heavy components override this below.
  nodeSelector:
    workload-type: general

  ## ── OIDC (Keycloak) ───────────────────────────────────────────────────────
  appConfig:
    omniauth:
      enabled: true
      allowSingleSignOn: ['openid_connect']
      blockAutoCreatedUsers: false
      autoLinkUser: ['openid_connect']
      providers:
        - secret: gitlab-oidc-secret
          key: provider

    ## ── Object Storage (shared MinIO in minio namespace) ───────────────────
    ## All GitLab object types use the consolidated object_store config.
    ## Endpoint: minio.minio.svc.cluster.local:9000 (HTTP, not HTTPS)
    object_store:
      enabled: true
      proxy_download: true
      connection:
        secret: gitlab-minio-storage
        key: connection
    lfs:
      bucket: gitlab-lfs
    artifacts:
      bucket: gitlab-artifacts
    uploads:
      bucket: gitlab-uploads
    packages:
      bucket: gitlab-packages
    externalDiffs:
      bucket: gitlab-mr-diffs
    terraformState:
      bucket: gitlab-terraform
    ciSecureFiles:
      bucket: gitlab-ci-secure-files
    dependencyProxy:
      bucket: gitlab-dependency-proxy

  ## ── Root CA Trust (Vault CA) ──────────────────────────────────────────────
  certificates:
    customCAs:
      - secret: gitlab-root-ca

## ── Disable bundled services (using external) ────────────────────────────────
postgresql:
  install: false
redis:
  install: false
prometheus:
  install: false
gitlab-runner:
  install: false

## ── cert-manager — already installed, do not reinstall via chart ─────────────
installCertmanager: false

## ── cert-manager issuer ──────────────────────────────────────────────────────
## Not used — vault-issuer ClusterIssuer handles TLS via Gateway annotations
certmanager-issuer:
  email: admin@CHANGEME_DOMAIN

## ── Disable bundled NGINX ingress (using Traefik) ────────────────────────────
nginx-ingress:
  enabled: false

## ── Traefik subchart — do NOT install (already running as RKE2 DaemonSet) ───
traefik:
  install: false

## ── Container Registry — DISABLED (Harbor is the platform registry) ─────────
registry:
  enabled: false

## ── GitLab Sub-Charts ────────────────────────────────────────────────────────
gitlab:

  ## ── Webservice (Rails + Workhorse) → COMPUTE nodes ────────────────────────
  ## Medium production: handles concurrent users, API traffic, web UI.
  webservice:
    replicaCount: 2
    minReplicas: 2
    maxReplicas: 10
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: "1"
        memory: 2.5Gi
    workhorse:
      resources:
        requests:
          cpu: 200m
          memory: 200Mi
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: "10%"
          maxUnavailable: 0
    terminationGracePeriodSeconds: 60
    shutdown:
      blackoutSeconds: 10

  ## ── Sidekiq (Background Jobs) → COMPUTE nodes ────────────────────────────
  ## Medium production: CI pipelines, emails, repository maintenance.
  sidekiq:
    replicas: 2
    minReplicas: 2
    maxReplicas: 5
    hpa:
      cpu:
        targetAverageValue: 800m
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: "10%"
          maxUnavailable: 0
    terminationGracePeriodSeconds: 600

  ## ── Gitaly (Git storage) → COMPUTE nodes ──────────────────────────────────
  ## Praefect creates 3 Gitaly replicas (per virtualStorages above).
  ## These settings apply as defaults to all Praefect-managed Gitaly pods.
  gitaly:
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
    persistence:
      enabled: true
      size: 100Gi
      accessMode: ReadWriteOnce
      storageClass: harvester
    maxUnavailable: 1

  ## ── Praefect (Gitaly HA proxy) → COMPUTE nodes ───────────────────────────
  ## 2-replica StatefulSet proxying requests to Gitaly replicas.
  praefect:
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  ## ── GitLab Shell (SSH) → general nodes ────────────────────────────────────
  gitlab-shell:
    replicaCount: 2
    minReplicas: 2
    maxReplicas: 6
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 100m
        memory: 150Mi
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: "10%"
          maxUnavailable: 0
    terminationGracePeriodSeconds: 60
    ## SSH exposed via Gateway API TCPRoute (services/gitlab/tcproute-ssh.yaml)
    ## Managed externally — chart's built-in gatewayRoute not used
    gatewayRoute:
      enabled: false

  ## ── KAS (Kubernetes Agent Server) → general nodes ─────────────────────────
  kas:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 100m
        memory: 150Mi

  ## ── GitLab Exporter → general nodes ───────────────────────────────────────
  gitlab-exporter:
    enabled: true
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 50m
        memory: 100Mi

  ## ── Migrations → general nodes ────────────────────────────────────────────
  migrations:
    enabled: true
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 250m
        memory: 1Gi

  ## ── Toolbox → general nodes ───────────────────────────────────────────────
  toolbox:
    enabled: true
    replicas: 1
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 50m
        memory: 512Mi

  ## ── GitLab Pages — disabled ───────────────────────────────────────────────
  gitlab-pages:
    enabled: false
