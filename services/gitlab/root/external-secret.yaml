apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-gitlab-initial-root-password
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-gitlab-initial-root-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: services/gitlab/initial-root-password
        property: password
