---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cnpg-controller-manager
  namespace: cnpg-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cnpg-controller-manager
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
