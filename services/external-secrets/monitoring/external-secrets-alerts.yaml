apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-secrets-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: external-secrets-alerts
      rules:
        - alert: ExternalSecretsOperatorDown
          expr: up{job="external-secrets"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "External Secrets Operator is down"
            description: "External Secrets Operator has been unreachable for more than 5 minutes. Secret synchronization from Vault is halted."

        - alert: ExternalSecretSyncFailure
          expr: |
            externalsecret_status_condition{condition="Ready", status="False"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ExternalSecret {{ $labels.name }} sync is failing"
            description: "ExternalSecret {{ $labels.name }} in namespace {{ $labels.namespace }} has been in a non-ready state for more than 10 minutes."

        - alert: ExternalSecretReconcileErrors
          expr: |
            increase(controller_runtime_reconcile_errors_total{controller=~"externalsecret|clustersecretstore"}[15m]) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "External Secrets controller reconcile errors"
            description: '{{ $labels.controller }} controller has had {{ $value | printf "%.0f" }} reconcile errors in the last 15 minutes.'
