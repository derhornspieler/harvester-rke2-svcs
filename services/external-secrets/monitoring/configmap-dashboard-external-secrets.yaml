apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-external-secrets
  namespace: monitoring
  labels:
    app: grafana
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Services
data:
  external-secrets-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "id": null,
      "links": [{"title": "Back to Home", "url": "/d/home-overview/cluster-home?orgId=1", "icon": "external link", "targetBlank": false, "type": "link"}],
      "panels": [
        {
          "title": "ESO Controller Up",
          "description": "External Secrets Operator controller-manager pod readiness",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(kube_deployment_status_replicas_ready{namespace=\"external-secrets\", deployment=~\"external-secrets.*\"}) or vector(0)", "legendFormat": "Ready Replicas", "refId": "A"}]
        },
        {
          "title": "ExternalSecrets Synced",
          "description": "Number of ExternalSecret resources in SecretSynced condition",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "count(externalsecret_status_condition{condition=\"Ready\", status=\"True\"} == 1) or vector(0)", "legendFormat": "Synced", "refId": "A"}]
        },
        {
          "title": "Sync Errors",
          "description": "ExternalSecrets currently failing to sync",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "count(externalsecret_status_condition{condition=\"Ready\", status=\"False\"} == 1) or vector(0)", "legendFormat": "Sync Errors", "refId": "A"}]
        },
        {
          "title": "Reconcile Rate",
          "description": "Rate of controller reconciliations per second",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "fieldConfig": {"defaults": {"unit": "ops", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}},
          "options": {"colorMode": "background", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"external-secrets\"}[5m]))", "legendFormat": "Reconciles/s", "refId": "A"}]
        },
        {
          "title": "Reconcile Rate by Result",
          "description": "Controller reconciliation rate broken down by result (success, error, requeue)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 5,
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"external-secrets\", result=\"success\"}[5m]))", "legendFormat": "Success", "refId": "A"},
            {"expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"external-secrets\", result=\"error\"}[5m]))", "legendFormat": "Error", "refId": "B"},
            {"expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"external-secrets\", result=\"requeue\"}[5m]))", "legendFormat": "Requeue", "refId": "C"}
          ]
        },
        {
          "title": "Reconcile Errors",
          "description": "Rate of reconciliation errors over time",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 6,
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum(rate(controller_runtime_reconcile_errors_total{namespace=\"external-secrets\"}[5m])) by (controller)", "legendFormat": "{{controller}}", "refId": "A"}
          ]
        },
        {
          "title": "ExternalSecret Status",
          "description": "Breakdown of ExternalSecret status conditions",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 7,
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "fillOpacity": 0, "lineWidth": 2, "stacking": {"mode": "none"}, "spanNulls": false}}, "overrides": [{"matcher": {"id": "byName", "options": "Synced"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}, {"matcher": {"id": "byName", "options": "Not Ready"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}]},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "count(externalsecret_status_condition{condition=\"Ready\", status=\"True\"} == 1) or vector(0)", "legendFormat": "Synced", "refId": "A"},
            {"expr": "count(externalsecret_status_condition{condition=\"Ready\", status=\"False\"} == 1) or vector(0)", "legendFormat": "Not Ready", "refId": "B"}
          ]
        },
        {
          "title": "Sync Calls",
          "description": "Rate of sync calls to external secret providers",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 8,
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum(rate(externalsecret_sync_calls_count[5m])) by (name, namespace)", "legendFormat": "{{namespace}}/{{name}}", "refId": "A"}
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["external-secrets", "eso", "vault"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "External Secrets Operator Overview",
      "uid": "external-secrets-overview",
      "version": 1,
      "description": "External Secrets Operator monitoring dashboard covering controller health, reconciliation rates, sync errors, and ExternalSecret status conditions."
    }
