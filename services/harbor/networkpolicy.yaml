apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: harbor
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-ingress
  namespace: harbor
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik ingress controller (runs in kube-system as RKE2 DaemonSet)
    # Harbor nginx listens on 8080, core/portal also on 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rke2-traefik
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
    # Prometheus scraping metrics (exporter 8001, redis 9121)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9121
    # Intra-namespace communication (core <-> registry, jobservice, trivy, etc.)
    - from:
        - podSelector: {}
