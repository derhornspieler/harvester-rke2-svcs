apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-root-credentials
  namespace: minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: minio-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: root-user
      remoteRef:
        key: services/minio/root-credentials
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: services/minio/root-credentials
        property: root-password
