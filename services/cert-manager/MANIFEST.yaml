# cert-manager Service — Bill of Materials
# All Helm charts, container images, and Kustomize resources required.

helm:
  chart: jetstack/cert-manager
  version: "v1.19.4"
  repository: https://charts.jetstack.io
  values: inline  # Values passed via --set flags in deploy script

images:
  - name: jetstack/cert-manager-controller
    tag: "v1.19.4"
    registry: quay.io
  - name: jetstack/cert-manager-webhook
    tag: "v1.19.4"
    registry: quay.io
  - name: jetstack/cert-manager-cainjector
    tag: "v1.19.4"
    registry: quay.io
  - name: jetstack/cert-manager-startupapicheck
    tag: "v1.19.4"
    registry: quay.io
    # Override for Harbor: harbor.example.com/quay/jetstack/cert-manager-controller:v1.19.4

manifests:
  kustomize: kustomization.yaml
  resources:
    - namespace.yaml
    - rbac.yaml
    - cluster-issuer.yaml
  monitoring:
    - monitoring/service-monitor.yaml
    - monitoring/certmanager-alerts.yaml
    - monitoring/configmap-dashboard-cert-manager.yaml

deploy:
  script: scripts/deploy-pki-secrets.sh
  phases: [1, 5, 7]
  description: |
    Phase 1: Helm install with CRDs and gateway-shim
    Phase 5: Apply RBAC, ClusterIssuer, verify vault-issuer Ready
    Phase 7: Apply monitoring via Kustomize
