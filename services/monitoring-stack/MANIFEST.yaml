# Monitoring Stack — Bill of Materials

helm:
  chart: prometheus-community/kube-prometheus-stack
  version: "72.6.2"
  repository: https://prometheus-community.github.io/helm-charts
  values: helm/kube-prometheus-stack-values.yaml

images:
  # Helm chart managed (versions from chart defaults)
  - name: prometheus/prometheus
    registry: quay.io
    note: "Version set by chart"
  - name: prometheus/alertmanager
    registry: quay.io
    note: "Version set by chart"
  - name: grafana/grafana
    registry: docker.io
    note: "Version set by chart"
  - name: prometheus/node-exporter
    registry: quay.io
    note: "Version set by chart"
  - name: kube-state-metrics/kube-state-metrics
    registry: registry.k8s.io
    note: "Version set by chart"
  - name: prometheus-operator/prometheus-operator
    registry: quay.io
    note: "Version set by chart"
  # Manually deployed (Kustomize)
  - name: grafana/loki
    tag: "3.4.6"
    registry: docker.io
  - name: grafana/alloy
    tag: "v1.6.1"
    registry: docker.io

manifests:
  kustomize: kustomization.yaml
  loki:
    - loki/configmap.yaml
    - loki/statefulset.yaml
    - loki/rbac.yaml
    - loki/service.yaml
  alloy:
    - alloy/configmap.yaml
    - alloy/daemonset.yaml
    - alloy/rbac.yaml
    - alloy/service.yaml
  gateways:
    - prometheus/gateway.yaml
    - prometheus/httproute.yaml
    - alertmanager/gateway.yaml
    - alertmanager/httproute.yaml
    - grafana/gateway.yaml
    - grafana/httproute.yaml
  scaling:
    - grafana/hpa.yaml
    - volume-autoscalers.yaml
  dashboards: 15 ConfigMaps in grafana/dashboards/
  prometheus-rules: 9 alert groups in prometheus-rules/
  service-monitors: 6 monitors in service-monitors/

deploy:
  script: scripts/deploy-monitoring.sh
  phases: [1, 2, 3, 4, 5, 6]
  description: |
    Phase 1: Namespace, Loki, Alloy — Create namespace and deploy log aggregation
    Phase 2: Scrape Configs Secret — Add custom Prometheus scrape configurations
    Phase 3: kube-prometheus-stack — Helm install (Prometheus, Grafana, Alertmanager)
    Phase 4: Rules, Monitors, Scaling — Apply PrometheusRules, ServiceMonitors, HPA, VolumeAutoscalers
    Phase 5: Gateways, Routes, Auth — Ingress routes, OAuth2-proxy, dashboards
    Phase 6: Verify — Wait for all components ready, TLS certificates issued
