apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: traefik-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: traefik-alerts
      rules:
        - alert: TraefikDown
          expr: up{job="traefik"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Traefik is down"
            description: "Traefik instance on {{ $labels.node }} has been unreachable for more than 2 minutes."

        - alert: TraefikHighErrorRate
          expr: sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) / sum(rate(traefik_service_requests_total[5m])) * 100 > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Traefik high 5xx error rate"
            description: 'Traefik 5xx error rate is {{ $value | printf "%.2f" }}% (threshold: 5%).'

        - alert: TraefikHighP99Latency
          expr: histogram_quantile(0.99, sum by (le) (rate(traefik_service_request_duration_seconds_bucket[5m]))) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Traefik p99 latency above 5s"
            description: "Traefik p99 request duration is {{ $value | humanizeDuration }}."

        - alert: TraefikHighP99LatencyCritical
          expr: histogram_quantile(0.99, sum by (le) (rate(traefik_service_request_duration_seconds_bucket[5m]))) > 15
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Traefik p99 latency above 15s"
            description: "Traefik p99 request duration is {{ $value | humanizeDuration }}. Investigate upstream services and connection saturation."

        - alert: TraefikHighConfigReloads
          expr: rate(traefik_config_reloads_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Traefik excessive config reloads"
            description: "Traefik is reloading config at {{ $value | humanize }}/sec. Frequent reloads can cause transient latency spikes."

        - alert: TraefikOpenConnectionsHigh
          expr: sum(traefik_open_connections) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Traefik open connections above 1000"
            description: "Traefik has {{ $value | humanize }} open connections. This may indicate connection pool exhaustion or slow backends."
