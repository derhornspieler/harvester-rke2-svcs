# ExternalSecret for CNPG bootstrap credentials (database namespace)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-pg-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-pg-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: services/database/grafana-pg
        property: username
    - secretKey: password
      remoteRef:
        key: services/database/grafana-pg
        property: password
---
# ExternalSecret for Grafana env vars (monitoring namespace)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-db-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-db-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: services/database/grafana-pg
        property: username
    - secretKey: password
      remoteRef:
        key: services/database/grafana-pg
        property: password
