apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: node-labeler
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - node-labeler
  selector:
    matchLabels:
      app.kubernetes.io/name: node-labeler
  endpoints:
    - port: metrics
