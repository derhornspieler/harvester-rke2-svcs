# Password generator + PushSecret for Identity Portal OIDC client secret
# Generates KEYCLOAK_CLIENT_SECRET and pushes to Vault
# updatePolicy: IfNotExists ensures secret is only generated once
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: identity-portal-oidc-secret-gen
  namespace: identity-portal
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-portal-oidc-generated
  namespace: identity-portal
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: identity-portal-oidc-generated
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: identity-portal-oidc-secret-gen
      rewrite:
        - regexp:
            source: "password"
            target: "KEYCLOAK_CLIENT_SECRET"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: identity-portal-oidc-push
  namespace: identity-portal
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: identity-portal-oidc-generated
  data:
    - match:
        secretKey: KEYCLOAK_CLIENT_SECRET
        remoteRef:
          remoteKey: services/identity-portal/oidc-secret
          property: KEYCLOAK_CLIENT_SECRET
