apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-portal-secret
  namespace: identity-portal
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: identity-portal-secret
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: services/identity-portal/oidc-secret
        property: KEYCLOAK_CLIENT_SECRET
