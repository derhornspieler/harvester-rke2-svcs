apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: kube-system
  labels:
    app.kubernetes.io/name: traefik-dashboard
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: traefik
      protocol: TCP
      name: dashboard
  selector:
    app.kubernetes.io/name: rke2-traefik
