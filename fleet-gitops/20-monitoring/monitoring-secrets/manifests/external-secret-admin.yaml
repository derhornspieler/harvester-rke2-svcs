# ExternalSecret for Grafana admin credentials (monitoring namespace)
# Syncs admin-user and admin-password from Vault into a K8s secret
# Referenced by grafana.admin.existingSecret in kube-prometheus-stack values
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: services/monitoring
        property: grafana-admin-user
    - secretKey: admin-password
      remoteRef:
        key: services/monitoring
        property: grafana-admin-password
