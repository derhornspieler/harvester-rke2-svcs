# Password generator + PushSecret for Grafana admin credentials
# Generates admin password and combines with static admin username,
# then pushes to Vault for the ExternalSecret to pull from
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: grafana-admin-password-gen
  namespace: monitoring
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-generated
  namespace: monitoring
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-admin-generated
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        grafana-admin-user: "admin"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: grafana-admin-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "grafana-admin-password"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-admin-push
  namespace: monitoring
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: grafana-admin-generated
  data:
    - match:
        secretKey: grafana-admin-user
        remoteRef:
          remoteKey: services/monitoring
          property: grafana-admin-user
    - match:
        secretKey: grafana-admin-password
        remoteRef:
          remoteKey: services/monitoring
          property: grafana-admin-password
