# Reads Keycloak admin password from Vault via ClusterSecretStore vault-bootstrap.
# The monitoring namespace does not yet have its own SecretStore when this
# ExternalSecret is first applied -- the monitoring-init Job creates it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-bootstrap
  namespace: monitoring
  labels:
    app.kubernetes.io/name: monitoring-init
    app.kubernetes.io/component: bootstrap
spec:
  refreshInterval: "0"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-bootstrap
  target:
    name: keycloak-admin-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: keycloak-admin-password
      remoteRef:
        key: admin/keycloak
        property: admin-password
