apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-init
  namespace: monitoring
---
# eso-secrets SA -- referenced by SecretStores created by the init Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: monitoring
---
# external-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-init
  namespace: monitoring
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-init
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: monitoring-init
    namespace: monitoring
roleRef:
  kind: Role
  name: monitoring-init
  apiGroup: rbac.authorization.k8s.io
