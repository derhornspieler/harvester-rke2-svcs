# Password generator + PushSecret for Grafana PostgreSQL credentials
# Generates password and combines with static username "grafana",
# then pushes to Vault for the ExternalSecret to pull from
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: grafana-pg-password-gen
  namespace: database
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-pg-generated-credentials
  namespace: database
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-pg-generated-credentials
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        username: "grafana"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: grafana-pg-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "password"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-pg-credentials-push
  namespace: database
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: grafana-pg-generated-credentials
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: services/database/grafana-pg
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/database/grafana-pg
          property: password
