# kube-prometheus-stack Helm values
# Migrated from raw kustomize manifests to Operator-based deployment
# Domain substitution: _subst_changeme replaces CHANGEME_DOMAIN before helm install

## ---- CRDs ----
## Do NOT enable here — prometheus-operator-crds is deployed as a
## standalone chart in 00-operators (operators-prometheus-crds HelmOp).
## That dedicated chart must land first so ServiceMonitor / PrometheusRule
## CRDs are available for every bundle that depends on them.
# crds:
#   enabled: false

## ---- Prometheus Operator ----
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector:
    workload-type: general

## ---- Prometheus ----
prometheus:
  ingress:
    enabled: false
  prometheusSpec:
    # HA: 2 replicas with external labels for dedup
    replicas: 2
    replicaExternalLabelName: __replica__
    # Discover all ServiceMonitors/PrometheusRules regardless of labels
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    ruleSelector: {}
    # Retention
    retention: 30d
    retentionSize: 40GB
    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # Resources (match existing StatefulSet)
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
    nodeSelector:
      workload-type: general
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    enableAdminAPI: false
    enableFeatures: []
    # Additional scrape configs from Secret
    additionalScrapeConfigsSecret:
      enabled: true
      name: additional-scrape-configs
      key: scrape-configs.yaml

## ---- Alertmanager ----
alertmanager:
  ingress:
    enabled: false
  alertmanagerSpec:
    # HA: 2 replicas with built-in mesh clustering
    replicas: 2
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
    nodeSelector:
      workload-type: general
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "default"
      group_by: ["alertname", "namespace", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "critical"
          matchers:
            - severity = critical
          group_wait: 10s
          repeat_interval: 1h
        - receiver: "warning"
          matchers:
            - severity = warning
    receivers:
      - name: "default"
      - name: "critical"
      - name: "warning"
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ["alertname", "namespace"]

## ---- Grafana ----
grafana:
  replicas: 2
  fullnameOverride: "grafana"
  podAnnotations:
    deploy-version: "${BUNDLE_VERSION}"
  # Air-gapped plugin install: GF_INSTALL_PLUGINS handled by Docker entrypoint
  # (chart's plugins: key maps to GF_PLUGINS_PREINSTALL_SYNC which only supports
  # plugin IDs from grafana.com — broken for custom URLs / air-gapped installs)
  serviceMonitor:
    enabled: false  # Managed by ArgoCD (svc-monitoring-stack)
  ingress:
    enabled: false
  service:
    port: 3000
    targetPort: 3000
    sessionAffinity: ClientIP
    sessionAffinityConfig:
      clientIP:
        # 10800s = 3 hours. Do not override via kubectl patch -let Helm manage this value.
        timeoutSeconds: 10800
  adminUser: admin
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  env:
    GF_INSTALL_PLUGINS: "${GRAFANA_PLUGIN_INSTALL_URL}"
    GF_SERVER_ROOT_URL: https://${GRAFANA_FQDN}/
    GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /tmp/dashboards/Home/home-overview.json
    # PostgreSQL database backend (shared sessions across replicas)
    GF_DATABASE_TYPE: postgres
    GF_DATABASE_HOST: ${GRAFANA_DB_HOST}
    GF_DATABASE_NAME: grafana
    GF_DATABASE_SSL_MODE: require
    GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
    GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
    GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
    GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
    GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "true"
    GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
    GF_AUTH_GENERIC_OAUTH_AUTH_URL: "${OIDC_ISSUER_URL}/protocol/openid-connect/auth"
    GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "${OIDC_ISSUER_URL}/protocol/openid-connect/token"
    GF_AUTH_GENERIC_OAUTH_API_URL: "${OIDC_ISSUER_URL}/protocol/openid-connect/userinfo"
    GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
    GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
    GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
    GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], '${RBAC_GROUP_ADMINS}') && 'Admin' || contains(groups[*], '${RBAC_GROUP_INFRA}') && 'Admin' || contains(groups[*], '${RBAC_GROUP_NETWORK}') && 'Viewer' || contains(groups[*], '${RBAC_GROUP_SENIOR_DEVS}') && 'Viewer' || contains(groups[*], '${RBAC_GROUP_DEVS}') && 'Viewer' || 'Viewer'"
    GF_AUTH_SIGNOUT_REDIRECT_URL: "${OIDC_ISSUER_URL}/protocol/openid-connect/logout?client_id=grafana&post_logout_redirect_uri=https%3A%2F%2F${GRAFANA_FQDN}%2Flogin"
    GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA: /etc/ssl/certs/vault-root-ca.pem
    GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP: "false"
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oidc-secret
        key: client-secret
    GF_DATABASE_USER:
      secretKeyRef:
        name: grafana-db-secret
        key: username
    GF_DATABASE_PASSWORD:
      secretKeyRef:
        name: grafana-db-secret
        key: password
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
  grafana.ini:
    diagnostics:
      profiling.enabled: false
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  extraEmptyDirMounts:
    - name: grafana-tmp
      mountPath: /tmp
  nodeSelector:
    workload-type: general
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: grafana
  persistence:
    enabled: false
  # Sidecar discovers ConfigMaps with grafana_dashboard: "1"
  sidecar:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: false
  # Datasources provisioned directly (Prometheus alias, Loki, Alertmanager alias)
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://prometheus.monitoring.svc:9090
          access: proxy
          isDefault: true
          editable: false
        - name: Loki
          type: loki
          uid: loki
          url: ${LOKI_INTERNAL_URL}
          access: proxy
          isDefault: false
          editable: false
        - name: Alertmanager
          type: alertmanager
          uid: alertmanager
          url: http://alertmanager.monitoring.svc:9093
          access: proxy
          isDefault: false
          editable: false
          jsonData:
            implementation: prometheus
            handleGrafanaManagedAlerts: true
            alertmanagerUid: ""
  extraVolumeMounts:
    - name: vault-root-ca
      mountPath: /etc/ssl/certs/vault-root-ca.pem
      subPath: ca.crt
      readOnly: true
  extraVolumes:
    - name: vault-root-ca
      configMap:
        name: vault-root-ca

## ---- Node Exporter ----
nodeExporter:
  enabled: true
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi

## ---- kube-state-metrics ----
kubeStateMetrics:
  enabled: true
kube-state-metrics:
  nodeSelector:
    workload-type: general
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

## ---- Disable components that target cluster handles differently ----
kubeEtcd:
  enabled: false
coreDns:
  enabled: false
kubeProxy:
  enabled: false

## ---- Enable built-in kube-prometheus-stack dashboards alongside our custom dashboards ----
defaultDashboardsEnabled: true

## ---- Default alerting rules ----
# Disable most built-in alert groups -our 18 custom PrometheusRules replace them
# Keep only recording rules and operator health
defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: false
    configReloaders: false
    general: false
    k8sContainerCpuUsageSecondsTotal: false
    k8sContainerMemoryCache: false
    k8sContainerMemoryRss: false
    k8sContainerMemorySwap: false
    k8sContainerMemoryWorkingSetBytes: false
    k8sContainerResource: false
    k8sPodOwner: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: false
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: true
    kubeStateMetrics: false
    network: false
    node: false
    nodeExporterAlerting: false
    nodeExporterRecording: true
    prometheus: false
    prometheusOperator: true
