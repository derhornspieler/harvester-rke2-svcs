apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - harbor
      - gitlab
  selector:
    matchLabels:
      redis_setup_type: replication
  endpoints:
    - port: exporter
      targetPort: 9121
