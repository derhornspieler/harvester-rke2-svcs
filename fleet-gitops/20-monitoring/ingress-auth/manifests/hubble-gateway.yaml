apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hubble
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/duration: "720h"
    cert-manager.io/renew-before: "168h"
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: hubble.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: hubble-aegisgroup-ch-tls
      allowedRoutes:
        namespaces:
          from: Same
