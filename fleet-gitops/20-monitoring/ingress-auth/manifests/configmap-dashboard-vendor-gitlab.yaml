apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-vendor-gitlab
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Vendor
data:
  vendor-gitlab.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__elements": {},
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "10.1.2"
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        },
        {
          "type": "panel",
          "id": "gauge",
          "name": "Gauge",
          "version": ""
        },
        {
          "type": "panel",
          "id": "stat",
          "name": "Stat",
          "version": ""
        },
        {
          "type": "panel",
          "id": "timeseries",
          "name": "Time series",
          "version": ""
        },
        {
          "type": "panel",
          "id": "bargauge",
          "name": "Bar gauge",
          "version": ""
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Overview dashboard for GitLab self-managed instance",
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "icon": "external link",
          "tags": [],
          "title": "GitLab Docs",
          "type": "link",
          "url": "https://docs.gitlab.com/"
        }
      ],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "panels": [],
          "title": "Service Status",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 3, "w": 4, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["first"], "fields": "/^app_kubernetes_io_version$/", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "topk(1, count by (app_kubernetes_io_version) (gitlab_build_info{namespace=\"gitlab\"}))",
              "format": "table",
              "instant": true,
              "legendFormat": "{{ "{{" }}app_kubernetes_io_version{{ "}}" }}",
              "refId": "A"
            }
          ],
          "title": "GitLab Version",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "light-red", "value": 30 },
                  { "color": "yellow", "value": 60 },
                  { "color": "green", "value": 100 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 3, "w": 20, "x": 4, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["last"], "fields": "", "values": false },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "sum(up{namespace=\"gitlab\", job!~\"gitlab_exporter.*|node\", instance!~\".*:(9168|8075)\"}) by (job) / count(up{namespace=\"gitlab\", job!~\"gitlab_exporter.*|node\", instance!~\".*:(9168|8075)\"}) by (job)",
              "legendFormat": "{{ "{{" }}job{{ "}}" }}",
              "refId": "A"
            }
          ],
          "title": "Component Health",
          "transparent": true,
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 },
          "id": 4,
          "panels": [],
          "title": "HTTP Requests",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "req/s",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (status) (rate(http_requests_total{namespace=\"gitlab\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{" }}status{{ "}}" }}",
              "refId": "A"
            }
          ],
          "title": "HTTP Request Rate by Status Code",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 5 },
          "id": 6,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"gitlab\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"gitlab\"}[5m])) * 100",
              "legendFormat": "5xx Rate",
              "refId": "A"
            }
          ],
          "title": "HTTP 5xx Error Rate",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 5 },
          "id": 7,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "1 - sum(puma_pool_capacity{namespace=\"gitlab\"}) / sum(puma_max_threads{namespace=\"gitlab\"})",
              "legendFormat": "Thread Usage",
              "refId": "A"
