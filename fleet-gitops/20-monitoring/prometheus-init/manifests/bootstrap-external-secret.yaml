---
# Bootstrap ExternalSecret: reads Keycloak admin password from Vault
# via ClusterSecretStore vault-bootstrap (pre-existing cluster-wide store).
# Mounted into the init Job to authenticate against Keycloak API.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prometheus-init-bootstrap
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-bootstrap
    kind: ClusterSecretStore
  target:
    name: prometheus-init-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: keycloak-admin-password
      remoteRef:
        key: admin/keycloak
        property: admin-password
