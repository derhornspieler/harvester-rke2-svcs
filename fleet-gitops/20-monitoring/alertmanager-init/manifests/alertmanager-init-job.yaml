---
# alertmanager-init: Creates OIDC client for Alertmanager oauth2-proxy.
#
# Auth: K8s auth to Vault (bootstrap-keycloak-monitoring role). NO root token.
# Requires: Keycloak running, Vault unsealed, bootstrap ExternalSecret synced.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: alertmanager-init
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager-init
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-init
    spec:
      serviceAccountName: monitoring-init
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: init-lib
          configMap:
            name: init-lib
        - name: bootstrap-secrets
          secret:
            secretName: alertmanager-init-bootstrap
      containers:
        - name: alertmanager-init
          image: ${IMAGE_ALPINE_K8S}
          env:
            - name: VAULT_ADDR
              value: "${VAULT_INTERNAL_URL}"
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              # alertmanager-init: create OIDC client for oauth2-proxy
              # Idempotent — safe to re-run.

              source /init-lib/init-lib.sh

              DOMAIN="${DOMAIN}"

              # --- Authenticate to Vault via K8s auth ---
              vault_k8s_login "bootstrap-keycloak-monitoring"

              # --- Create OIDC client for Alertmanager ---
              log "[INFO] Creating OIDC client 'alertmanager-oidc'..."
              keycloak_create_oidc_client \
                "alertmanager-oidc" \
                "https://alertmanager.${DOMAIN}/oauth2/callback" \
                "S256"

              log "[INFO] Alertmanager init complete"
          volumeMounts:
            - name: init-lib
              mountPath: /init-lib
              readOnly: true
            - name: bootstrap-secrets
              mountPath: /secrets
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
