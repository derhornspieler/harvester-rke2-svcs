# minio-init ServiceAccount — used by the init Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-init
  namespace: minio
---
# eso-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: minio
---
# external-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: minio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minio-init
  namespace: minio
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-init
  namespace: minio
subjects:
  - kind: ServiceAccount
    name: minio-init
    namespace: minio
roleRef:
  kind: Role
  name: minio-init
  apiGroup: rbac.authorization.k8s.io
