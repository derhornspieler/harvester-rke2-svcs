# Password generator + PushSecret for MinIO root credentials
# Generates root-password and combines with static root-user,
# then pushes to Vault for the ExternalSecret to pull from
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: minio-password-gen
  namespace: minio
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-generated-credentials
  namespace: minio
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: minio-generated-credentials
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        root-user: "minio-admin"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: minio-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "root-password"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: minio-credentials-push
  namespace: minio
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: minio-generated-credentials
  data:
    - match:
        secretKey: root-user
        remoteRef:
          remoteKey: services/minio/root-credentials
          property: root-user
    - match:
        secretKey: root-password
        remoteRef:
          remoteKey: services/minio/root-credentials
          property: root-password
