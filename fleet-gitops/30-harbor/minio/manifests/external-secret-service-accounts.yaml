# ExternalSecrets to pull service account credentials into the minio namespace
# Used by the minio-init Job to create MinIO users with scoped S3 policies
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-gitlab-sa-credentials
  namespace: minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: minio-gitlab-sa-credentials
    creationPolicy: Owner
  data:
    - secretKey: accesskey
      remoteRef:
        key: services/gitlab/minio-storage
        property: accesskey
    - secretKey: secretkey
      remoteRef:
        key: services/gitlab/minio-storage
        property: secretkey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-harbor-sa-credentials
  namespace: minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: minio-harbor-sa-credentials
    creationPolicy: Owner
  data:
    - secretKey: accesskey
      remoteRef:
        key: services/harbor
        property: minio-access-key
    - secretKey: secretkey
      remoteRef:
        key: services/harbor
        property: minio-secret-key
