# SecretStores for ESO in minio namespace
# vault-backend: reads secrets from Vault (eso-reader-minio role)
# vault-writer: writes generated credentials to Vault (eso-writer-minio role)
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: minio
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-reader-minio"
          serviceAccountRef:
            name: "external-secrets"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-writer
  namespace: minio
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-writer-minio"
          serviceAccountRef:
            name: "external-secrets"
