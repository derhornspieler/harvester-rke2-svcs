# harbor-init: Bootstrap Vault ESO roles, SecretStore, OIDC client, MinIO
# bucket/user, and seed credentials for the harbor namespace.
#
# Auth: K8s auth to Vault (bootstrap-keycloak-harbor role). NO root token.
# Requires: Vault unsealed, Keycloak running, MinIO running,
#           keycloak-admin-bootstrap and minio-admin-bootstrap secrets.
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-init
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-init
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-init
    spec:
      serviceAccountName: harbor-init
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: bootstrap-secrets
          secret:
            secretName: keycloak-admin-bootstrap
        - name: vault-bin
          emptyDir: {}
        - name: mc-bin
          emptyDir: {}
      initContainers:
        - name: vault-bin
          image: ${IMAGE_VAULT}
          command: ["cp", "/bin/vault", "/vault-bin/vault"]
          volumeMounts:
            - name: vault-bin
              mountPath: /vault-bin
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
        - name: mc-bin
          image: ${IMAGE_MINIO_MC}
          command: ["cp", "/usr/bin/mc", "/mc-bin/mc"]
          volumeMounts:
            - name: mc-bin
              mountPath: /mc-bin
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: harbor-init
          image: ${IMAGE_ALPINE_K8S}
          env:
            - name: PATH
              value: "/vault-bin:/mc-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: HOME
              value: "/tmp"
            - name: VAULT_ADDR
              value: "${VAULT_INTERNAL_URL}"
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            - name: MINIO_ENDPOINT
              value: "${MINIO_INTERNAL_URL}"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-admin-bootstrap
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-admin-bootstrap
                  key: minio-root-password
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              # harbor-init: ESO roles, SecretStore, OIDC client, MinIO bucket/user,
              # Harbor admin + DB + Valkey credentials.
              # Idempotent — safe to re-run.

              #################################################################
              # Inline helpers (no init-lib.sh dependency)
              #################################################################
              log() { echo "[$(date +%H:%M:%S)] $*" >&2; }

              vault_k8s_login() {
                local role="$1"
                local sa_token
                sa_token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                  role="${role}" jwt="${sa_token}")
                export VAULT_TOKEN
                log "[INFO] Authenticated to Vault as role: ${role}"
              }

              vault_get_or_generate() {
                local path="$1" property="$2" length="${3:-32}"
                local existing
                existing=$(vault kv get -field="${property}" "kv/${path}" 2>/dev/null || true)
                if [[ -n "${existing}" ]]; then
                  echo "${existing}"
                  return 0
                fi
                head -c 256 /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c "${length}" || true
              }

              vault_kv_put() {
                local path="$1"; shift
                vault kv put "kv/${path}" "$@"
                log "[INFO] Written to kv/${path}"
              }

              vault_bind_eso_roles() {
                local namespace="$1"
                local sa_names="eso-secrets,external-secrets"
                vault write "auth/kubernetes/role/eso-reader-${namespace}" \
                  bound_service_account_names="${sa_names}" \
                  bound_service_account_namespaces="${namespace}" \
                  policies="eso-reader-${namespace}" \
                  ttl=1h
                vault write "auth/kubernetes/role/eso-writer-${namespace}" \
                  bound_service_account_names="${sa_names}" \
                  bound_service_account_namespaces="${namespace}" \
                  policies="eso-writer-${namespace}" \
                  ttl=1h
                log "[INFO] Bound ESO roles for namespace: ${namespace}"
              }

              vault_create_secretstore() {
                local namespace="$1"
                local vault_url="${VAULT_ADDR}"
                kubectl apply -f - <<SSEOF
              apiVersion: external-secrets.io/v1
              kind: SecretStore
              metadata:
                name: vault-backend
                namespace: ${namespace}
              spec:
                provider:
                  vault:
                    server: "${vault_url}"
                    path: kv
                    version: v2
                    auth:
                      kubernetes:
                        mountPath: kubernetes
                        role: "eso-reader-${namespace}"
                        serviceAccountRef:
                          name: external-secrets
              ---
              apiVersion: external-secrets.io/v1
              kind: SecretStore
              metadata:
                name: vault-writer
                namespace: ${namespace}
              spec:
                provider:
                  vault:
                    server: "${vault_url}"
                    path: kv
                    version: v2
                    auth:
                      kubernetes:
                        mountPath: kubernetes
                        role: "eso-writer-${namespace}"
                        serviceAccountRef:
                          name: external-secrets
              SSEOF
                log "[INFO] Created SecretStores (reader + writer) in namespace: ${namespace}"
              }

              wait_for_keycloak() {
                local keycloak_url="${KEYCLOAK_URL}"
                local max_attempts="${1:-60}"
                local interval="${2:-10}"
                log "[INFO] Waiting for Keycloak to be ready at ${keycloak_url}..."
                for i in $(seq 1 "${max_attempts}"); do
                  http_code=$(curl -s --http1.1 -o /dev/null -w "%{http_code}" \
                    "${keycloak_url}/realms/master/.well-known/openid-configuration" 2>/dev/null || echo "000")
                  if [[ "${http_code}" == "200" ]]; then
                    log "[INFO] Keycloak is ready (attempt ${i})"
                    return 0
                  fi
                  if (( i % 6 == 0 )); then
                    log "[INFO] Keycloak not ready yet (HTTP ${http_code}), attempt ${i}/${max_attempts}..."
                  fi
                  sleep "${interval}"
                done
                log "[ERROR] Keycloak not ready after ${max_attempts} attempts"
                return 1
              }

              keycloak_create_oidc_client() {
                local client_id="$1"
                local redirect_uri="$2"
                local pkce="${3:-S256}"
                local keycloak_url="${KEYCLOAK_URL}"
                local admin_pass
                admin_pass=$(cat /secrets/keycloak-admin-password 2>/dev/null || echo "${KEYCLOAK_ADMIN_PASS:-}")

                # Get admin token
                local token
                token=$(curl -s --http1.1 -X POST \
                  "${keycloak_url}/realms/master/protocol/openid-connect/token" \
                  -d "grant_type=password&client_id=admin-cli" \
                  -d "username=admin&password=${admin_pass}" \
                  | jq -r '.access_token')

                if [[ -z "${token}" || "${token}" == "null" ]]; then
                  log "[ERROR] Failed to get Keycloak admin token"
                  return 1
                fi

                local realm="platform"
                local api="${keycloak_url}/admin/realms/${realm}/clients"

                # Check if client exists
                local existing_id
                existing_id=$(curl -s --http1.1 -H "Authorization: Bearer ${token}" \
                  "${api}?clientId=${client_id}" \
                  | jq -r '.[0].id // empty' 2>/dev/null || true)

                # Generate or retrieve client secret
                local client_secret
                client_secret=$(vault_get_or_generate "oidc/${client_id}" "client-secret")
                local cookie_secret
                cookie_secret=$(vault_get_or_generate "oidc/${client_id}" "cookie-secret" 16)

                # Build client JSON
                local post_logout
                post_logout="${redirect_uri%/*}/*"
                local client_json
                client_json=$(jq -n \
                  --arg clientId "${client_id}" \
                  --arg secret "${client_secret}" \
                  --arg redirectUri "${redirect_uri}" \
                  --arg postLogout "${post_logout}" \
                  '{
                    clientId: $clientId,
                    enabled: true,
                    protocol: "openid-connect",
                    publicClient: false,
                    secret: $secret,
                    redirectUris: [$redirectUri],
                    webOrigins: ["+"],
                    standardFlowEnabled: true,
                    directAccessGrantsEnabled: false,
                    attributes: {
                      "post.logout.redirect.uris": $postLogout
                    }
                  }')

                # Add PKCE attribute if enabled
                if [[ "${pkce}" == "S256" ]]; then
                  client_json=$(echo "${client_json}" | jq '.attributes["pkce.code.challenge.method"] = "S256"')
                fi

                if [[ -n "${existing_id}" ]]; then
                  curl -s --http1.1 -X PUT -H "Authorization: Bearer ${token}" \
                    -H "Content-Type: application/json" \
                    "${api}/${existing_id}" -d "${client_json}" >/dev/null
                  log "[INFO] Updated OIDC client: ${client_id}"
                else
                  curl -s --http1.1 -X POST -H "Authorization: Bearer ${token}" \
                    -H "Content-Type: application/json" \
                    "${api}" -d "${client_json}" >/dev/null
                  log "[INFO] Created OIDC client: ${client_id}"
                fi

                # Store in Vault
                vault_kv_put "oidc/${client_id}" \
                  client-secret="${client_secret}" \
                  cookie-secret="${cookie_secret}"
              }

              keycloak_assign_groups_scope() {
                local client_id="$1"
                local keycloak_url="${KEYCLOAK_URL}"
                local admin_pass
                admin_pass=$(cat /secrets/keycloak-admin-password 2>/dev/null || echo "${KEYCLOAK_ADMIN_PASS:-}")

                local token
                token=$(curl -s --http1.1 -X POST \
                  "${keycloak_url}/realms/master/protocol/openid-connect/token" \
                  -d "grant_type=password&client_id=admin-cli" \
                  -d "username=admin&password=${admin_pass}" \
                  | jq -r '.access_token')

                if [[ -z "${token}" || "${token}" == "null" ]]; then
                  log "[WARN] Failed to get token for groups scope assignment"
                  return 0
                fi

                local realm="platform"
                local scope_id
                scope_id=$(curl -s --http1.1 -H "Authorization: Bearer ${token}" \
                  "${keycloak_url}/admin/realms/${realm}/client-scopes" \
                  | jq -r '.[] | select(.name=="groups") | .id' 2>/dev/null || echo "")

                if [[ -z "${scope_id}" ]]; then
                  log "[WARN] groups client scope not found — skipping assignment"
                  return 0
                fi

                local client_uuid
                client_uuid=$(curl -s --http1.1 -H "Authorization: Bearer ${token}" \
                  "${keycloak_url}/admin/realms/${realm}/clients?clientId=${client_id}" \
                  | jq -r '.[0].id // empty' 2>/dev/null || echo "")

                if [[ -z "${client_uuid}" ]]; then
                  log "[WARN] Client ${client_id} not found — skipping groups scope"
                  return 0
                fi

                curl -s --http1.1 -o /dev/null \
                  -X PUT "${keycloak_url}/admin/realms/${realm}/clients/${client_uuid}/default-client-scopes/${scope_id}" \
                  -H "Authorization: Bearer ${token}"
                log "[INFO] Assigned groups scope to ${client_id}"
              }

              minio_create_service_user() {
                local user_name="$1"
                local bucket_prefix="$2"
                local vault_path="$3"

                # Check if credentials already exist in Vault
                local access_key secret_key
                access_key=$(vault kv get -field=access-key "kv/${vault_path}" 2>/dev/null || true)
                secret_key=$(vault kv get -field=secret-key "kv/${vault_path}" 2>/dev/null || true)

                if [[ -n "${access_key}" && -n "${secret_key}" ]]; then
                  if mc admin user info myminio "${access_key}" >/dev/null 2>&1; then
                    log "[INFO] MinIO user already exists for: ${user_name}"
                    return 0
                  fi
                fi

                # Generate credentials
                access_key=$(head -c 256 /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 20 || true)
                secret_key=$(head -c 256 /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 40 || true)

                # Create IAM user
                mc admin user add myminio "${access_key}" "${secret_key}"

                # Create scoped IAM policy
                local policy_json
                policy_json=$(jq -n \
                  --arg prefix "${bucket_prefix}" \
                  '{
                    Version: "2012-10-17",
                    Statement: [{
                      Effect: "Allow",
                      Action: ["s3:*"],
                      Resource: [
                        ("arn:aws:s3:::" + $prefix),
                        ("arn:aws:s3:::" + $prefix + "/*")
                      ]
                    }]
                  }')

                echo "${policy_json}" | mc admin policy create myminio "${user_name}-policy" /dev/stdin
                mc admin policy attach myminio "${user_name}-policy" --user "${access_key}"

                # Store in Vault
                vault_kv_put "${vault_path}" \
                  access-key="${access_key}" \
                  secret-key="${secret_key}"

                log "[INFO] Created MinIO IAM user: ${user_name}"
              }

              #################################################################
              # Main logic
              #################################################################

              DOMAIN="${DOMAIN}"

              # --- Authenticate to Vault via K8s auth ---
              vault_k8s_login "bootstrap-keycloak-harbor"

              # --- Bind ESO reader/writer roles for harbor namespace ---
              vault_bind_eso_roles "harbor"

              # --- Create namespace SecretStores ---
              vault_create_secretstore "harbor"

              # --- Wait for Keycloak to be ready ---
              wait_for_keycloak

              # --- Create Harbor OIDC client in Keycloak ---
              log "[INFO] Creating Harbor OIDC client..."
              keycloak_create_oidc_client "harbor" \
                "https://${HARBOR_FQDN}/c/oidc/callback" \
                "disabled"
              log "[INFO] Harbor OIDC client created"
              keycloak_assign_groups_scope "harbor"

              # --- MinIO: setup alias, create bucket, create service user ---
              log "[INFO] Configuring MinIO for Harbor..."
              mc alias set myminio "${MINIO_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" --api S3v4
              log "[INFO] MinIO alias configured"

              mc mb --ignore-existing "myminio/harbor"
              log "[INFO] Ensured bucket exists: harbor"

              minio_create_service_user "harbor-sa" "harbor" "services/harbor"

              # Re-store MinIO credentials with field names expected by Harbor
              # external-secrets (minio-access-key / minio-secret-key)
              ACCESS_KEY=$(vault kv get -field=access-key kv/services/harbor 2>/dev/null || true)
              SECRET_KEY=$(vault kv get -field=secret-key kv/services/harbor 2>/dev/null || true)
              if [[ -n "${ACCESS_KEY}" && -n "${SECRET_KEY}" ]]; then
                vault_kv_put "services/harbor" \
                  access-key="${ACCESS_KEY}" \
                  secret-key="${SECRET_KEY}" \
                  minio-access-key="${ACCESS_KEY}" \
                  minio-secret-key="${SECRET_KEY}"
              fi
              log "[INFO] MinIO configuration complete"

              # --- Generate and store Harbor admin password ---
              log "[INFO] Seeding Harbor admin credentials..."
              ADMIN_PASSWORD=$(vault_get_or_generate "services/harbor" "admin-password")
              # Merge admin-password with existing MinIO fields
              vault_kv_put "services/harbor" \
                admin-password="${ADMIN_PASSWORD}" \
                access-key="${ACCESS_KEY}" \
                secret-key="${SECRET_KEY}" \
                minio-access-key="${ACCESS_KEY}" \
                minio-secret-key="${SECRET_KEY}"
              log "[INFO] Harbor admin credentials stored"

              # --- Generate and store harbor-pg DB password ---
              log "[INFO] Seeding harbor-pg database credentials..."
              DB_PASSWORD=$(vault_get_or_generate "services/database/harbor-pg" "password")
              vault_kv_put "services/database/harbor-pg" \
                username="harbor" \
                password="${DB_PASSWORD}"
              log "[INFO] harbor-pg database credentials stored"

              # --- Generate and store Valkey password ---
              log "[INFO] Seeding Harbor Valkey credentials..."
              VALKEY_PASSWORD=$(vault_get_or_generate "services/harbor/valkey" "password")
              vault_kv_put "services/harbor/valkey" \
                password="${VALKEY_PASSWORD}"
              log "[INFO] Harbor Valkey credentials stored"

              log "[INFO] harbor-init complete"
          volumeMounts:
            - name: bootstrap-secrets
              mountPath: /secrets
              readOnly: true
            - name: vault-bin
              mountPath: /vault-bin
              readOnly: true
            - name: mc-bin
              mountPath: /mc-bin
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
