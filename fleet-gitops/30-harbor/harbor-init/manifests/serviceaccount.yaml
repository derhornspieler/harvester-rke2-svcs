# harbor-init ServiceAccount — used by the init Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-init
  namespace: harbor
---
# eso-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: harbor
---
# external-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: harbor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harbor-init
  namespace: harbor
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-init
  namespace: harbor
subjects:
  - kind: ServiceAccount
    name: harbor-init
    namespace: harbor
roleRef:
  kind: Role
  name: harbor-init
  apiGroup: rbac.authorization.k8s.io
