# Bootstrap secrets pulled from Vault via ClusterSecretStore
# keycloak-admin-bootstrap: Keycloak admin password for OIDC client creation
# minio-admin-bootstrap: MinIO bootstrap admin creds for bucket/user creation
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-bootstrap
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-init
    app.kubernetes.io/component: bootstrap
spec:
  refreshInterval: "0"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-bootstrap
  target:
    name: keycloak-admin-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: keycloak-admin-password
      remoteRef:
        key: admin/keycloak
        property: admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-admin-bootstrap
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-init
    app.kubernetes.io/component: bootstrap
spec:
  refreshInterval: "0"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-bootstrap
  target:
    name: minio-admin-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: minio-root-user
      remoteRef:
        key: admin/minio
        property: root-user
    - secretKey: minio-root-password
      remoteRef:
        key: admin/minio
        property: root-password
