---
# Service account and SecretStores for harbor namespace credential generation.
# This bundle runs early (before minio) to break the minio↔harbor dependency
# loop: harbor creds must exist in Vault before minio-init can create SAs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: harbor
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: harbor
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-harbor"
          serviceAccountRef:
            name: "external-secrets"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-writer
  namespace: harbor
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-writer-harbor"
          serviceAccountRef:
            name: "external-secrets"
