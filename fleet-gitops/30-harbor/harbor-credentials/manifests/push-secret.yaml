# Password generators + PushSecret for Harbor service credentials
# Generates admin-password, minio-access-key, minio-secret-key
# then pushes all to Vault at services/harbor
# NOTE: DB password comes from CNPG (services/database/harbor-pg), not generated here
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-admin-password-gen
  namespace: harbor
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-minio-accesskey-gen
  namespace: harbor
spec:
  length: 20
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-minio-secretkey-gen
  namespace: harbor
spec:
  length: 40
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-generated-credentials
  namespace: harbor
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harbor-generated-credentials
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: harbor-admin-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "admin-password"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: harbor-minio-accesskey-gen
      rewrite:
        - regexp:
            source: "password"
            target: "minio-access-key"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: harbor-minio-secretkey-gen
      rewrite:
        - regexp:
            source: "password"
            target: "minio-secret-key"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-credentials-push
  namespace: harbor
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: harbor-generated-credentials
  data:
    - match:
        secretKey: admin-password
        remoteRef:
          remoteKey: services/harbor
          property: admin-password
    - match:
        secretKey: minio-access-key
        remoteRef:
          remoteKey: services/harbor
          property: minio-access-key
    - match:
        secretKey: minio-secret-key
        remoteRef:
          remoteKey: services/harbor
          property: minio-secret-key
