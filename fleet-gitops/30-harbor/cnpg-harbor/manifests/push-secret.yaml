# Password generators + PushSecret for CNPG MinIO backup credentials
# Generates ACCESS_KEY_ID and ACCESS_SECRET_KEY, then pushes to Vault
# Uses the existing vault-writer SecretStore in the database namespace
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: cnpg-minio-accesskey-gen
  namespace: database
spec:
  length: 20
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: cnpg-minio-secretkey-gen
  namespace: database
spec:
  length: 40
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-minio-generated-credentials
  namespace: database
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: cnpg-minio-generated-credentials
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: cnpg-minio-accesskey-gen
      rewrite:
        - regexp:
            source: "password"
            target: "ACCESS_KEY_ID"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: cnpg-minio-secretkey-gen
      rewrite:
        - regexp:
            source: "password"
            target: "ACCESS_SECRET_KEY"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cnpg-minio-credentials-push
  namespace: database
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: cnpg-minio-generated-credentials
  data:
    - match:
        secretKey: ACCESS_KEY_ID
        remoteRef:
          remoteKey: services/database/cnpg-minio
          property: ACCESS_KEY_ID
    - match:
        secretKey: ACCESS_SECRET_KEY
        remoteRef:
          remoteKey: services/database/cnpg-minio
          property: ACCESS_SECRET_KEY
---
# Password generator + PushSecret for Harbor PostgreSQL credentials
# Generates password and combines with static username "harbor",
# then pushes to Vault for the ExternalSecret to pull from
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-pg-password-gen
  namespace: database
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pg-generated-credentials
  namespace: database
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harbor-pg-generated-credentials
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        username: "harbor"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: harbor-pg-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "password"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-pg-credentials-push
  namespace: database
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: harbor-pg-generated-credentials
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: services/database/harbor-pg
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/database/harbor-pg
          property: password
