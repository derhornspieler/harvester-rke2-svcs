defaultNamespace: database
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-init
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: operators-cnpg
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
