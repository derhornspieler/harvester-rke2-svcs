defaultNamespace: harbor
helm:
  releaseName: harbor
  chart: ${OCI_HELM_PREFIX}/harbor
  version: "${CHART_VER_HARBOR}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: minio
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-cnpg
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-valkey
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
