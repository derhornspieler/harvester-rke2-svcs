defaultNamespace: harbor
helm:
  releaseName: harbor
  chart: ${OCI_HELM_PREFIX}/harbor
  version: "${CHART_VER_HARBOR}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: minio
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-cnpg
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-valkey
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
