apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: minio-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: minio-alerts
      rules:
        - alert: MinIODown
          expr: up{job="minio"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "MinIO is down"
            description: "MinIO instance {{ $labels.instance }} has been unreachable for more than 5 minutes."

        - alert: MinIODiskAlmostFull
          expr: (minio_node_disk_used_bytes / minio_node_disk_total_bytes) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "MinIO disk usage above 85%"
            description: "MinIO server {{ $labels.server }} disk usage is {{ $value | printf \"%.1f\" }}% for more than 10 minutes."

        - alert: MinIOHighErrorRate
          expr: sum(rate(minio_s3_requests_errors_total[5m])) / clamp_min(sum(rate(minio_s3_requests_total[5m])), 0.001) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MinIO S3 error rate above 5%"
            description: "MinIO S3 error rate is {{ $value | printf \"%.2f\" }} (>5%) for more than 5 minutes."
