# Password generator + PushSecret for Harbor Valkey credentials
# Generates password and pushes directly to Vault
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: valkey-password-gen
  namespace: harbor
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: valkey-credentials-push
  namespace: harbor
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    generatorRef:
      apiVersion: generators.external-secrets.io/v1alpha1
      kind: Password
      name: valkey-password-gen
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/harbor/valkey
          property: password
