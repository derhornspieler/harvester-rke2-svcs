# OpsTree Redis Operator — RedisSentinel CRD for Harbor
# Monitors the RedisReplication and provides HA failover
# Requires: redis-operator in redis-operator-system namespace
#
# Naming: CRD name "harbor-redis" → operator creates:
#   StatefulSet: harbor-redis-sentinel   Pods: harbor-redis-sentinel-{0,1,2}
#   Service:     harbor-redis-sentinel   Headless: harbor-redis-sentinel-headless
# NOTE: Do NOT use kubernetesConfig.redisSecret on sentinel — it sets both
# requirepass (sentinel's own auth) AND masterauth. Harbor chart has no
# sentinelPassword field, so sentinel requirepass blocks harbor-core.
# Instead, use redisSentinelConfig.redisReplicationPassword which sets
# ONLY masterauth (sentinel can auth to master, but clients can query
# sentinel without auth). Acceptable: sentinel is ClusterIP-only.
# If Harbor adds sentinelPassword support, re-enable requirepass.
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: harbor-redis
  namespace: harbor
spec:
  clusterSize: 3
  kubernetesConfig:
    image: ${IMAGE_REDIS_SENTINEL}
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
  redisSentinelConfig:
    redisReplicationName: harbor-redis
    masterGroupName: ${REDIS_MASTER_NAME}
    redisPort: "6379"
    quorum: "2"
    redisReplicationPassword:
      secretKeyRef:
        name: harbor-valkey-credentials
        key: password
  nodeSelector:
    workload-type: database
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # Sentinel writes config to /data
    capabilities:
      drop: ["ALL"]
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: harbor-redis-sentinel
            topologyKey: kubernetes.io/hostname
