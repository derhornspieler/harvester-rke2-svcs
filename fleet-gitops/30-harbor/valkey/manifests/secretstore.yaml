apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: harbor
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: harbor
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-harbor"
          serviceAccountRef:
            name: "external-secrets"
