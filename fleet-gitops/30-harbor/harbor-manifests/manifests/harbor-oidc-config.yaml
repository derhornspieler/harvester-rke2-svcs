apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc-secret
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harbor-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-secret
      remoteRef:
        key: oidc/harbor
        property: client-secret
---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-oidc-setup
  namespace: harbor
  annotations:
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: harbor-oidc-setup
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: configure-oidc
          image: curlimages/curl:8.12.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: harbor-admin-credentials
                  key: HARBOR_ADMIN_PASSWORD
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: harbor-oidc-secret
                  key: oidc-client-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Wait for Harbor API to be ready
              for i in $(seq 1 30); do
                if curl -sf -o /dev/null http://harbor-core.harbor.svc.cluster.local/api/v2.0/health; then
                  break
                fi
                echo "Waiting for Harbor API... ($i/30)"
                sleep 10
              done

              # Configure OIDC auth
              curl -sf -X PUT \
                -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                -H "Content-Type: application/json" \
                http://harbor-core.harbor.svc.cluster.local/api/v2.0/configurations \
                -d '{
                  "auth_mode": "oidc_auth",
                  "oidc_name": "Keycloak",
                  "oidc_endpoint": "https://keycloak.aegisgroup.ch/realms/platform",
                  "oidc_client_id": "harbor-oidc",
                  "oidc_client_secret": "'"${OIDC_CLIENT_SECRET}"'",
                  "oidc_scope": "openid,profile,email,groups",
                  "oidc_groups_claim": "groups",
                  "oidc_admin_group": "platform-admins",
                  "oidc_auto_onboard": true,
                  "oidc_verify_cert": false,
                  "oidc_user_claim": "preferred_username"
                }'
              echo "Harbor OIDC configuration applied successfully"
