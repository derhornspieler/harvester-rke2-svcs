apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc-secret
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harbor-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-secret
      remoteRef:
        key: oidc/harbor
        property: client-secret
---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-oidc-setup
  namespace: harbor
  annotations:
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: harbor-oidc-setup
    spec:
      serviceAccountName: harbor-init
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: configure-oidc
          image: ${IMAGE_CURL}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: harbor-admin-credentials
                  key: HARBOR_ADMIN_PASSWORD
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: harbor-oidc-secret
                  key: oidc-client-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Wait for Harbor API to be ready
              for i in $(seq 1 30); do
                if curl -sf -o /dev/null http://harbor-core.harbor.svc.cluster.local/api/v2.0/health; then
                  break
                fi
                echo "Waiting for Harbor API... ($i/30)"
                sleep 10
              done

              # Configure OIDC auth
              curl -sf -X PUT \
                -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                -H "Content-Type: application/json" \
                http://harbor-core.harbor.svc.cluster.local/api/v2.0/configurations \
                -d '{
                  "auth_mode": "oidc_auth",
                  "oidc_name": "Keycloak",
                  "oidc_endpoint": "'"${OIDC_ISSUER_URL}"'",
                  "oidc_client_id": "harbor",
                  "oidc_client_secret": "'"${OIDC_CLIENT_SECRET}"'",
                  "oidc_scope": "openid,profile,email,groups",
                  "oidc_groups_claim": "groups",
                  "oidc_admin_group": "'"${RBAC_GROUP_ADMINS}"'",
                  "oidc_auto_onboard": true,
                  "oidc_verify_cert": false,
                  "oidc_user_claim": "preferred_username"
                }'
              echo "Harbor OIDC configuration applied successfully"

              # Create CI robot account for GitLab runners to push images
              # Check if robot already exists
              ROBOT_NAME="ci-push"
              EXISTING=$(curl -sf -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                "http://harbor-core.harbor.svc.cluster.local/api/v2.0/robots?q=name%3D${ROBOT_NAME}" \
                2>/dev/null || echo "[]")

              ROBOT_ID=$(echo "${EXISTING}" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)

              if [ -n "${ROBOT_ID}" ]; then
                echo "Robot account '${ROBOT_NAME}' already exists (ID: ${ROBOT_ID})"
              else
                echo "Creating robot account '${ROBOT_NAME}'..."
                ROBOT_RESP=$(curl -sf -X POST \
                  -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                  -H "Content-Type: application/json" \
                  "http://harbor-core.harbor.svc.cluster.local/api/v2.0/robots" \
                  -d '{
                    "name": "'"${ROBOT_NAME}"'",
                    "description": "GitLab CI push account",
                    "duration": -1,
                    "level": "system",
                    "permissions": [
                      {
                        "kind": "project",
                        "namespace": "*",
                        "access": [
                          {"resource": "repository", "action": "push"},
                          {"resource": "repository", "action": "pull"},
                          {"resource": "artifact", "action": "read"},
                          {"resource": "tag", "action": "create"},
                          {"resource": "tag", "action": "list"}
                        ]
                      }
                    ]
                  }')

                ROBOT_SECRET=$(echo "${ROBOT_RESP}" | sed -n 's/.*"secret":"\([^"]*\)".*/\1/p')
                ROBOT_FULL_NAME=$(echo "${ROBOT_RESP}" | sed -n 's/.*"name":"\([^"]*\)".*/\1/p')

                if [ -n "${ROBOT_SECRET}" ]; then
                  echo "Robot account created: ${ROBOT_FULL_NAME}"

                  # Store robot credentials in Vault via harbor-init SA
                  VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  VAULT_TOKEN=$(curl -sk --request POST \
                    --data "{\"jwt\": \"${SA_TOKEN}\", \"role\": \"eso-writer-harbor\"}" \
                    "${VAULT_ADDR}/v1/auth/kubernetes/login" | \
                    sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')

                  if [ -n "${VAULT_TOKEN}" ]; then
                    curl -sk -X POST \
                      -H "X-Vault-Token: ${VAULT_TOKEN}" \
                      -H "Content-Type: application/json" \
                      "${VAULT_ADDR}/v1/kv/data/services/harbor/ci-robot" \
                      -d "{\"data\":{\"username\":\"${ROBOT_FULL_NAME}\",\"password\":\"${ROBOT_SECRET}\"}}"
                    echo "Robot credentials stored in Vault at services/harbor/ci-robot"
                  else
                    echo "WARNING: Could not authenticate to Vault — robot credentials not stored"
                  fi
                else
                  echo "WARNING: Failed to create robot account"
                  echo "Response: ${ROBOT_RESP}"
                fi
              fi
