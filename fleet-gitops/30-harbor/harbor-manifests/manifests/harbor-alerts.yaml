apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: harbor-alerts
  namespace: harbor
spec:
  groups:
    - name: harbor-alerts
      rules:
        - alert: HarborDown
          expr: up{job="harbor"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 'Harbor {{ "{{ $labels.component  }}" }} is down'
            description: 'Harbor {{ "{{ $labels.component  }}" }} has been unreachable for more than 5 minutes.'

        - alert: HarborHighErrorRate
          expr: sum(rate(harbor_core_http_request_total{job="harbor", code=~"5.."}[5m])) / sum(rate(harbor_core_http_request_total{job="harbor"}[5m])) * 100 > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Harbor HTTP 5xx error rate is high"
            description: 'Harbor core HTTP 5xx error rate is {{ "{{ $value | humanize }}" }}%.'

        - alert: HarborQuotaAlmostFull
          expr: (sum by (project_name) (harbor_project_quota_usage_byte{job="harbor"}) / sum by (project_name) (harbor_project_quota_byte{job="harbor"}) * 100) > 90
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: 'Harbor project {{ "{{ $labels.project_name  }}" }} quota nearly full'
            description: 'Project {{ "{{ $labels.project_name  }}" }} is at {{ "{{ $value | humanize }}" }}% quota.'

        - alert: HarborValkeyDown
          expr: up{job="harbor-valkey"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Harbor Valkey (Redis) is down"
            description: 'Harbor Valkey redis-exporter {{ "{{ $labels.instance  }}" }} has been unreachable for more than 5 minutes.'

        - alert: HarborValkeyHighMemory
          expr: (redis_memory_used_bytes{job="harbor-valkey"} / redis_memory_max_bytes{job="harbor-valkey"} * 100 > 80) and redis_memory_max_bytes{job="harbor-valkey"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Harbor Valkey memory usage is high"
            description: 'Harbor Valkey memory usage is at {{ "{{ $value | humanize }}" }}% of max.'

        - alert: HarborValkeyReplicationBroken
          expr: redis_connected_slaves{job="harbor-valkey"} < 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Harbor Valkey replication has fewer than 2 replicas"
            description: 'Harbor Valkey master has only {{ "{{ $value | humanize }}" }} connected slaves (expected 2).'
