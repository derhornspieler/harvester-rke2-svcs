defaultNamespace: harbor
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-core
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: operators-storage-autoscaler
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
    - apiVersion: autoscaling.volume-autoscaler.io/v1alpha1
      kind: VolumeAutoscaler
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
