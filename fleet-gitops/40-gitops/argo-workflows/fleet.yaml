defaultNamespace: argo-workflows
helm:
  releaseName: argo-workflows
  chart: ${OCI_HELM_PREFIX}/argo-workflows
  version: "${CHART_VER_ARGO_WORKFLOWS}"
  valuesFiles:
    - values.yaml
dependsOn:
  - name: gitops-workflows-init
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
