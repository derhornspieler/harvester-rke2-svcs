defaultNamespace: argo-workflows
helm:
  releaseName: argo-workflows
  chart: ${OCI_CHART_ARGO_WORKFLOWS}
  version: "${CHART_VER_ARGO_WORKFLOWS}"
  valuesFiles:
    - values.yaml
dependsOn:
  - name: gitops-workflows-init
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
