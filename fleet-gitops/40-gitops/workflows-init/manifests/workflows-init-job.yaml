---
# workflows-init: Binds ESO reader/writer roles and creates SecretStore for
# the argo-workflows namespace.
#
# Auth: K8s auth to Vault (bootstrap-base-argo-workflows role). NO root token.
# Requires: Vault unsealed with K8s auth configured.
# No OIDC client needed — Argo Workflows uses ArgoCD SSO or service tokens.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: workflows-init
  namespace: argo-workflows
  labels:
    app.kubernetes.io/name: workflows-init
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workflows-init
    spec:
      serviceAccountName: workflows-init
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: init-lib
          configMap:
            name: init-lib
      containers:
        - name: workflows-init
          image: ${IMAGE_ALPINE_K8S}
          env:
            - name: VAULT_ADDR
              value: "${VAULT_INTERNAL_URL}"
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              # workflows-init: bind ESO roles and create SecretStore for argo-workflows
              # Idempotent — safe to re-run.

              source /init-lib/init-lib.sh

              # --- Authenticate to Vault via K8s auth ---
              vault_k8s_login "bootstrap-base-argo-workflows"

              # --- Bind ESO reader/writer roles for argo-workflows namespace ---
              log "[INFO] Binding ESO roles for argo-workflows namespace..."
              vault_bind_eso_roles "argo-workflows"

              # --- Create namespace SecretStores ---
              vault_create_secretstore "argo-workflows"

              log "[INFO] workflows-init complete"
          volumeMounts:
            - name: init-lib
              mountPath: /init-lib
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
