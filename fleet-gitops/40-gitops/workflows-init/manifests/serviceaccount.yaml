apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflows-init
  namespace: argo-workflows
---
# eso-secrets SA — referenced by SecretStores created by init Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: argo-workflows
---
# external-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflows-init
  namespace: argo-workflows
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflows-init
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: workflows-init
    namespace: argo-workflows
roleRef:
  kind: Role
  name: workflows-init
  apiGroup: rbac.authorization.k8s.io
