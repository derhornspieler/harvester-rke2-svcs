defaultNamespace: argo-rollouts
helm:
  releaseName: argo-rollouts
  chart: ${OCI_HELM_PREFIX}/argo-rollouts
  version: "${CHART_VER_ARGO_ROLLOUTS}"
  valuesFiles:
    - values.yaml
dependsOn:
  - name: gitops-rollouts-init
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
