# ClusterAnalysisTemplates are cluster-scoped — no defaultNamespace
dependsOn:
  - name: gitops-rollouts-init
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
