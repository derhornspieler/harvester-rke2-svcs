  ## policy injects OIDC client secret). Without this, Fleet reports "Modified"
  ## because the secret isn't owned by the Helm release.
  secret:
    createSecret: false
  cm:
    timeout.reconciliation: 180s
    timeout.reconciliation.jitter: 60s
    url: https://argo.aegisgroup.ch
    oidc.config: |
      name: Keycloak
      issuer: https://keycloak.aegisgroup.ch/realms/platform
      clientID: argocd
      clientSecret: $oidc.keycloak.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
