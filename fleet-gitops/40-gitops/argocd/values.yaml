## Controller (Application Controller)
controller:
  replicas: 2

  resources:
    requests:
      cpu: 500m
      memory: 1Gi

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: argocd-application-controller
            topologyKey: kubernetes.io/hostname

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

## Server (API + UI)
server:
  replicas: 2

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 50

  resources:
    requests:
      cpu: 250m
      memory: 256Mi

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: argocd-server
            topologyKey: kubernetes.io/hostname

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

  # Disable built-in ingress — using Traefik IngressRoute
  ingress:
    enabled: false

## Repo Server
repoServer:
  replicas: 2

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 50

  resources:
    requests:
      cpu: 250m
      memory: 256Mi

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: argocd-repo-server
            topologyKey: kubernetes.io/hostname

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

## ApplicationSet Controller
applicationSet:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

## Redis HA (required for HA ArgoCD) — using Valkey image
redis-ha:
  enabled: true

  image:
    repository: valkey/valkey
    tag: 8-alpine

  replicas: 3

  haproxy:
    enabled: true
    image:
      repository: docker.io/library/haproxy
      tag: 2.9.4-alpine
    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: redis-ha-haproxy
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

  redis:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

  sentinel:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  persistentVolume:
    enabled: true
    size: 8Gi
    storageClass: harvester

  nodeSelector:
    workload-type: general

  affinity: |
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: redis-ha
            topologyKey: kubernetes.io/hostname

# Disable single-instance Redis (using redis-ha instead)
redis:
  enabled: false

## Dex (SSO) — disabled, using direct OIDC with Keycloak
dex:
  enabled: false

## Notifications — disabled for now
notifications:
  enabled: false
