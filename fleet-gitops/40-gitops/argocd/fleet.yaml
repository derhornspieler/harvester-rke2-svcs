defaultNamespace: argocd
helm:
  releaseName: argocd
  chart: ${OCI_HELM_PREFIX}/argo-cd
  version: "${CHART_VER_ARGOCD}"
  valuesFiles:
    - values.yaml
dependsOn:
  - name: gitops-argocd-init
  - name: argocd-credentials
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
