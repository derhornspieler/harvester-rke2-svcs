---
# argocd-init: Bootstrap Vault ESO roles, SecretStore, OIDC client, and seed
# credentials for the argocd namespace.
#
# Auth: K8s auth to Vault (bootstrap-keycloak-argocd role). NO root token.
# Requires: Vault unsealed, Keycloak running, keycloak-admin-bootstrap secret.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-init
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-init
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-init
    spec:
      serviceAccountName: argocd-init
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: init-lib
          configMap:
            name: init-lib
        - name: bootstrap-secrets
          secret:
            secretName: keycloak-admin-bootstrap
      containers:
        - name: argocd-init
          image: ${IMAGE_ALPINE_K8S}
          env:
            - name: VAULT_ADDR
              value: "${VAULT_INTERNAL_URL}"
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              # argocd-init: ESO roles, SecretStore, OIDC client, server secret key
              # Idempotent — safe to re-run.

              source /init-lib/init-lib.sh

              DOMAIN="${DOMAIN}"

              # --- Authenticate to Vault via K8s auth ---
              vault_k8s_login "bootstrap-keycloak-argocd"

              # --- Bind ESO reader/writer roles for argocd namespace ---
              vault_bind_eso_roles "argocd"

              # --- Create namespace SecretStores ---
              vault_create_secretstore "argocd"

              # --- Create ArgoCD OIDC client in Keycloak ---
              # ArgoCD doesn't send PKCE params, so PKCE is disabled.
              log "[INFO] Creating ArgoCD OIDC client..."
              keycloak_create_oidc_client "argocd" \
                "https://argocd.${DOMAIN}/auth/callback" \
                "disabled"
              log "[INFO] ArgoCD OIDC client created"

              # --- Generate server secret key and merge with OIDC creds ---
              # keycloak_create_oidc_client already stored client-secret and
              # cookie-secret at kv/oidc/argocd. Read them back, generate the
              # server-secretkey, and write all three together (vault_kv_put
              # replaces the entire key).
              log "[INFO] Generating ArgoCD server secret key..."
              CLIENT_SECRET=$(vault kv get -field=client-secret kv/oidc/argocd)
              COOKIE_SECRET=$(vault kv get -field=cookie-secret kv/oidc/argocd)
              SERVER_KEY=$(vault_get_or_generate "oidc/argocd" "server-secretkey" 64)
              vault_kv_put "oidc/argocd" \
                client-secret="${CLIENT_SECRET}" \
                cookie-secret="${COOKIE_SECRET}" \
                server-secretkey="${SERVER_KEY}"
              log "[INFO] ArgoCD credentials stored in Vault"

              log "[INFO] argocd-init complete"
          volumeMounts:
            - name: init-lib
              mountPath: /init-lib
              readOnly: true
            - name: bootstrap-secrets
              mountPath: /secrets
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
