apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-init
  namespace: argocd
---
# eso-secrets SA — referenced by SecretStores created by init Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: argocd
---
# external-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-init
  namespace: argocd
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-init
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-init
    namespace: argocd
roleRef:
  kind: Role
  name: argocd-init
  apiGroup: rbac.authorization.k8s.io
