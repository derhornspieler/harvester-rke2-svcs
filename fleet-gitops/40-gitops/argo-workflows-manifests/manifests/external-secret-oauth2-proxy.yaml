apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-workflows
  namespace: argo-workflows
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: oauth2-proxy-workflows
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: oidc/workflows-oidc
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: oidc/workflows-oidc
        property: cookie-secret
