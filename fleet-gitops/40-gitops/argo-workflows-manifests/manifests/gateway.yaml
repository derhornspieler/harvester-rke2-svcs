apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argo-workflows
  namespace: argo-workflows
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/duration: "720h"
    cert-manager.io/renew-before: "168h"
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: workflows.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: workflows-aegisgroup-ch-tls
      allowedRoutes:
        namespaces:
          from: Same
