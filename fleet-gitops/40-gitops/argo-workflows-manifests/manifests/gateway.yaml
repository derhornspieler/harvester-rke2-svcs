apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argo-workflows
  namespace: argo-workflows
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/duration: "720h"
    cert-manager.io/renew-before: "168h"
spec:
  gatewayClassName: ${GATEWAY_CLASS}
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: ${WORKFLOWS_FQDN}
      tls:
        mode: Terminate
        certificateRefs:
          - name: ${WORKFLOWS_TLS_SECRET}
      allowedRoutes:
        namespaces:
          from: Same
