---
# golden-image-watcher-setup: Creates GitLab project access token and stores
# watcher credentials in Vault for the golden-image-watcher CronWorkflow.
# Requires: GitLab running, Vault running, harvester-golden-images project on GitLab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: golden-image-watcher-setup
  namespace: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: golden-image-watcher-setup
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-init-keys", "gitlab-gitlab-initial-root-password"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: golden-image-watcher-setup
subjects:
  - kind: ServiceAccount
    name: golden-image-watcher-setup
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: golden-image-watcher-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: golden-image-watcher-setup
  namespace: argo-workflows
  labels:
    app.kubernetes.io/name: golden-image-watcher-setup
    app.kubernetes.io/component: bootstrap
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golden-image-watcher-setup
    spec:
      serviceAccountName: golden-image-watcher-setup
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: setup
          image: ${IMAGE_ALPINE_K8S}
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              DOMAIN="${DOMAIN}"
              GITLAB_URL="https://gitlab.${DOMAIN}"
              GITLAB_REPO_URL="gitlab.${DOMAIN}/infra_and_platform_services/harvester-golden-images.git"
              PROJECT_PATH="infra_and_platform_services/harvester-golden-images"

              log()  { echo "[$(date +%H:%M:%S)] $*"; }
              die()  { log "FATAL: $*"; exit 1; }

              # --- Load Vault root token ---
              init_json=$(kubectl get secret vault-init-keys -n vault \
                -o jsonpath='{.data.init\.json}' | base64 -d)
              ROOT_TOKEN=$(echo "$init_json" | \
                grep -o '"root_token"[[:space:]]*:[[:space:]]*"[^"]*"' | \
                grep -o '"[^"]*"$' | tr -d '"')
              [[ -n "$ROOT_TOKEN" ]] || die "Failed to extract root_token"

              vexec() {
                kubectl exec -n vault vault-0 -- env \
                  VAULT_ADDR=http://127.0.0.1:8200 \
                  VAULT_TOKEN="${ROOT_TOKEN}" \
                  vault "$@"
              }

              # --- Check if watcher credentials already exist in Vault ---
              existing_token=$(vexec kv get -field=token kv/services/ci/golden-image-watcher 2>/dev/null || true)
              if [[ -n "$existing_token" ]]; then
                log "Watcher credentials already in Vault — skipping"
                exit 0
              fi

              # --- Get GitLab root password ---
              GITLAB_ROOT_PASS=$(kubectl get secret gitlab-gitlab-initial-root-password -n gitlab \
                -o jsonpath='{.data.password}' | base64 -d)
              [[ -n "$GITLAB_ROOT_PASS" ]] || die "Could not read GitLab root password"

              # --- Wait for GitLab API ---
              log "Waiting for GitLab API..."
              for i in $(seq 1 60); do
                _code=$(curl -sk -o /dev/null -w "%{http_code}" "${GITLAB_URL}/users/sign_in" 2>/dev/null)
                if [[ "$_code" == "200" || "$_code" == "302" ]]; then break; fi
                sleep 5
              done
              _code=$(curl -sk -o /dev/null -w "%{http_code}" "${GITLAB_URL}/users/sign_in" 2>/dev/null)
              [[ "$_code" == "200" || "$_code" == "302" ]] || die "GitLab not ready (HTTP ${_code})"
              log "GitLab is ready"

              # --- Authenticate as root ---
              AUTH_RESP=$(curl -sk --data "grant_type=password&username=root&password=${GITLAB_ROOT_PASS}" \
                "${GITLAB_URL}/oauth/token")
              TOKEN=$(echo "$AUTH_RESP" | jq -r '.access_token // empty')
              [[ -n "$TOKEN" ]] || die "Could not authenticate as root: ${AUTH_RESP}"

              # --- Find the project ---
              log "Looking for project: ${PROJECT_PATH}"
              ENCODED_PATH=$(echo "${PROJECT_PATH}" | sed 's|/|%2F|g')
              PROJ_RESP=$(curl -sk -H "Authorization: Bearer ${TOKEN}" \
                "${GITLAB_URL}/api/v4/projects/${ENCODED_PATH}" 2>&1 || true)
              PROJECT_ID=$(echo "$PROJ_RESP" | jq -r '.id // empty' 2>/dev/null || true)

              if [[ -z "$PROJECT_ID" ]]; then
                # Create the infra_and_platform_services group if needed
                log "Project not found — creating group 'infra_and_platform_services'..."
                GROUPS_RESP=$(curl -sk -H "Authorization: Bearer ${TOKEN}" \
                  "${GITLAB_URL}/api/v4/groups?search=infra_and_platform_services" || true)
                GROUP_ID=$(echo "$GROUPS_RESP" | jq -r '.[0].id // empty' 2>/dev/null || true)

                if [[ -z "$GROUP_ID" ]]; then
                  GROUP_RESP=$(curl -sk -X POST \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    "${GITLAB_URL}/api/v4/groups" \
                    -d '{"name":"Infra and Platform Services","path":"infra_and_platform_services","visibility":"internal"}')
                  GROUP_ID=$(echo "$GROUP_RESP" | jq -r '.id // empty')
                  [[ -n "$GROUP_ID" ]] || die "Failed to create group: ${GROUP_RESP}"
                  log "Created group: infra_and_platform_services (ID: ${GROUP_ID})"
                fi

                # Create the project
                log "Creating project: ${PROJECT_PATH}"
                CREATE_RESP=$(curl -sk -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  "${GITLAB_URL}/api/v4/projects" \
                  -d "{\"name\":\"harvester-golden-images\",\"namespace_id\":${GROUP_ID},\"visibility\":\"internal\",\"initialize_with_readme\":false}")
                PROJECT_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')
                [[ -n "$PROJECT_ID" ]] || die "Failed to create project: ${CREATE_RESP}"
                log "Created project: ${PROJECT_PATH} (ID: ${PROJECT_ID})"
              else
                log "Found project: ${PROJECT_PATH} (ID: ${PROJECT_ID})"
              fi

              # --- Create Project Access Token ---
              log "Creating project access token for watcher..."
              EXPIRES_AT=$(date -d "+1 year" +%Y-%m-%d 2>/dev/null || date -v+1y +%Y-%m-%d 2>/dev/null)
              PAT_RESP=$(curl -sk -X POST \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                "${GITLAB_URL}/api/v4/projects/${PROJECT_ID}/access_tokens" \
                -d "{\"name\":\"golden-image-watcher\",\"scopes\":[\"read_repository\",\"write_repository\"],\"access_level\":40,\"expires_at\":\"${EXPIRES_AT}\"}")

              PAT_TOKEN=$(echo "$PAT_RESP" | jq -r '.token // empty')
              [[ -n "$PAT_TOKEN" ]] || die "Failed to create project access token: ${PAT_RESP}"
              log "Project access token created"

              # --- Store in Vault ---
              vexec kv put kv/services/ci/golden-image-watcher \
                username="golden-image-watcher" \
                token="${PAT_TOKEN}" \
                repo-url="${GITLAB_REPO_URL}"
              log "Watcher credentials stored in Vault at services/ci/golden-image-watcher"

              log "Golden image watcher setup complete"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
