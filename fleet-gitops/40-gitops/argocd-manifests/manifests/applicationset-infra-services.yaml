# ApplicationSet: Auto-discover and deploy services from the
# infra_and_platform_services GitLab group.
#
# Convention: Any repo in this group with a 'deploy' branch containing
# k8s/overlays/rke2-prod/kustomization.yaml is automatically deployed.
# The Kustomize overlay controls the target namespace.
#
# Requires: gitlab-scm-token Secret with read_api token in argocd namespace.
# See: docs/superpowers/specs/2026-03-16-gitlab-migration-argocd-github-mirror-design.md
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-platform-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  preservedFields:
    - annotations
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - scmProvider:
        gitlab:
          group: "infra_and_platform_services"
          api: "https://gitlab.example.com"
          tokenRef:
            secretName: gitlab-scm-token
            key: token
          includeSubgroups: true
        cloneProtocol: https
        filters:
          - repositoryMatch: ".*"
            branchMatch: "^deploy$"
  template:
    metadata:
      name: '{{.repository}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: applicationset
        app.kubernetes.io/part-of: infra-platform-services
    spec:
      project: default
      source:
        repoURL: '{{.url}}'
        targetRevision: deploy
        path: k8s/overlays/rke2-prod
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.repository}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - ServerSideApply=true
