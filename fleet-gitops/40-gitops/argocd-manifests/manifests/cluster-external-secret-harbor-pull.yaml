# ClusterExternalSecret: provisions Harbor imagePullSecret in all ArgoCD-managed namespaces
# Matches namespaces labeled platform.example.com/managed-by=argocd
# (label added by ApplicationSet managedNamespaceMetadata).
# Uses vault-bootstrap ClusterSecretStore to read Harbor robot credentials.
---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: harbor-pull-secret
spec:
  namespaceSelectors:
    - matchLabels:
        platform.example.com/managed-by: argocd
  refreshTime: 5m
  externalSecretSpec:
    secretStoreRef:
      name: vault-bootstrap
      kind: ClusterSecretStore
    refreshInterval: 1h
    target:
      name: harbor-pull-secret
      creationPolicy: Owner
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: '{"auths":{"harbor.dev.${DOMAIN}":{"username":"{{ "{{ .username }}" }}","password":"{{ "{{ .password }}" }}","auth":"{{ "{{ printf \"%s:%s\" .username .password | b64enc }}" }}"}}}'
    data:
      - secretKey: username
        remoteRef:
          key: services/harbor/ci-robot
          property: username
      - secretKey: password
        remoteRef:
          key: services/harbor/ci-robot
          property: password
