---
apiVersion: autoscaling.volume-autoscaler.io/v1alpha1
kind: VolumeAutoscaler
metadata:
  name: argocd-redis
  namespace: argocd
spec:
  target:
    selector:
      matchLabels:
        app: redis-ha
  prometheusURL: ${PROMETHEUS_INTERNAL_URL}
  thresholdPercent: 80
  maxSize: 30Gi
  increasePercent: 25
  increaseMinimum: 2Gi
  pollInterval: 120s
  cooldownPeriod: 10m
