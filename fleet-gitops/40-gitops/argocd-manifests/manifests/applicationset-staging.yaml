apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: staging-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: "https://${GITLAB_FQDN}/platform/platform-deployments.git"
        revision: main
        directories:
          - path: "staging/*/*"
  template:
    metadata:
      name: 'staging-{{ "{{ .path.basename }}" }}'
      labels:
        app.kubernetes.io/part-of: '{{ "{{ index .path.segments 1 }}" }}'
        environment: staging
    spec:
      project: developer-staging
      source:
        repoURL: "https://${GITLAB_FQDN}/platform/platform-deployments.git"
        targetRevision: main
        path: '{{ "{{ .path.path }}" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'staging-{{ "{{ .path.basename }}" }}'
      syncPolicy:
        automated:
          prune: true
        managedNamespaceMetadata:
          labels:
            platform.aegisgroup.ch/environment: staging
            platform.aegisgroup.ch/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
