apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: staging-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: "https://${GITLAB_FQDN}/platform/platform-deployments.git"
        revision: main
        directories:
          - path: "staging/*/*"
  template:
    metadata:
      name: 'staging-{{ "{{ .path.basename }}" }}'
      labels:
        app.kubernetes.io/part-of: '{{ "{{ index .path.segments 1 }}" }}'
        environment: staging
    spec:
      project: developer-staging
      source:
        repoURL: "https://${GITLAB_FQDN}/platform/platform-deployments.git"
        targetRevision: main
        path: '{{ "{{ .path.path }}" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'staging-{{ "{{ .path.basename }}" }}'
      ignoreDifferences:
        - group: ""
          kind: Service
          jqPathExpressions:
            - .spec.selector
        - group: argoproj.io
          kind: Rollout
          jqPathExpressions:
            - .spec.replicas
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .status
      syncPolicy:
        automated:
          prune: true
        managedNamespaceMetadata:
          labels:
            ${LABEL_PREFIX}/environment: staging
            ${LABEL_PREFIX}/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
