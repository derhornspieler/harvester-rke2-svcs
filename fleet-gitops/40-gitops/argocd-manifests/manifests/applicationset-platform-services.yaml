apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: "https://gitlab.${DOMAIN}/platform/platform-deployments.git"
        revision: main
        directories:
          - path: "services/*"
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: developer-apps
      source:
        repoURL: "https://gitlab.${DOMAIN}/platform/platform-deployments.git"
        targetRevision: main
        path: "{{path}}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "app-{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - PruneLast=true
