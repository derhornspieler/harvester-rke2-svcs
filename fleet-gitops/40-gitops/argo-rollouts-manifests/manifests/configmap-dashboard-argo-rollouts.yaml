apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argo-rollouts
  namespace: argo-rollouts
  labels:
    app: grafana
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Services
data:
  argo-rollouts-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "id": null,
      "links": [{"title": "Back to Home", "url": "/d/home-overview/cluster-home?orgId=1", "icon": "external link", "targetBlank": false, "type": "link"}],
      "panels": [
        {
          "title": "Controllers",
          "description": "Argo Rollouts controller pods up",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 2}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "count(up{job=\"argo-rollouts-metrics\"} == 1) or vector(0)", "legendFormat": "Up", "refId": "A"}]
        },
        {
          "title": "Reconcile Rate",
          "description": "Rollout reconciliations per second (should be > 0 when rollouts are active)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 4, "y": 0},
          "id": 2,
          "fieldConfig": {"defaults": {"unit": "ops", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(rate(rollout_reconcile_count{job=\"argo-rollouts-metrics\"}[5m])) or vector(0)", "legendFormat": "ops/s", "refId": "A"}]
        },
        {
          "title": "Queue Depth",
          "description": "Items waiting in the controller workqueue (0 = healthy, >10 = backlog)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 9, "y": 0},
          "id": 3,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 5}, {"color": "red", "value": 20}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(workqueue_depth{job=\"argo-rollouts-metrics\"}) or vector(0)", "refId": "A"}]
        },
        {
          "title": "K8s API Rate",
          "description": "Kubernetes API requests per second from the controller",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 14, "y": 0},
          "id": 4,
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(rate(controller_clientset_k8s_request_total{job=\"argo-rollouts-metrics\"}[5m])) or vector(0)", "refId": "A"}]
        },
        {
          "title": "Go Memory",
          "description": "Go heap memory allocated",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 19, "y": 0},
          "id": 5,
          "fieldConfig": {"defaults": {"unit": "bytes", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 268435456}, {"color": "red", "value": 536870912}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "go_memstats_alloc_bytes{job=\"argo-rollouts-metrics\"}", "legendFormat": "Heap", "refId": "A"}]
        },
        {
          "title": "Reconciliation by Result",
          "description": "Reconciliation operations per second by outcome (success/error/requeue)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 6,
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [{"expr": "sum(rate(rollout_reconcile_count{job=\"argo-rollouts-metrics\"}[5m])) by (result)", "legendFormat": "{{ "{{result}}" }}", "refId": "A"}]
        },
        {
          "title": "Reconciliation Duration",
          "description": "Reconciliation latency percentiles",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 7,
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(rollout_reconcile_bucket{job=\"argo-rollouts-metrics\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.99, sum(rate(rollout_reconcile_bucket{job=\"argo-rollouts-metrics\"}[5m])) by (le))", "legendFormat": "p99", "refId": "B"}
          ]
        },
        {
          "title": "Workqueue Depth + Latency",
          "description": "Queue depth and p99 queue wait time",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 8,
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "stacking": {"mode": "none"}, "spanNulls": false}}, "overrides": [{"matcher": {"id": "byRegexp", "options": "p99.*"}, "properties": [{"id": "unit", "value": "s"}, {"id": "custom.axisPlacement", "value": "right"}]}]},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "workqueue_depth{job=\"argo-rollouts-metrics\"}", "legendFormat": "Depth: {{ "{{name}}" }}", "refId": "A"},
            {"expr": "histogram_quantile(0.99, sum(rate(workqueue_queue_duration_seconds_bucket{job=\"argo-rollouts-metrics\"}[5m])) by (le, name))", "legendFormat": "p99: {{ "{{name}}" }}", "refId": "B"}
          ]
        },
        {
          "title": "K8s API Requests by Verb",
          "description": "Kubernetes API request rate by HTTP verb and status code",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 9,
          "fieldConfig": {"defaults": {"unit": "reqps", "custom": {"drawStyle": "line", "lineWidth": 1, "fillOpacity": 10, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [{"expr": "sum(rate(controller_clientset_k8s_request_total{job=\"argo-rollouts-metrics\"}[5m])) by (status_code, verb)", "legendFormat": "{{ "{{verb}}" }} {{ "{{status_code}}" }}", "refId": "A"}]
        }
      ],
      "schemaVersion": 39,
      "tags": ["argo-rollouts", "deployments", "ci-cd"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Argo Rollouts Overview",
      "uid": "argo-rollouts-overview",
      "version": 3,
      "description": "Argo Rollouts controller monitoring — health, reconciliation performance, workqueue metrics, and K8s API usage."
    }
