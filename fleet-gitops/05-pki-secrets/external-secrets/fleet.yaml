defaultNamespace: external-secrets
helm:
  releaseName: external-secrets
  chart: ${OCI_HELM_PREFIX}/external-secrets
  version: "${CHART_VER_EXTERNAL_SECRETS}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: vault-init-wait
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
