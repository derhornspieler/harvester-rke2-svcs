defaultNamespace: vault
helm:
  chart: ${OCI_FLEET_PREFIX}/pki-vault-unsealer
  version: "1.0.2"
  releaseName: pki-vault-unsealer
dependsOn:
  - name: pki-vault-init

diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
