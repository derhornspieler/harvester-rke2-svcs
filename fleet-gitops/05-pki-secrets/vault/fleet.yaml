defaultNamespace: vault
helm:
  releaseName: vault
  chart: ${OCI_HELM_PREFIX}/vault
  version: "${CHART_VER_VAULT}"
  valuesFiles:
    - values.yaml
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
