# ClusterSecretStore for bootstrap credential access.
# Init Jobs use this to read admin creds (Keycloak, MinIO) from Vault
# before their namespace-scoped SecretStores exist.
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-bootstrap
spec:
  provider:
    vault:
      server: ${VAULT_INTERNAL_URL}
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: bootstrap-cluster-reader
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
