defaultNamespace: external-secrets
helm:
  releaseName: pki-vault-bootstrap-store
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: pki-external-secrets
diff:
  comparePatches:
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
