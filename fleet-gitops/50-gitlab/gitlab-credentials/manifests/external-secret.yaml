apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-gitaly-secret
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-gitaly-secret
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: services/gitlab/gitaly-secret
        property: token
