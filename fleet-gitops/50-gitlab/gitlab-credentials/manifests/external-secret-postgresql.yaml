# ExternalSecret for GitLab PostgreSQL credentials
# Pulls from Vault path services/database/gitlab-postgresql
# (pushed by cnpg-gitlab PushSecret from auto-generated CNPG secret)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-postgresql-app
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-postgresql-app
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: services/database/gitlab-postgresql
        property: password
    - secretKey: username
      remoteRef:
        key: services/database/gitlab-postgresql
        property: username
