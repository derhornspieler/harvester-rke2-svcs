apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-license
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-license
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: services/gitlab
