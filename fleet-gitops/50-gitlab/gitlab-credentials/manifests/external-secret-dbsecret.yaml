apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-praefect-dbsecret
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-praefect-dbsecret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: services/gitlab/praefect-dbsecret
        property: secret
