defaultNamespace: gitlab
helm:
  releaseName: gitlab
  chart: ${OCI_HELM_PREFIX}/gitlab
  version: "${CHART_VER_GITLAB}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: gitlab-cnpg
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: gitlab-redis
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: harbor-core
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
