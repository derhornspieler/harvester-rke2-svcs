defaultNamespace: gitlab
helm:
  releaseName: gitlab
  chart: ${OCI_HELM_PREFIX}/gitlab
  version: "${CHART_VER_GITLAB}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: cnpg-gitlab
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: redis-gitlab
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
