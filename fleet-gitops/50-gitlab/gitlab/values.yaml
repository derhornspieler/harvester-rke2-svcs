## GitLab Helm Chart — Platform Values (Medium Production)
##
## Node scheduling strategy:
##   - Lightweight (shell, kas, exporter, toolbox, registry, minio)  → general
##   - Heavy       (webservice, sidekiq, gitaly, praefect)           → compute
##   - Stateful    (CNPG PostgreSQL, OpsTree Redis)                  → database
##
## TLS: cert-manager with vault-issuer ClusterIssuer (already deployed)
## Storage class: ${STORAGE_CLASS}
## Ingress: Gateway API (${GATEWAY_CLASS} as GatewayClass) — NOT standard Ingress
## Redis: OpsTree Redis Operator (RedisReplication + RedisSentinel CRs)
## PostgreSQL: CloudNativePG operator (Cluster CR)
## ──────────────────────────────────────────────────────────────────────────────

global:
  edition: ee

  ## ── Enterprise Activation Code (synced from Vault via ESO) ────────────────
  ## Activation code stored in Vault kv/services/gitlab, synced to K8s secret
  ## gitlab-license by ExternalSecret, injected as GITLAB_ACTIVATION_CODE env var.
  extraEnvFrom:
    GITLAB_ACTIVATION_CODE:
      secretKeyRef:
        name: gitlab-license
        key: activation-code

  ## ── MinIO — using shared MinIO from minio namespace (Bundle 2) ────────────
  ## Shared MinIO serves Harbor, GitLab, and CNPG backups.
  ## Dedicated user: gitlab-minio-admin (readwrite policy)
  minio:
    enabled: false

  ## ── Hostnames ──────────────────────────────────────────────────────────────
  hosts:
    domain: ${DOMAIN}
    https: true

  ## ── Gateway API (Traefik) ─────────────────────────────────────────────────
  ## Uses Gateway API instead of standard Ingress. Our own Gateway is defined
  ## in services/gitlab/gateway.yaml — the chart creates HTTPRoutes that
  ## reference it via gatewayRef.
  ingress:
    enabled: false
    configureCertmanager: false   # Prevent certmanager-issuer Job (we use vault-issuer)
  gatewayApi:
    enabled: true
    installEnvoy: false          # We use Traefik, not Envoy
    configureCertmanager: false   # We use vault-issuer, not ACME
    gatewayRef:
      name: gitlab
      namespace: gitlab

  ## ── External PostgreSQL (CloudNativePG) ────────────────────────────────────
  ## Primary (read-write): CNPG -rw service targets only the current primary.
  ## Read replicas: CNPG -ro service load-balances across standby replicas.
  ## GitLab Rails routes SELECT queries to replicas via load_balancing.hosts,
  ## reducing primary load and improving read-heavy workload performance.
  psql:
    host: ${GITLAB_DB_HOST_RW}
    port: 5432
    username: gitlab
    database: ${GITLAB_DB_NAME}
    preparedStatements: false
    applicationName: gitlab
    password:
      useSecret: true
      secret: gitlab-postgresql-app
      key: password
    connectTimeout: 10
    keepalives: 1
    keepalivesIdle: 30
    keepalivesInterval: 10
    keepalivesCount: 3
    tcpUserTimeout: 60000
    ## ── Read-Replica Load Balancing ──────────────────────────────────────────
    ## PgBouncer pooler-ro distributes connections across standby replicas.
    ## Rails checks replication lag and falls back to primary if replicas
    ## are too far behind (default: 8MB difference or 60s lag).
    load_balancing:
      hosts:
        - ${GITLAB_DB_HOST_RO}

  ## ── External Redis (OpsTree Sentinel HA) ──────────────────────────────────
  ## Sentinel-aware: GitLab discovers the current primary via Sentinel.
  ## "host" is the Sentinel master name, NOT a hostname.
  ## Uses the ClusterIP service created by OpsTree Redis Operator — it
  ## load-balances across all sentinel pods, so a single entry suffices.
  redis:
    host: ${REDIS_MASTER_NAME}
    port: 6379
    auth:
      enabled: true
      secret: gitlab-redis-credentials
      key: password
    sentinels:
      - host: ${GITLAB_REDIS_SENTINEL}
        port: 26379

  ## ── Gitaly ─────────────────────────────────────────────────────────────────
  ## Praefect manages virtual storages and Gitaly routing
  gitaly:
    enabled: true
    authToken:
      secret: gitlab-gitaly-secret
      key: token

  ## ── Praefect (Gitaly HA) ──────────────────────────────────────────────────
  ## Praefect sits in front of Gitaly, providing replication, load balancing,
  ## and automatic failover across 3 Gitaly replicas.
  praefect:
    enabled: true
    replaceInternalGitaly: true
    autoMigrate: true
    dbSecret:
      secret: gitlab-praefect-dbsecret
      key: secret
    virtualStorages:
      - name: default
        gitalyReplicas: 3
        maxUnavailable: 1
    psql:
      host: ${GITLAB_DB_HOST_RW}
      port: 5432
      user: praefect
      dbName: praefect
      sslMode: disable

  ## ── Monitoring ─────────────────────────────────────────────────────────────
  ## The kube-prometheus-stack Fleet bundle provides Prometheus Operator CRDs.
  ## Chart creates ServiceMonitors for all GitLab components.
  monitoring:
    enabled: true

  shell:
    port: 22

  time_zone: UTC

  ## ── Default node selector ──────────────────────────────────────────────────
  ## Most components land on general workers by default.
  ## Heavy components override this below.
  nodeSelector:
    workload-type: general

  ## ── OIDC (Keycloak) ───────────────────────────────────────────────────────
  appConfig:
    omniauth:
      enabled: true
      allowSingleSignOn: ['openid_connect']
      blockAutoCreatedUsers: false
      autoLinkUser: ['openid_connect']
      providers:
        - secret: gitlab-oidc-secret
          key: provider

    ## ── Object Storage (shared MinIO in minio namespace) ───────────────────
    ## All GitLab object types use the consolidated object_store config.
    ## Endpoint: ${MINIO_INTERNAL_URL} (HTTP, not HTTPS)
    object_store:
      enabled: true
      proxy_download: true
      connection:
        secret: gitlab-minio-storage
        key: connection
    lfs:
      bucket: ${MINIO_BUCKET_GITLAB_LFS}
    artifacts:
      bucket: ${MINIO_BUCKET_GITLAB_ARTIFACTS}
    uploads:
      bucket: ${MINIO_BUCKET_GITLAB_UPLOADS}
    packages:
      bucket: ${MINIO_BUCKET_GITLAB_PACKAGES}
    externalDiffs:
      bucket: ${MINIO_BUCKET_GITLAB_MR_DIFFS}
    terraformState:
      bucket: ${MINIO_BUCKET_GITLAB_TERRAFORM}
    ciSecureFiles:
      bucket: ${MINIO_BUCKET_GITLAB_CI_SECURE_FILES}
    dependencyProxy:
      bucket: ${MINIO_BUCKET_GITLAB_DEPENDENCY_PROXY}

  ## ── Root CA Trust (Vault CA) ──────────────────────────────────────────────
  certificates:
    customCAs:
      - secret: gitlab-root-ca

## ── Disable bundled services (using external) ────────────────────────────────
postgresql:
  install: false
redis:
  install: false
prometheus:
  install: false
gitlab-runner:
  install: false

## ── cert-manager — already installed, do not reinstall via chart ─────────────
installCertmanager: false

## ── cert-manager issuer ──────────────────────────────────────────────────────
## Disabled via global.ingress.configureCertmanager=false and
## global.gatewayApi.configureCertmanager=false. No Job or Issuer created.
## We use vault-issuer ClusterIssuer for TLS instead of ACME.
certmanager-issuer:
  email: ${PLATFORM_ADMIN_EMAIL}

## ── Disable bundled NGINX ingress (using Traefik) ────────────────────────────
nginx-ingress:
  enabled: false

## ── Traefik subchart — do NOT install (already running as RKE2 DaemonSet) ───
traefik:
  install: false

## ── Container Registry — DISABLED (Harbor is the platform registry) ─────────
registry:
  enabled: false

## ── GitLab Sub-Charts ────────────────────────────────────────────────────────
gitlab:

  ## ── Webservice (Rails + Workhorse) → COMPUTE nodes ────────────────────────
  ## Medium production: handles concurrent users, API traffic, web UI.
  webservice:
    replicaCount: 2
    minReplicas: 2
    maxReplicas: 10
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: "1"
        memory: 2.5Gi
    workhorse:
      resources:
        requests:
          cpu: 200m
          memory: 200Mi
    livenessProbe:
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 30
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: "10%"
          maxUnavailable: 0
    terminationGracePeriodSeconds: 60
    shutdown:
      blackoutSeconds: 10

  ## ── Sidekiq (Background Jobs) → COMPUTE nodes ────────────────────────────
  ## Medium production: CI pipelines, emails, repository maintenance.
  sidekiq:
    replicas: 2
    minReplicas: 2
    maxReplicas: 5
    hpa:
      cpu:
        targetAverageValue: 800m
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
    livenessProbe:
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 30
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: "10%"
          maxUnavailable: 0
    terminationGracePeriodSeconds: 600

  ## ── Gitaly (Git storage) → COMPUTE nodes ──────────────────────────────────
  ## Praefect creates 3 Gitaly replicas (per virtualStorages above).
  ## These settings apply as defaults to all Praefect-managed Gitaly pods.
  gitaly:
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
    persistence:
      enabled: true
      size: 100Gi
      accessMode: ReadWriteOnce
      storageClass: ${STORAGE_CLASS}
    maxUnavailable: 1

  ## ── Praefect (Gitaly HA proxy) → COMPUTE nodes ───────────────────────────
  ## 2-replica StatefulSet proxying requests to Gitaly replicas.
  praefect:
    nodeSelector:
      workload-type: compute
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  ## ── GitLab Shell (SSH) → general nodes ────────────────────────────────────
  gitlab-shell:
    replicaCount: 2
    minReplicas: 2
    maxReplicas: 6
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 100m
        memory: 150Mi
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: "10%"
          maxUnavailable: 0
    terminationGracePeriodSeconds: 60
    ## SSH exposed via Gateway API TCPRoute (services/gitlab/tcproute-ssh.yaml)
    ## Managed externally — chart's built-in gatewayRoute not used
    gatewayRoute:
      enabled: false

  ## ── KAS (Kubernetes Agent Server) → general nodes ─────────────────────────
  kas:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 100m
        memory: 150Mi

  ## ── GitLab Exporter → general nodes ───────────────────────────────────────
  gitlab-exporter:
    enabled: true
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 50m
        memory: 100Mi

  ## ── Migrations → general nodes ────────────────────────────────────────────
  migrations:
    enabled: true
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 250m
        memory: 1Gi

  ## ── Toolbox → general nodes ───────────────────────────────────────────────
  toolbox:
    enabled: true
    replicas: 1
    nodeSelector:
      workload-type: general
    resources:
      requests:
        cpu: 50m
        memory: 512Mi

  ## ── GitLab Pages — disabled ───────────────────────────────────────────────
  gitlab-pages:
    enabled: false
