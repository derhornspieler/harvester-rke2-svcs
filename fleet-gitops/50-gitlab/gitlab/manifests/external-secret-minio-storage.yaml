apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-minio-storage
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-minio-storage
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        accesskey: '{{ "{{ .accesskey }}" }}'
        secretkey: '{{ "{{ .secretkey }}" }}'
        connection: |
          provider: AWS
          region: us-east-1
          aws_access_key_id: {{ "{{ .accesskey }}" }}
          aws_secret_access_key: {{ "{{ .secretkey }}" }}
          aws_signature_version: 4
          host: minio.minio.svc.cluster.local
          endpoint: http://minio.minio.svc.cluster.local:9000
          path_style: true
  data:
    - secretKey: accesskey
      remoteRef:
        key: services/gitlab/minio-storage
        property: accesskey
    - secretKey: secretkey
      remoteRef:
        key: services/gitlab/minio-storage
        property: secretkey
