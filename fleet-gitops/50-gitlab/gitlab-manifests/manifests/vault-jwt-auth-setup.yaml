---
# vault-jwt-auth-setup: Configures Vault JWT auth method for GitLab CI/CD
# Allows pipelines to fetch secrets from Vault using `secrets:vault` in .gitlab-ci.yml
# Requires: Vault running, GitLab running (OIDC discovery endpoint accessible)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-jwt-auth-setup
  namespace: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-jwt-auth-setup
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["vault-root-ca"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-jwt-auth-setup
subjects:
  - kind: ServiceAccount
    name: vault-jwt-auth-setup
    namespace: gitlab
roleRef:
  kind: ClusterRole
  name: vault-jwt-auth-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-jwt-auth-setup
  namespace: gitlab
  labels:
    app.kubernetes.io/name: vault-jwt-auth-setup
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-jwt-auth-setup
    spec:
      serviceAccountName: vault-jwt-auth-setup
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: setup
          image: ${IMAGE_ALPINE_K8S}
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              DOMAIN="${DOMAIN}"
              GITLAB_URL="https://gitlab.${DOMAIN}"
              VAULT_ADDR="${VAULT_INTERNAL_URL}"

              log() { echo "[$(date +%H:%M:%S)] $*"; }
              die() { log "FATAL: $*"; exit 1; }

              # --- Authenticate to Vault via K8s auth (scoped jwt-auth-admin role) ---
              log "Authenticating to Vault via K8s ServiceAccount JWT..."
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(curl -sfk --request POST \
                --data "{\"jwt\": \"${SA_TOKEN}\", \"role\": \"jwt-auth-admin\"}" \
                "${VAULT_ADDR}/v1/auth/kubernetes/login" | \
                python3 -c "import json,sys; print(json.load(sys.stdin)['auth']['client_token'])")
              [[ -n "$VAULT_TOKEN" ]] || die "Failed to authenticate to Vault via K8s auth"
              export VAULT_ADDR VAULT_TOKEN
              log "Vault K8s auth successful"

              vexec() {
                kubectl exec -n vault vault-0 -- env \
                  VAULT_ADDR=http://127.0.0.1:8200 \
                  VAULT_TOKEN="${VAULT_TOKEN}" \
                  vault "$@"
              }

              # --- Enable JWT auth method for GitLab CI ---
              log "Enabling JWT auth method at jwt/..."
              vexec auth enable -path=jwt jwt 2>/dev/null && log "JWT auth enabled" || log "JWT auth already enabled"

              # --- Configure JWT auth to trust GitLab's OIDC issuer ---
              log "Configuring JWT auth with GitLab OIDC discovery..."
              vexec write auth/jwt/config \
                oidc_discovery_url="${GITLAB_URL}" \
                bound_issuer="${GITLAB_URL}" \
                oidc_discovery_ca_pem="$(kubectl get configmap vault-root-ca -n kube-system -o jsonpath='{.data.ca\.crt}')"
              log "JWT auth configured"

              # --- Create CI read policy ---
              log "Creating gitlab-ci-read policy..."
              kubectl exec -n vault vault-0 -- sh -c "
                cat > /tmp/gitlab-ci-read.hcl <<'HCL'
              path \"kv/data/services/ci/*\" {
                capabilities = [\"read\"]
              }
              path \"kv/metadata/services/ci/*\" {
                capabilities = [\"read\", \"list\"]
              }
              path \"kv/data/ci/*\" {
                capabilities = [\"read\"]
              }
              path \"kv/metadata/ci/*\" {
                capabilities = [\"read\", \"list\"]
              }
              path \"kv/data/services/harbor/ci-robot\" {
                capabilities = [\"read\"]
              }
              path \"kv/metadata/services/harbor/ci-robot\" {
                capabilities = [\"read\"]
              }
              HCL
                VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN='${VAULT_TOKEN}' vault policy write gitlab-ci-read /tmp/gitlab-ci-read.hcl
                rm -f /tmp/gitlab-ci-read.hcl
              "
              log "Policy gitlab-ci-read created"

              # --- Create default role (any project, any branch) ---
              log "Creating default JWT role..."
              kubectl exec -n vault vault-0 -- sh -c "
                cat > /tmp/gitlab-ci-role.json <<ROLE
              {
                \"role_type\": \"jwt\",
                \"policies\": [\"gitlab-ci-read\"],
                \"token_explicit_max_ttl\": 300,
                \"user_claim\": \"user_email\",
                \"bound_audiences\": [\"${GITLAB_URL}\"],
                \"bound_claims_type\": \"glob\",
                \"bound_claims\": {\"iss\": \"${GITLAB_URL}\"}
              }
              ROLE
                VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN='${VAULT_TOKEN}' \
                  vault write auth/jwt/role/gitlab-ci @/tmp/gitlab-ci-role.json
                rm -f /tmp/gitlab-ci-role.json
              "
              log "Role gitlab-ci created"

              # --- Create protected-branch role (main/master only) ---
              log "Creating protected-branch JWT role..."
              kubectl exec -n vault vault-0 -- sh -c "
                cat > /tmp/gitlab-ci-protected-role.json <<ROLE
              {
                \"role_type\": \"jwt\",
                \"policies\": [\"gitlab-ci-read\"],
                \"token_explicit_max_ttl\": 300,
                \"user_claim\": \"user_email\",
                \"bound_audiences\": [\"${GITLAB_URL}\"],
                \"bound_claims_type\": \"glob\",
                \"bound_claims\": {\"iss\": \"${GITLAB_URL}\", \"ref_protected\": \"true\"}
              }
              ROLE
                VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN='${VAULT_TOKEN}' \
                  vault write auth/jwt/role/gitlab-ci-protected @/tmp/gitlab-ci-protected-role.json
                rm -f /tmp/gitlab-ci-protected-role.json
              "
              log "Role gitlab-ci-protected created"

              # --- Create IDP role ---
              log "Creating IDP JWT role..."
              kubectl exec -n vault vault-0 -- sh -c "
                cat > /tmp/gitlab-ci-idp-role.json <<ROLE
              {
                \"role_type\": \"jwt\",
                \"policies\": [\"gitlab-ci-read\"],
                \"token_explicit_max_ttl\": 300,
                \"user_claim\": \"user_email\",
                \"bound_audiences\": [\"${GITLAB_URL}\"],
                \"bound_claims_type\": \"glob\",
                \"bound_claims\": {\"iss\": \"${GITLAB_URL}\"}
              }
              ROLE
                VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN='${VAULT_TOKEN}' \
                  vault write auth/jwt/role/gitlab-ci-idp @/tmp/gitlab-ci-idp-role.json
                rm -f /tmp/gitlab-ci-idp-role.json
              "
              log "Role gitlab-ci-idp created"

              log "Vault JWT auth setup complete"
              log ""
              log "Usage in .gitlab-ci.yml:"
              log "  variables:"
              log "    VAULT_SERVER_URL: https://vault.${DOMAIN}"
              log "    VAULT_AUTH_ROLE: gitlab-ci  # or gitlab-ci-idp / gitlab-ci-protected"
              log "  secrets:"
              log "    MY_SECRET:"
              log "      vault: services/ci/my-secret/key"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
