apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gitlab
  namespace: gitlab
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/duration: "720h"
    cert-manager.io/renew-before: "168h"
spec:
  gatewayClassName: ${GATEWAY_CLASS}
  listeners:
    - name: gitlab-web
      port: 8443
      protocol: HTTPS
      hostname: "${GITLAB_FQDN}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: ${GITLAB_TLS_SECRET}
      allowedRoutes:
        namespaces:
          from: Same
    - name: kas-web
      port: 8443
      protocol: HTTPS
      hostname: "${KAS_FQDN}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: ${KAS_TLS_SECRET}
      allowedRoutes:
        namespaces:
          from: Same
    - name: ssh
      port: 2222
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: Same
