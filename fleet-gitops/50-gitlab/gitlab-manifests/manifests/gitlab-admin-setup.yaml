---
# gitlab-admin-setup: Promotes platform admin user to GitLab admin
# Strategy: wait for user to appear (via OIDC login), then promote.
# Never pre-creates users — avoids duplicate accounts when OIDC provisions
# a separate identity (e.g. alice.morgan vs alice.morgan1).
# Polls for up to 30 minutes, then exits 0 so the Job completes.
# On subsequent deploys the Job re-runs and catches the user.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
  labels:
    app.kubernetes.io/name: gitlab-admin-setup
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-admin-setup
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitlab-admin-setup
          image: ${IMAGE_CURL}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              GITLAB_URL="${GITLAB_URL}"
              ADMIN_USER="${PLATFORM_ADMIN_USER}"
              ADMIN_EMAIL="${PLATFORM_ADMIN_EMAIL}"
              ROOT_PASS="${GITLAB_ROOT_PASSWORD}"
              POLL_INTERVAL=30
              MAX_WAIT=1800

              log() { echo "[$(date +%H:%M:%S)] $*"; }

              # Wait for GitLab to be ready
              log "Waiting for GitLab API..."
              for i in $(seq 1 60); do
                HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${GITLAB_URL}/users/sign_in" 2>/dev/null)
                if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
                  break
                fi
                sleep 5
              done
              HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${GITLAB_URL}/users/sign_in" 2>/dev/null)
              [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || { log "FATAL: GitLab not ready (HTTP $HTTP_CODE)"; exit 1; }
              log "GitLab is ready"

              # Get OAuth token for root user
              log "Authenticating as root..."
              TOKEN=$(curl -sfk --data "grant_type=password&username=root&password=${ROOT_PASS}" \
                "${GITLAB_URL}/oauth/token" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              [ -n "$TOKEN" ] || { log "FATAL: Could not authenticate as root"; exit 1; }

              # Poll for admin user to appear (created by OIDC on first login)
              log "Waiting for user ${ADMIN_USER} to appear (OIDC first login)..."
              elapsed=0
              USER_ID=""
              while [ "$elapsed" -lt "$MAX_WAIT" ]; do
                USER_JSON=$(curl -sfk -H "Authorization: Bearer ${TOKEN}" \
                  "${GITLAB_URL}/api/v4/users?username=${ADMIN_USER}" 2>/dev/null || echo "[]")
                USER_ID=$(echo "$USER_JSON" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)

                if [ -n "$USER_ID" ]; then
                  break
                fi

                # Also search by email in case OIDC used a different username
                USER_JSON=$(curl -sfk -H "Authorization: Bearer ${TOKEN}" \
                  "${GITLAB_URL}/api/v4/users?search=${ADMIN_EMAIL}" 2>/dev/null || echo "[]")
                USER_ID=$(echo "$USER_JSON" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)

                if [ -n "$USER_ID" ]; then
                  ADMIN_USER=$(echo "$USER_JSON" | sed -n 's/.*"username":"\([^"]*\)".*/\1/p' | head -1)
                  log "Found user by email as ${ADMIN_USER} (ID: ${USER_ID})"
                  break
                fi

                elapsed=$((elapsed + POLL_INTERVAL))
                log "User not found yet (${elapsed}/${MAX_WAIT}s)..."
                sleep "$POLL_INTERVAL"
              done

              if [ -z "$USER_ID" ]; then
                log "User ${ADMIN_USER} not found after ${MAX_WAIT}s — will retry on next deploy"
                exit 0
              fi

              # Check if already admin
              IS_ADMIN=$(echo "$USER_JSON" | sed -n 's/.*"is_admin":\([a-z]*\).*/\1/p' | head -1)
              if [ "$IS_ADMIN" = "true" ]; then
                log "${ADMIN_USER} (ID: ${USER_ID}) is already admin — nothing to do"
                exit 0
              fi

              # Promote to admin
              log "Promoting ${ADMIN_USER} (ID: ${USER_ID}) to admin..."
              RESP=$(curl -sfk -X PUT \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                "${GITLAB_URL}/api/v4/users/${USER_ID}" \
                -d '{"admin": true}')

              IS_ADMIN=$(echo "$RESP" | sed -n 's/.*"is_admin":\([a-z]*\).*/\1/p' | head -1)
              if [ "$IS_ADMIN" = "true" ]; then
                log "${ADMIN_USER} promoted to admin successfully"
              else
                log "WARNING: Promotion response did not confirm admin status"
                log "Response: ${RESP}"
              fi

              log "GitLab admin setup complete"
          env:
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-gitlab-initial-root-password
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
