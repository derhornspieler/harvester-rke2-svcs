---
# gitlab-admin-setup: Creates platform users via gitlab-rails with OIDC
# identities pre-linked, so Keycloak login maps correctly (no duplicates).
# Uses kubectl exec into the toolbox pod to run rails commands.
#
# Users created:
#   - Platform admin — GitLab admin + Owner on project group
#   - Senior developer — Maintainer on project group (can merge to main)
#
# Idempotent — safe to re-run on every deploy.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
subjects:
  - kind: ServiceAccount
    name: gitlab-admin-setup
    namespace: gitlab
roleRef:
  kind: Role
  name: gitlab-admin-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
  labels:
    app.kubernetes.io/name: gitlab-admin-setup
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-admin-setup
    spec:
      serviceAccountName: gitlab-admin-setup
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitlab-admin-setup
          image: ${IMAGE_ALPINE_K8S}
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              OIDC_PROVIDER="openid_connect"
              GITLAB_GROUP="infra_and_platform_services"

              log() { echo "[$(date +%H:%M:%S)] $*"; }

              # Wait for toolbox pod to be ready
              log "Waiting for GitLab toolbox pod..."
              TOOLBOX_POD=""
              for i in $(seq 1 120); do
                TOOLBOX_POD=$(kubectl get pods -n gitlab \
                  -l app=toolbox,release=gitlab \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                if [[ -n "${TOOLBOX_POD}" ]]; then
                  READY=$(kubectl get pod -n gitlab "${TOOLBOX_POD}" \
                    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
                  if [[ "${READY}" == "True" ]]; then
                    break
                  fi
                fi
                TOOLBOX_POD=""
                sleep 5
              done
              [[ -n "${TOOLBOX_POD}" ]] || { log "FATAL: Toolbox pod not ready after 10 minutes"; exit 1; }
              log "Toolbox pod ready: ${TOOLBOX_POD}"

              # Write Ruby script to temp file (avoids heredoc quoting issues in YAML)
              cat > /tmp/user-setup.rb << 'RUBYEOF'
              username = ENV['SETUP_USER']
              email = ENV['SETUP_EMAIL']
              full_name = ENV['SETUP_NAME']
              oidc_provider = ENV['OIDC_PROVIDER']
              is_admin = ENV['SETUP_ADMIN'] == 'true'
              access_level = ENV.fetch('SETUP_ACCESS_LEVEL', '0').to_i
              group_path = ENV.fetch('SETUP_GROUP', '')

              user = User.find_by(username: username)

              if user
                puts "User #{username} exists (ID: #{user.id})"
                changed = false
                if is_admin && !user.admin?
                  user.admin = true
                  changed = true
                  puts "Promoted to admin"
                end
                if user.name != full_name
                  user.name = full_name
                  changed = true
                end
                if changed
                  user.save!
                  puts "User updated"
                else
                  puts "No changes needed"
                end
              else
                puts "Creating user #{username}..."
                random_pass = SecureRandom.hex(32)
                admin_user = User.find_by(admin: true)
                raise "No admin user found to create new users" unless admin_user
                params = {
                  username: username,
                  email: email,
                  name: full_name,
                  admin: is_admin,
                  skip_confirmation: true,
                  password: random_pass,
                  password_confirmation: random_pass,
                  organization_id: Organizations::Organization.default_organization&.id
                }
                result = Users::CreateService.new(admin_user, params).execute
                if result.respond_to?(:payload)
                  raise "Failed to create #{username}: #{result.message}" unless result.success?
                  user = result.payload[:user]
                else
                  user = result
                  raise "Failed to create #{username}: #{user.errors.full_messages.join(', ')}" unless user.persisted?
                end
                puts "Created user #{username} (ID: #{user.id}, admin: #{is_admin})"
              end

              # Ensure OIDC identity exists
              identity = user.identities.find_by(provider: oidc_provider)
              if identity
                if identity.extern_uid != username
                  identity.update!(extern_uid: username)
                  puts "Updated OIDC identity extern_uid to #{username}"
                else
                  puts "OIDC identity already linked"
                end
              else
                user.identities.create!(provider: oidc_provider, extern_uid: username)
                puts "Created OIDC identity (provider: #{oidc_provider}, extern_uid: #{username})"
              end

              # Grant group access if specified
              if !group_path.empty? && access_level > 0
                group = Group.find_by_full_path(group_path)
                if group
                  member = group.members.find_by(user_id: user.id)
                  if member
                    if member.access_level != access_level
                      member.update!(access_level: access_level)
                      puts "Updated #{username} access to #{group_path}: level #{access_level}"
                    else
                      puts "#{username} already has access level #{access_level} on #{group_path}"
                    end
                  else
                    group.add_member(user, access_level)
                    puts "Granted #{username} access level #{access_level} on #{group_path}"
                  end
                else
                  puts "WARNING: Group #{group_path} not found — skipping access grant"
                end
              end

              puts "Setup complete for #{username}"
              RUBYEOF

              # Copy script into toolbox pod
              kubectl cp /tmp/user-setup.rb "gitlab/${TOOLBOX_POD}:/tmp/user-setup.rb"

              # Helper to run the script for a user
              run_setup() {
                local user="$1" email="$2" name="$3" admin="$4" level="$5" group="$6"
                log "Setting up GitLab user: ${user} (admin=${admin}, group=${group}, level=${level})..."
                OUTPUT=$(kubectl exec -n gitlab "${TOOLBOX_POD}" -- \
                  env SETUP_USER="${user}" \
                      SETUP_EMAIL="${email}" \
                      SETUP_NAME="${name}" \
                      SETUP_ADMIN="${admin}" \
                      SETUP_ACCESS_LEVEL="${level}" \
                      SETUP_GROUP="${group}" \
                      OIDC_PROVIDER="${OIDC_PROVIDER}" \
                  gitlab-rails runner /tmp/user-setup.rb 2>&1) || {
                  log "WARNING: gitlab-rails failed for ${user}"
                  log "${OUTPUT}"
                  return 1
                }
                echo "${OUTPUT}" | while IFS= read -r line; do
                  log "  ${line}"
                done
              }

              # GitLab access levels: Guest=10, Reporter=20, Developer=30, Maintainer=40, Owner=50

              # Platform admin — GitLab admin + Owner on project group
              run_setup "${PLATFORM_ADMIN_USER}" "${PLATFORM_ADMIN_EMAIL}" \
                "${PLATFORM_ADMIN_NAME}" "true" "50" "${GITLAB_GROUP}"

              # Senior developer — not admin, Maintainer on project group (can merge to main)
              run_setup "${SENIOR_DEV_USER}" "${SENIOR_DEV_EMAIL}" \
                "${SENIOR_DEV_NAME}" "false" "40" "${GITLAB_GROUP}"

              log "GitLab user setup complete"

              # --- Grant users access to platform group ---
              # platform group is created by this Job (platform-setup.rb below).
              # Grant access here so users can push to platform-deployments.
              cat > /tmp/platform-access.rb << 'ACCESSEOF'
              platform_admin = ENV.fetch('PLATFORM_ADMIN_USER', '')
              senior_dev = ENV.fetch('SENIOR_DEV_USER', '')
              group = Group.find_by_full_path('platform')
              if group
                [
                  [platform_admin, Gitlab::Access::OWNER],
                  [senior_dev, Gitlab::Access::MAINTAINER]
                ].each do |username, level|
                  next if username.empty?
                  user = User.find_by(username: username)
                  next unless user
                  member = group.members.find_by(user_id: user.id)
                  if member
                    if member.access_level < level
                      member.update!(access_level: level)
                      puts "Updated #{username} to level #{level} on platform group"
                    else
                      puts "#{username} already has access level #{member.access_level} on platform group"
                    end
                  else
                    group.add_member(user, level)
                    puts "Granted #{username} level #{level} on platform group"
                  end
                end
              else
                puts "Platform group not found — skipping access grants (will be created on next run)"
              end

              # --- Share platform group with developer groups (Developer access) ---
              # All members of forge and infra_and_platform_services groups get Developer
              # access on the platform group. This allows CI_JOB_TOKEN to push to the
              # dev branch of platform-deployments.
              %w[infra_and_platform_services forge].each do |group_path|
                shared_group = Group.find_by_full_path(group_path)
                next unless shared_group
                existing_share = GroupGroupLink.find_by(
                  shared_group: group, shared_with_group: shared_group)
                if existing_share
                  puts "#{group_path} already has shared access to platform group (level: #{existing_share.group_access})"
                else
                  GroupGroupLink.create!(
                    shared_group: group,
                    shared_with_group: shared_group,
                    group_access: Gitlab::Access::DEVELOPER)
                  puts "Shared platform group with #{group_path} (Developer access)"
                end
              end

              # --- Allow CI_JOB_TOKEN from other groups to access platform-deployments ---
              # Without this, CI pipelines in forge/ or infra_and_platform_services/ can't
              # clone platform/platform-deployments using CI_JOB_TOKEN.
              project = Project.find_by_full_path('platform/platform-deployments')
              if project
                %w[infra_and_platform_services forge].each do |group_path|
                  target_group = Group.find_by_full_path(group_path)
                  next unless target_group
                  existing = Ci::JobToken::GroupScopeLink.find_by(
                    source_project: project, target_group: target_group)
                  if existing
                    puts "CI job token access already allowed from #{group_path}"
                  else
                    Ci::JobToken::GroupScopeLink.create!(
                      source_project: project, target_group: target_group)
                    puts "Allowed CI job token access from #{group_path} group"
                  end
                end
              else
                puts "platform-deployments not found — skipping CI token access grants"
              end

              ACCESSEOF
              kubectl cp /tmp/platform-access.rb "gitlab/${TOOLBOX_POD}:/tmp/platform-access.rb"
              PLATFORM_OUTPUT=$(kubectl exec -n gitlab "${TOOLBOX_POD}" -- \
                env PLATFORM_ADMIN_USER="${PLATFORM_ADMIN_USER}" \
                    SENIOR_DEV_USER="${SENIOR_DEV_USER}" \
                gitlab-rails runner /tmp/platform-access.rb 2>&1) || true
              echo "${PLATFORM_OUTPUT}" | while IFS= read -r line; do
                log "  ${line}"
              done

              # --- Create Deploy Key with write access for CI push ---
              # SSH deploy key allows CI pipelines to push image tag updates
              # to platform-deployments. Never expires.
              # Key generated in Job container (has ssh-keygen), registered via Rails,
              # private key stored in Vault.
              log "Checking deploy key for platform-deployments..."

              # Auth to Vault (needed for both check and seed)
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
              V_TOKEN=$(curl -sfk --request POST \
                --data "{\"jwt\": \"${SA_TOKEN}\", \"role\": \"gitlab-admin-setup\"}" \
                "${VAULT_ADDR}/v1/auth/kubernetes/login" 2>/dev/null | \
                python3 -c "import json,sys; print(json.load(sys.stdin)['auth']['client_token'])" 2>/dev/null) || V_TOKEN=""

              # Check if deploy key already in Vault
              EXISTING_KEY=""
              if [[ -n "${V_TOKEN}" ]]; then
                EXISTING_KEY=$(curl -sf \
                  -H "X-Vault-Token: ${V_TOKEN}" \
                  "${VAULT_ADDR}/v1/kv/data/services/ci/platform-deploy-key" 2>/dev/null | \
                  python3 -c "import json,sys; d=json.load(sys.stdin).get('data',{}).get('data',{}); print(d.get('private-key','')[:20] if d.get('private-key') else '')" 2>/dev/null) || EXISTING_KEY=""
              fi

              if [[ -n "${EXISTING_KEY}" ]]; then
                log "Deploy key already in Vault — skipping"
              else
                # Install openssh-keygen and generate SSH key pair
                apk add --no-cache openssh-keygen 2>/dev/null || apk add --no-cache openssh 2>/dev/null || true
                ssh-keygen -t ed25519 -C "ci-deploy-push@platform-deployments" \
                  -f /tmp/deploy_key -N "" -q
                PUBKEY=$(cat /tmp/deploy_key.pub)
                PRIVKEY=$(cat /tmp/deploy_key)

                # Register public key in GitLab via Rails
                cat > /tmp/register-deploy-key.rb << DKEOF
                project = Project.find_by_full_path('platform/platform-deployments')
                raise "Project not found" unless project
                existing = project.deploy_keys.find_by(title: 'ci-deploy-push')
                if existing
                  puts "DEPLOY_KEY_REGISTERED=existing"
                else
                  dk = DeployKey.new(title: 'ci-deploy-push', key: "${PUBKEY}")
                  dk.save!
                  project.deploy_keys_projects.create!(deploy_key: dk, can_push: true)
                  puts "DEPLOY_KEY_REGISTERED=created"
                end
              DKEOF
                kubectl cp /tmp/register-deploy-key.rb "gitlab/${TOOLBOX_POD}:/tmp/register-deploy-key.rb"
                DK_OUTPUT=$(kubectl exec -n gitlab "${TOOLBOX_POD}" -- \
                  gitlab-rails runner /tmp/register-deploy-key.rb 2>&1) || true
                DK_STATUS=$(echo "${DK_OUTPUT}" | grep '^DEPLOY_KEY_REGISTERED=' | cut -d= -f2)
                log "Deploy key registration: ${DK_STATUS:-failed}"

                # Seed private key to Vault
                if [[ -n "${V_TOKEN}" && ("${DK_STATUS}" == "created" || "${DK_STATUS}" == "existing") ]]; then
                  ESCAPED_KEY=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" < /tmp/deploy_key)
                  HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
                    -H "X-Vault-Token: ${V_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    -d "{\"data\":{\"private-key\":${ESCAPED_KEY},\"git-url\":\"git@gitlab.${DOMAIN}:platform/platform-deployments.git\"}}" \
                    "${VAULT_ADDR}/v1/kv/data/services/ci/platform-deploy-key" 2>/dev/null)
                  if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "204" ]]; then
                    log "Deploy key seeded to Vault (kv/services/ci/platform-deploy-key)"
                  else
                    log "WARNING: Failed to seed deploy key to Vault (HTTP ${HTTP_CODE})"
                  fi
                else
                  log "WARNING: Could not seed deploy key to Vault"
                fi

                rm -f /tmp/deploy_key /tmp/deploy_key.pub
              fi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
