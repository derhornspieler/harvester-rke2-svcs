---
# gitlab-admin-setup: Creates platform users via gitlab-rails with OIDC
# identities pre-linked, so Keycloak login maps correctly (no duplicates).
# Uses kubectl exec into the toolbox pod to run rails commands.
#
# Users created:
#   - Platform admin — GitLab admin + Owner on project group
#   - Senior developer — Maintainer on project group (can merge to main)
#
# Idempotent — safe to re-run on every deploy.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
subjects:
  - kind: ServiceAccount
    name: gitlab-admin-setup
    namespace: gitlab
roleRef:
  kind: Role
  name: gitlab-admin-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
  labels:
    app.kubernetes.io/name: gitlab-admin-setup
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-admin-setup
    spec:
      serviceAccountName: gitlab-admin-setup
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitlab-admin-setup
          image: ${IMAGE_ALPINE_K8S}
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              OIDC_PROVIDER="openid_connect"
              GITLAB_GROUP="infra_and_platform_services"

              log() { echo "[$(date +%H:%M:%S)] $*"; }

              # Wait for toolbox pod to be ready
              log "Waiting for GitLab toolbox pod..."
              TOOLBOX_POD=""
              for i in $(seq 1 120); do
                TOOLBOX_POD=$(kubectl get pods -n gitlab \
                  -l app=toolbox,release=gitlab \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                if [[ -n "${TOOLBOX_POD}" ]]; then
                  READY=$(kubectl get pod -n gitlab "${TOOLBOX_POD}" \
                    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
                  if [[ "${READY}" == "True" ]]; then
                    break
                  fi
                fi
                TOOLBOX_POD=""
                sleep 5
              done
              [[ -n "${TOOLBOX_POD}" ]] || { log "FATAL: Toolbox pod not ready after 10 minutes"; exit 1; }
              log "Toolbox pod ready: ${TOOLBOX_POD}"

              # Write Ruby script to temp file (avoids heredoc quoting issues in YAML)
              cat > /tmp/user-setup.rb << 'RUBYEOF'
              username = ENV['SETUP_USER']
              email = ENV['SETUP_EMAIL']
              full_name = ENV['SETUP_NAME']
              oidc_provider = ENV['OIDC_PROVIDER']
              is_admin = ENV['SETUP_ADMIN'] == 'true'
              access_level = ENV.fetch('SETUP_ACCESS_LEVEL', '0').to_i
              group_path = ENV.fetch('SETUP_GROUP', '')

              user = User.find_by(username: username)

              if user
                puts "User #{username} exists (ID: #{user.id})"
                changed = false
                if is_admin && !user.admin?
                  user.admin = true
                  changed = true
                  puts "Promoted to admin"
                end
                if user.name != full_name
                  user.name = full_name
                  changed = true
                end
                if changed
                  user.save!
                  puts "User updated"
                else
                  puts "No changes needed"
                end
              else
                puts "Creating user #{username}..."
                random_pass = SecureRandom.hex(32)
                admin_user = User.find_by(admin: true)
                raise "No admin user found to create new users" unless admin_user
                params = {
                  username: username,
                  email: email,
                  name: full_name,
                  admin: is_admin,
                  skip_confirmation: true,
                  password: random_pass,
                  password_confirmation: random_pass,
                  organization_id: Organizations::Organization.default_organization&.id
                }
                result = Users::CreateService.new(admin_user, params).execute
                if result.respond_to?(:payload)
                  raise "Failed to create #{username}: #{result.message}" unless result.success?
                  user = result.payload[:user]
                else
                  user = result
                  raise "Failed to create #{username}: #{user.errors.full_messages.join(', ')}" unless user.persisted?
                end
                puts "Created user #{username} (ID: #{user.id}, admin: #{is_admin})"
              end

              # Ensure OIDC identity exists
              identity = user.identities.find_by(provider: oidc_provider)
              if identity
                if identity.extern_uid != username
                  identity.update!(extern_uid: username)
                  puts "Updated OIDC identity extern_uid to #{username}"
                else
                  puts "OIDC identity already linked"
                end
              else
                user.identities.create!(provider: oidc_provider, extern_uid: username)
                puts "Created OIDC identity (provider: #{oidc_provider}, extern_uid: #{username})"
              end

              # Grant group access if specified
              if !group_path.empty? && access_level > 0
                group = Group.find_by_full_path(group_path)
                if group
                  member = group.members.find_by(user_id: user.id)
                  if member
                    if member.access_level != access_level
                      member.update!(access_level: access_level)
                      puts "Updated #{username} access to #{group_path}: level #{access_level}"
                    else
                      puts "#{username} already has access level #{access_level} on #{group_path}"
                    end
                  else
                    group.add_member(user, access_level)
                    puts "Granted #{username} access level #{access_level} on #{group_path}"
                  end
                else
                  puts "WARNING: Group #{group_path} not found — skipping access grant"
                end
              end

              puts "Setup complete for #{username}"
              RUBYEOF

              # Copy script into toolbox pod
              kubectl cp /tmp/user-setup.rb "gitlab/${TOOLBOX_POD}:/tmp/user-setup.rb"

              # Helper to run the script for a user
              run_setup() {
                local user="$1" email="$2" name="$3" admin="$4" level="$5" group="$6"
                log "Setting up GitLab user: ${user} (admin=${admin}, group=${group}, level=${level})..."
                OUTPUT=$(kubectl exec -n gitlab "${TOOLBOX_POD}" -- \
                  env SETUP_USER="${user}" \
                      SETUP_EMAIL="${email}" \
                      SETUP_NAME="${name}" \
                      SETUP_ADMIN="${admin}" \
                      SETUP_ACCESS_LEVEL="${level}" \
                      SETUP_GROUP="${group}" \
                      OIDC_PROVIDER="${OIDC_PROVIDER}" \
                  gitlab-rails runner /tmp/user-setup.rb 2>&1) || {
                  log "WARNING: gitlab-rails failed for ${user}"
                  log "${OUTPUT}"
                  return 1
                }
                echo "${OUTPUT}" | while IFS= read -r line; do
                  log "  ${line}"
                done
              }

              # GitLab access levels: Guest=10, Reporter=20, Developer=30, Maintainer=40, Owner=50

              # Platform admin — GitLab admin + Owner on project group
              run_setup "${PLATFORM_ADMIN_USER}" "${PLATFORM_ADMIN_EMAIL}" \
                "${PLATFORM_ADMIN_NAME}" "true" "50" "${GITLAB_GROUP}"

              # Senior developer — not admin, Maintainer on project group (can merge to main)
              run_setup "${SENIOR_DEV_USER}" "${SENIOR_DEV_EMAIL}" \
                "${SENIOR_DEV_NAME}" "false" "40" "${GITLAB_GROUP}"

              log "GitLab user setup complete"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
