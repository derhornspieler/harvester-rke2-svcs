---
# gitlab-admin-setup: Creates platform admin user via gitlab-rails with OIDC
# identity pre-linked, so Keycloak login maps to this account (no duplicates).
# Uses kubectl exec into the toolbox pod to run rails commands.
# Idempotent — safe to re-run on every deploy.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
subjects:
  - kind: ServiceAccount
    name: gitlab-admin-setup
    namespace: gitlab
roleRef:
  kind: Role
  name: gitlab-admin-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
  labels:
    app.kubernetes.io/name: gitlab-admin-setup
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-admin-setup
    spec:
      serviceAccountName: gitlab-admin-setup
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitlab-admin-setup
          image: ${IMAGE_ALPINE_K8S}
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              ADMIN_USER="${PLATFORM_ADMIN_USER}"
              ADMIN_EMAIL="${PLATFORM_ADMIN_EMAIL}"
              ADMIN_NAME="${PLATFORM_ADMIN_NAME}"
              OIDC_PROVIDER="openid_connect"

              log() { echo "[$(date +%H:%M:%S)] $*"; }

              # Wait for toolbox pod to be ready
              log "Waiting for GitLab toolbox pod..."
              TOOLBOX_POD=""
              for i in $(seq 1 120); do
                TOOLBOX_POD=$(kubectl get pods -n gitlab \
                  -l app=toolbox,release=gitlab \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                if [[ -n "${TOOLBOX_POD}" ]]; then
                  READY=$(kubectl get pod -n gitlab "${TOOLBOX_POD}" \
                    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
                  if [[ "${READY}" == "True" ]]; then
                    break
                  fi
                fi
                TOOLBOX_POD=""
                sleep 5
              done
              [[ -n "${TOOLBOX_POD}" ]] || { log "FATAL: Toolbox pod not ready after 10 minutes"; exit 1; }
              log "Toolbox pod ready: ${TOOLBOX_POD}"

              # Split name into first/last
              FIRST_NAME=$(echo "${ADMIN_NAME}" | cut -d' ' -f1)
              LAST_NAME=$(echo "${ADMIN_NAME}" | cut -d' ' -f2-)
              [[ -n "${LAST_NAME}" ]] || LAST_NAME="Admin"

              # Create or update admin user with OIDC identity via gitlab-rails
              log "Creating/updating admin user ${ADMIN_USER} via gitlab-rails..."

              # Write Ruby script to temp file (avoids heredoc quoting issues in YAML)
              cat > /tmp/admin-setup.rb << 'RUBYEOF'
              admin_user = ENV['ADMIN_USER']
              admin_email = ENV['ADMIN_EMAIL']
              first_name = ENV['FIRST_NAME']
              last_name = ENV['LAST_NAME']
              oidc_provider = ENV['OIDC_PROVIDER']
              full_name = "#{first_name} #{last_name}"

              user = User.find_by(username: admin_user)

              if user
                puts "User #{admin_user} exists (ID: #{user.id})"
                changed = false
                unless user.admin?
                  user.admin = true
                  changed = true
                  puts "Promoted to admin"
                end
                if user.name != full_name
                  user.name = full_name
                  changed = true
                end
                if changed
                  user.save!
                  puts "User updated"
                else
                  puts "Already admin, no changes needed"
                end
              else
                puts "Creating user #{admin_user}..."
                user = User.new(
                  username: admin_user,
                  email: admin_email,
                  name: full_name,
                  admin: true,
                  skip_confirmation: true
                )
                random_pass = SecureRandom.hex(32)
                user.password = random_pass
                user.password_confirmation = random_pass
                user.save!
                puts "Created user #{admin_user} (ID: #{user.id}) as admin"
              end

              identity = user.identities.find_by(provider: oidc_provider)
              if identity
                if identity.extern_uid != admin_user
                  identity.update!(extern_uid: admin_user)
                  puts "Updated OIDC identity extern_uid to #{admin_user}"
                else
                  puts "OIDC identity already linked (extern_uid: #{admin_user})"
                end
              else
                user.identities.create!(provider: oidc_provider, extern_uid: admin_user)
                puts "Created OIDC identity (provider: #{oidc_provider}, extern_uid: #{admin_user})"
              end

              puts "Admin setup complete for #{admin_user}"
              RUBYEOF

              # Copy script into toolbox pod and execute
              kubectl cp /tmp/admin-setup.rb "gitlab/${TOOLBOX_POD}:/tmp/admin-setup.rb"

              OUTPUT=$(kubectl exec -n gitlab "${TOOLBOX_POD}" -- \
                env ADMIN_USER="${ADMIN_USER}" \
                    ADMIN_EMAIL="${ADMIN_EMAIL}" \
                    FIRST_NAME="${FIRST_NAME}" \
                    LAST_NAME="${LAST_NAME}" \
                    OIDC_PROVIDER="${OIDC_PROVIDER}" \
                gitlab-rails runner /tmp/admin-setup.rb 2>&1) || {
                log "FATAL: gitlab-rails failed"
                log "${OUTPUT}"
                exit 1
              }

              echo "${OUTPUT}" | while IFS= read -r line; do
                log "${line}"
              done

              log "GitLab admin setup complete"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
