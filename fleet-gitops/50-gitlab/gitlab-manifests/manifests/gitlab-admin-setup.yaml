---
# gitlab-admin-setup: Promotes alice.morgan to GitLab admin after OIDC login
# Requires: GitLab running, alice.morgan already logged in via Keycloak OIDC
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-admin-setup
  namespace: gitlab
  labels:
    app.kubernetes.io/name: gitlab-admin-setup
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-admin-setup
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitlab-admin-setup
          image: curlimages/curl:8.12.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              GITLAB_URL="https://gitlab.aegisgroup.ch"
              ADMIN_USER="alice.morgan"
              ROOT_PASS="${GITLAB_ROOT_PASSWORD}"

              log() { echo "[$(date +%H:%M:%S)] $*"; }

              # Wait for GitLab to be ready (use -o /dev/null without -f since version endpoint requires auth)
              log "Waiting for GitLab API..."
              for i in $(seq 1 60); do
                HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${GITLAB_URL}/users/sign_in" 2>/dev/null)
                if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
                  break
                fi
                sleep 5
              done
              HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${GITLAB_URL}/users/sign_in" 2>/dev/null)
              [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || { log "FATAL: GitLab not ready (HTTP $HTTP_CODE)"; exit 1; }
              log "GitLab is ready"

              # Get OAuth token for root user
              log "Authenticating as root..."
              TOKEN=$(curl -sfk --data "grant_type=password&username=root&password=${ROOT_PASS}" \
                "${GITLAB_URL}/oauth/token" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              [ -n "$TOKEN" ] || { log "FATAL: Could not authenticate as root"; exit 1; }

              # Trigger alice.morgan first login via OIDC if she doesn't exist yet
              # (she auto-provisions on first OIDC login, so we just need to check)
              log "Looking up user ${ADMIN_USER}..."
              USER_JSON=$(curl -sfk -H "Authorization: Bearer ${TOKEN}" \
                "${GITLAB_URL}/api/v4/users?username=${ADMIN_USER}")

              USER_ID=$(echo "$USER_JSON" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)

              if [ -z "$USER_ID" ]; then
                log "User ${ADMIN_USER} not found — they need to login via Keycloak first"
                log "Creating user via API instead..."
                CREATE_RESP=$(curl -sfk -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  "${GITLAB_URL}/api/v4/users" \
                  -d '{
                    "username": "'"${ADMIN_USER}"'",
                    "name": "Alice Morgan",
                    "email": "'"${ADMIN_USER}@aegisgroup.ch"'",
                    "password": "'"${ROOT_PASS}"'",
                    "skip_confirmation": true,
                    "admin": true
                  }')
                USER_ID=$(echo "$CREATE_RESP" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)
                [ -n "$USER_ID" ] || { log "FATAL: Could not create user"; exit 1; }
                log "Created ${ADMIN_USER} (ID: ${USER_ID}) as admin"
              else
                # Promote existing user to admin
                log "Found ${ADMIN_USER} (ID: ${USER_ID}), promoting to admin..."
                curl -sfk -X PUT \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  "${GITLAB_URL}/api/v4/users/${USER_ID}" \
                  -d '{"admin": true, "name": "Alice Morgan"}'
                log "${ADMIN_USER} promoted to admin and name fixed"
              fi

              log "GitLab admin setup complete"
          env:
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-gitlab-initial-root-password
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
