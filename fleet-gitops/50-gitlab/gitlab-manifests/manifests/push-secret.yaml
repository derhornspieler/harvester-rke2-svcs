# Password generators + PushSecrets for GitLab service credentials
# Covers: gitaly-secret, praefect-secret, praefect-dbsecret, minio-storage
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: gitaly-token-gen
  namespace: gitlab
spec:
  length: 64
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: gitaly-secret-push
  namespace: gitlab
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    generatorRef:
      apiVersion: generators.external-secrets.io/v1alpha1
      kind: Password
      name: gitaly-token-gen
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/gitlab/gitaly-secret
          property: token
---
