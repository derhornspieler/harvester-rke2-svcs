---
# Password generators + PushSecret for GitLab MinIO storage credentials
# MULTI-KEY: accesskey (20-char) + secretkey (40-char)
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: gitlab-minio-accesskey-gen
  namespace: gitlab
spec:
  length: 20
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: gitlab-minio-secretkey-gen
  namespace: gitlab
spec:
  length: 40
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-minio-storage-generated
  namespace: gitlab
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-minio-storage-generated
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: gitlab-minio-accesskey-gen
      rewrite:
        - regexp:
            source: "password"
            target: "accesskey"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: gitlab-minio-secretkey-gen
      rewrite:
        - regexp:
            source: "password"
            target: "secretkey"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: gitlab-minio-storage-push
  namespace: gitlab
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: gitlab-minio-storage-generated
  data:
    - match:
        secretKey: accesskey
        remoteRef:
          remoteKey: services/gitlab/minio-storage
          property: accesskey
    - match:
        secretKey: secretkey
        remoteRef:
          remoteKey: services/gitlab/minio-storage
          property: secretkey
