apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-oidc-secret
  namespace: gitlab
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-oidc-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        provider: |
          {
            "name": "openid_connect",
            "label": "Keycloak",
            "args": {
              "name": "openid_connect",
              "scope": ["openid", "profile", "email"],
              "response_type": "code",
              "issuer": "https://keycloak.aegisgroup.ch/realms/platform",
              "client_auth_method": "query",
              "discovery": true,
              "uid_field": "preferred_username",
              "pkce": true,
              "client_options": {
                "identifier": "gitlab",
                "secret": "{{ "{{ .clientSecret }}" }}",
                "redirect_uri": "https://gitlab.aegisgroup.ch/users/auth/openid_connect/callback"
              }
            }
          }
  data:
    - secretKey: clientSecret
      remoteRef:
        key: oidc/gitlab
        property: client-secret
