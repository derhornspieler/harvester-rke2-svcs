defaultNamespace: gitlab-runners
helm:
  releaseName: gitlab-runner-shared
  chart: ${OCI_CHART_GITLAB_RUNNER}
  version: "${CHART_VER_GITLAB_RUNNER}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: gitlab-runners
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
