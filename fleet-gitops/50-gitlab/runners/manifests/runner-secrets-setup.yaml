---
# runner-secrets-setup: Copies runner registration token from gitlab namespace
# and creates CA certs secret for TLS trust in gitlab-runners namespace.
# Requires: GitLab running (gitlab-gitlab-runner-secret in gitlab namespace),
#           vault-root-ca configmap in cert-manager namespace.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-secrets-setup
  namespace: gitlab-runners
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runner-secrets-setup
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitlab-gitlab-runner-secret"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["vault-root-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runner-secrets-setup
subjects:
  - kind: ServiceAccount
    name: runner-secrets-setup
    namespace: gitlab-runners
roleRef:
  kind: ClusterRole
  name: runner-secrets-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-secrets-setup
  namespace: gitlab-runners
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-secrets-setup
  namespace: gitlab-runners
subjects:
  - kind: ServiceAccount
    name: runner-secrets-setup
    namespace: gitlab-runners
roleRef:
  kind: Role
  name: runner-secrets-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: runner-secrets-setup
  namespace: gitlab-runners
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runner-secrets-setup
    spec:
      serviceAccountName: runner-secrets-setup
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: setup
          image: docker.io/alpine/k8s:1.32.4
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              log() { echo "[$(date +%H:%M:%S)] $*"; }

              # --- Copy runner registration token ---
              log "Copying runner registration token from gitlab namespace..."
              TOKEN=$(kubectl get secret gitlab-gitlab-runner-secret -n gitlab \
                -o jsonpath='{.data.runner-registration-token}')

              kubectl apply -f - <<EOSECRET
              apiVersion: v1
              kind: Secret
              metadata:
                name: gitlab-gitlab-runner-secret
                namespace: gitlab-runners
              type: Opaque
              data:
                runner-registration-token: "${TOKEN}"
                runner-token: ""
              EOSECRET
              log "Runner registration token copied"

              # --- Create CA certs secret ---
              log "Creating gitlab-runner-certs from Vault root CA..."
              CA_CERT=$(kubectl get configmap vault-root-ca -n kube-system \
                -o jsonpath='{.data.ca\.crt}')

              kubectl apply -f - <<EOSECRET
              apiVersion: v1
              kind: Secret
              metadata:
                name: gitlab-runner-certs
                namespace: gitlab-runners
              type: Opaque
              stringData:
                gitlab.example.com.crt: |
              $(echo "${CA_CERT}" | sed 's/^/            /')
              EOSECRET
              log "CA certs secret created"

              # --- Create vault-root-ca configmap for CI job pods ---
              log "Creating vault-root-ca configmap from kube-system..."
              CA_DATA=$(kubectl get configmap vault-root-ca -n kube-system \
                -o jsonpath='{.data.ca\.crt}')
              kubectl apply -f - <<EOCM
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: vault-root-ca
                namespace: gitlab-runners
              data:
                ca.crt: |
              $(echo "${CA_DATA}" | sed 's/^/            /')
              EOCM
              log "vault-root-ca configmap created"

              log "Runner secrets setup complete"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
