apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gitlab-runners
  namespace: gitlab-runners
  labels:
    app: grafana
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Services
data:
  gitlab-runners-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "id": null,
      "links": [{"title": "Back to Home", "url": "/d/home-overview/cluster-home?orgId=1", "icon": "external link", "targetBlank": true, "type": "link"}],
      "templating": {
        "list": [
          {
            "name": "runner",
            "label": "Runner",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(kube_deployment_status_replicas{namespace=\"gitlab-runners\", deployment=~\"gitlab-runner-.*\"}, deployment)",
            "includeAll": true,
            "allValue": "gitlab-runner-.*",
            "multi": false,
            "current": {"selected": true, "text": "All", "value": "$__all"},
            "refresh": 2,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "title": "Runner Status",
          "description": "Ready replicas for selected runner(s)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "kube_deployment_status_replicas_ready{namespace=\"gitlab-runners\", deployment=~\"$runner\"}", "legendFormat": "{{ "{{deployment}}" }}", "refId": "A"}]
        },
        {
          "title": "Scrape Target",
          "description": "Prometheus scrape target health",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "id": 2,
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"1": {"text": "UP", "color": "green"}, "0": {"text": "DOWN", "color": "red"}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "up{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}", "legendFormat": "{{ "{{pod}}" }}", "refId": "A"}]
        },
        {
          "title": "Running Jobs",
          "description": "Currently running CI jobs",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "id": 3,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(gitlab_runner_jobs{state=\"running\", namespace=\"gitlab-runners\", pod=~\"$runner.*\"}) or vector(0)", "legendFormat": "Running", "refId": "A"}]
        },
        {
          "title": "Queue Depth",
          "description": "Jobs waiting in queue",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "id": 4,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 5}, {"color": "red", "value": 10}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(gitlab_runner_jobs{state=\"pending\", namespace=\"gitlab-runners\", pod=~\"$runner.*\"}) or vector(0)", "legendFormat": "Pending", "refId": "A"}]
        },
        {
          "title": "Failure Rate (10m)",
          "description": "Percentage of failed CI jobs over the last 10 minutes",
          "type": "gauge",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "id": 5,
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 15}, {"color": "red", "value": 30}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "(sum(rate(gitlab_runner_jobs{state=\"failed\", namespace=\"gitlab-runners\", pod=~\"$runner.*\"}[10m])) / clamp_min(sum(rate(gitlab_runner_jobs{namespace=\"gitlab-runners\", pod=~\"$runner.*\"}[10m])), 0.001)) * 100 or vector(0)", "legendFormat": "Failure Rate", "refId": "A"}]
        },
        {
          "title": "Version",
          "description": "GitLab Runner version",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "id": 6,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "name"},
          "targets": [{"expr": "gitlab_runner_version_info{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}", "legendFormat": "v{{ "{{version}}" }}", "refId": "A"}]
        },
        {
          "title": "Pod Restarts",
          "description": "Total restarts of runner manager pod(s)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 4},
          "id": 7,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 3}, {"color": "red", "value": 10}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(kube_pod_container_status_restarts_total{namespace=\"gitlab-runners\", pod=~\"$runner.*\"}) or vector(0)", "legendFormat": "Restarts", "refId": "A"}]
        },
        {
          "title": "CPU Usage",
          "description": "CPU usage of runner manager pod(s)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 4},
          "id": 8,
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 0.4}, {"color": "red", "value": 0.8}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"gitlab-runners\", pod=~\"$runner.*\", container=~\"gitlab-runner-.*\"}[5m])) or vector(0)", "legendFormat": "CPU Cores", "refId": "A"}]
        },
        {
          "title": "Memory Usage",
          "description": "Memory usage of runner manager pod(s)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 4},
          "id": 9,
          "fieldConfig": {"defaults": {"unit": "bytes", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 209715200}, {"color": "red", "value": 268435456}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace=\"gitlab-runners\", pod=~\"$runner.*\", container=~\"gitlab-runner-.*\"}) or vector(0)", "legendFormat": "Working Set", "refId": "A"}]
        },
        {
          "title": "Concurrent Limit",
          "description": "Maximum concurrent jobs configured",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 4},
          "id": 10,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "gitlab_runner_concurrent{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}", "legendFormat": "{{ "{{pod}}" }}", "refId": "A"}]
        },
        {
          "title": "Request Concurrency",
          "description": "Runner request concurrency limit",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 4},
          "id": 11,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}},
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "gitlab_runner_request_concurrency{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}", "legendFormat": "{{ "{{pod}}" }}", "refId": "A"}]
        },
        {
          "title": "Request Concurrency in Use",
          "description": "Currently active request slots",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 4},
          "id": 12,
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 8}, {"color": "red", "value": 10}]}}},
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "gitlab_runner_request_concurrency_exceeded_total{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}", "legendFormat": "Exceeded {{ "{{pod}}" }}", "refId": "A"}]
        },
        {
          "title": "Job Status Over Time",
          "description": "CI job rate by state over time",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 13,
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum(rate(gitlab_runner_jobs{namespace=\"gitlab-runners\", pod=~\"$runner.*\"}[5m])) by (state)", "legendFormat": "{{ "{{state}}" }}", "refId": "A"}
          ]
        },
        {
          "title": "Job Duration",
          "description": "CI job duration histogram percentiles",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 14,
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(gitlab_runner_job_duration_seconds_bucket{namespace=\"gitlab-runners\", pod=~\"$runner.*\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(gitlab_runner_job_duration_seconds_bucket{namespace=\"gitlab-runners\", pod=~\"$runner.*\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(gitlab_runner_job_duration_seconds_bucket{namespace=\"gitlab-runners\", pod=~\"$runner.*\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ]
        },
        {
          "title": "API Request Rate",
          "description": "GitLab API request rate by status code",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 15,
          "fieldConfig": {"defaults": {"unit": "reqps", "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum(rate(gitlab_runner_api_request_statuses_total{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}[5m])) by (status)", "legendFormat": "HTTP {{ "{{status}}" }}", "refId": "A"}
          ]
        },
        {
          "title": "Process Resource Usage",
          "description": "Runner process CPU and memory over time",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 16,
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "stacking": {"mode": "none"}, "spanNulls": false}}},
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "rate(process_cpu_seconds_total{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"}[5m])", "legendFormat": "CPU {{ "{{pod}}" }}", "refId": "A"},
            {"expr": "process_resident_memory_bytes{job=\"gitlab-runner-metrics\", pod=~\"$runner.*\"} / 1024 / 1024", "legendFormat": "Memory MB {{ "{{pod}}" }}", "refId": "B"}
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["gitlab", "runners", "ci"],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "GitLab Runners Overview",
      "uid": "gitlab-runners-overview",
      "version": 3,
      "description": "GitLab Runners monitoring — select a runner from the dropdown or view all. Covers readiness, job status, queue depth, failure rate, duration, and API requests."
    }
