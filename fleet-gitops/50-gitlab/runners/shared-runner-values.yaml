# Helm values for GitLab shared (instance-wide) runner
# Chart: gitlab/gitlab-runner
# Docs: https://docs.gitlab.com/runner/install/kubernetes.html

replicas: 1

## GitLab instance URL — runner registers here
gitlabUrl: https://gitlab.aegisgroup.ch

## TLS certificates for GitLab instance trust (Vault CA chain)
certsSecretName: gitlab-runner-certs

## Runner registration token (created by GitLab chart)
runners:
  secret: gitlab-gitlab-runner-secret
  config: |
    [[runners]]
      name = "shared-k8s-runner"
      executor = "kubernetes"
      request_concurrency = 4
      pre_build_script = """
      # Trust the private CA if update-ca-certificates is available
      if command -v update-ca-certificates >/dev/null 2>&1; then
        cp /etc/ssl/certs/vault-root-ca.pem /usr/local/share/ca-certificates/vault-root-ca.crt 2>/dev/null || true
        update-ca-certificates 2>/dev/null || true
      elif command -v update-ca-trust >/dev/null 2>&1; then
        cp /etc/ssl/certs/vault-root-ca.pem /etc/pki/ca-trust/source/anchors/vault-root-ca.crt 2>/dev/null || true
        update-ca-trust 2>/dev/null || true
      fi
      """
      [runners.kubernetes]
        namespace = "gitlab-runners"
        image = "alpine:3.21"
        service_account = "gitlab-runner-sa"
        pull_policy = ["if-not-present"]
        [runners.kubernetes.node_selector]
          "workload-type" = "compute"
        [runners.kubernetes.volumes]
          [[runners.kubernetes.volumes.config_map]]
            name = "vault-root-ca"
            mount_path = "/etc/ssl/certs/vault-root-ca.pem"
            sub_path = "ca.crt"
            read_only = true
        [runners.kubernetes.pod_labels]
          "app.kubernetes.io/managed-by" = "gitlab-runner"

  ## Tags applied to this runner
  tags: "shared,kubernetes,compute"

## Runner pod node selector (the runner manager pod itself)
nodeSelector:
  workload-type: general

## Use pre-existing RBAC and ServiceAccount (from rbac.yaml)
rbac:
  create: false

serviceAccount:
  create: false
  name: gitlab-runner-sa

## VAULT_CACERT tells the runner's Vault secret resolver where to find
## the private CA so it can verify vault.aegisgroup.ch TLS certificate
## during the "Resolving secrets" phase (before job pods start).
envVars:
  - name: VAULT_CACERT
    value: /etc/ssl/certs/vault-root-ca.pem

## Mount Root CA into the runner manager pod for Vault + GitLab TLS trust
volumeMounts:
  - name: vault-root-ca
    mountPath: /etc/ssl/certs/vault-root-ca.pem
    subPath: gitlab.aegisgroup.ch.crt
    readOnly: true

volumes:
  - name: vault-root-ca
    secret:
      secretName: gitlab-runner-certs

## Prometheus metrics
metrics:
  enabled: true
  portName: metrics
  port: 9252

## Resource requests for the runner manager pod
resources:
  requests:
    cpu: 100m
    memory: 128Mi
