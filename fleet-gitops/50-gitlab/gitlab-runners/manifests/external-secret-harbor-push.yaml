apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-ci-push
  namespace: gitlab-runners
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harbor-ci-push
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: services/harbor/ci-robot
        property: username
    - secretKey: password
      remoteRef:
        key: services/harbor/ci-robot
        property: password
