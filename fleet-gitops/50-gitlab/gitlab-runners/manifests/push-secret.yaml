# Password generator + PushSecret for CI Harbor push credentials
# Generates password and combines with static username "ci-push",
# then pushes to Vault for the ExternalSecret to pull from
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-push-password-gen
  namespace: gitlab-runners
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-push-generated-credentials
  namespace: gitlab-runners
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harbor-push-generated-credentials
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        username: "ci-push"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: harbor-push-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "password"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-push-credentials-push
  namespace: gitlab-runners
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: harbor-push-generated-credentials
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: services/ci/harbor-push
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/ci/harbor-push
          property: password
