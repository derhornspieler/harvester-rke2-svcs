apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harvester-kubeconfig
  namespace: gitlab-runners
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: harvester-kubeconfig
    creationPolicy: Owner
  data:
    - secretKey: kubeconfig-harvester.yaml
      remoteRef:
        key: services/ci/harvester-kubeconfig
        property: kubeconfig
