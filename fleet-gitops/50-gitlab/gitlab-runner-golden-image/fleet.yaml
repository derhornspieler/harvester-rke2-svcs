defaultNamespace: gitlab-runners
helm:
  releaseName: gitlab-runner-golden-image
  chart: ${OCI_HELM_PREFIX}/gitlab-runner
  version: "${CHART_VER_GITLAB_RUNNER}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: gitlab-runners
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
