# Password generator + PushSecret for GitLab Redis credentials
# Generates password and pushes directly to Vault
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: redis-password-gen
  namespace: gitlab
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: redis-credentials-push
  namespace: gitlab
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    generatorRef:
      apiVersion: generators.external-secrets.io/v1alpha1
      kind: Password
      name: redis-password-gen
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/gitlab/redis
          property: password
