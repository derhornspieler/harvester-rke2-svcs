# OpsTree Redis Operator -- RedisSentinel CRD for GitLab
# Monitors the RedisReplication and provides HA failover
# NOTE: Do NOT use kubernetesConfig.redisSecret on sentinel -- it sets both
# requirepass AND masterauth. GitLab chart has no sentinelPassword field.
# Instead use redisSentinelConfig.redisReplicationPassword which sets
# ONLY masterauth (sentinel can auth to master, but clients can query
# sentinel without auth). Acceptable: sentinel is ClusterIP-only.
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: gitlab-redis
  namespace: gitlab
spec:
  clusterSize: 3
  kubernetesConfig:
    image: ${IMAGE_REDIS_SENTINEL}
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
  redisSentinelConfig:
    redisReplicationName: gitlab-redis
    masterGroupName: ${REDIS_MASTER_NAME}
    redisPort: "6379"
    quorum: "2"
    redisReplicationPassword:
      secretKeyRef:
        name: gitlab-redis-credentials
        key: password
  nodeSelector:
    workload-type: database
  podSecurityContext:
    runAsUser: 999
    fsGroup: 999
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: gitlab-redis-sentinel
            topologyKey: kubernetes.io/hostname
