# OpsTree Redis Operator -- RedisReplication CRD for GitLab
# Provides: 3-replica Redis replication (1 master + 2 replicas)
# Naming: CRD name "gitlab-redis" -> operator creates:
#   StatefulSet: gitlab-redis        Pods: gitlab-redis-{0,1,2}
#   Service:     gitlab-redis        Headless: gitlab-redis-headless
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: gitlab-redis
  namespace: gitlab
spec:
  clusterSize: 3
  kubernetesConfig:
    image: ${IMAGE_REDIS}
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
    redisSecret:
      name: gitlab-redis-credentials
      key: password
  redisExporter:
    enabled: true
    image: ${IMAGE_REDIS_EXPORTER}
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: ${STORAGE_CLASS}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  nodeSelector:
    workload-type: database
  podSecurityContext:
    runAsUser: 999
    fsGroup: 999
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: gitlab-redis
            topologyKey: kubernetes.io/hostname
