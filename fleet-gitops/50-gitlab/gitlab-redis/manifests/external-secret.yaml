apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-redis-credentials
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: services/gitlab/redis
        property: password
