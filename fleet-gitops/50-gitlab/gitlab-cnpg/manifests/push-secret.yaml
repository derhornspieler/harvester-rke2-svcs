# PushSecret for GitLab PostgreSQL credentials
# Pushes CNPG auto-generated gitlab-postgresql-app secret to Vault
# so ExternalSecrets in the gitlab namespace can pull it
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: gitlab-pg-credentials-push
  namespace: database
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: gitlab-postgresql-app
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: services/database/gitlab-postgresql
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: services/database/gitlab-postgresql
          property: password
---
# ExternalSecret to pull praefect DB password into database namespace
# CNPG managed.roles references this secret for the praefect user password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: praefect-pg-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: praefect-pg-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: praefect
        password: '{{ "{{ .password }}" }}'
  data:
    - secretKey: password
      remoteRef:
        key: services/gitlab/praefect-dbsecret
        property: secret
