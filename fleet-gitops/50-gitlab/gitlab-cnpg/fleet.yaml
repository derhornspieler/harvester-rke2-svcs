defaultNamespace: database
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: gitlab-init
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: operators-cnpg
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      operations:
        - op: remove
          path: /status
    - apiVersion: postgresql.cnpg.io/v1
      kind: ScheduledBackup
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
