defaultNamespace: external-dns
helm:
  releaseName: external-dns
  chart: ${OCI_HELM_PREFIX}/external-dns
  version: "${CHART_VER_EXTERNAL_DNS}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: pki-external-secrets
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
