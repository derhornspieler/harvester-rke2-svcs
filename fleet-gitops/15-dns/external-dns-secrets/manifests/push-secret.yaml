# Password generator + PushSecret for external-dns TSIG credentials
# Generates tsig-key-secret and combines with static tsig-key-name
# and tsig-key-algorithm, then pushes to Vault
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: external-dns-tsig-secret-gen
  namespace: external-dns
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-tsig-generated
  namespace: external-dns
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: external-dns-tsig-generated
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        tsig-key-name: "${TSIG_KEY_NAME}"
        tsig-key-algorithm: "hmac-sha256"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: external-dns-tsig-secret-gen
      rewrite:
        - regexp:
            source: "password"
            target: "tsig-key-secret"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: external-dns-tsig-push
  namespace: external-dns
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: external-dns-tsig-generated
  data:
    - match:
        secretKey: tsig-key-name
        remoteRef:
          remoteKey: services/dns/external-dns-tsig
          property: tsig-key-name
    - match:
        secretKey: tsig-key-secret
        remoteRef:
          remoteKey: services/dns/external-dns-tsig
          property: tsig-key-secret
    - match:
        secretKey: tsig-key-algorithm
        remoteRef:
          remoteKey: services/dns/external-dns-tsig
          property: tsig-key-algorithm
