---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
---
# ServiceAccount for ESO to read Vault
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: external-dns
---
# SecretStore pointing at Vault
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: external-dns
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-external-dns"
          serviceAccountRef:
            name: eso-secrets
---
# SecretStore for PushSecret (writer role)
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-writer
  namespace: external-dns
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-writer-external-dns"
          serviceAccountRef:
            name: eso-secrets
---
# ExternalSecret: TSIG key for RFC2136 DNS updates
# Vault path: kv/services/dns/external-dns-tsig
# Keys: tsig-key-name, tsig-key-secret, tsig-key-algorithm
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-tsig
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: external-dns-tsig
  data:
    - secretKey: tsig-key-name
      remoteRef:
        key: services/dns/external-dns-tsig
        property: tsig-key-name
    - secretKey: tsig-key-secret
      remoteRef:
        key: services/dns/external-dns-tsig
        property: tsig-key-secret
    - secretKey: tsig-key-algorithm
      remoteRef:
        key: services/dns/external-dns-tsig
        property: tsig-key-algorithm
