defaultNamespace: backup
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: backup-minio
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: operators-storage-autoscaler
diff:
  comparePatches:
    - apiVersion: autoscaling.volume-autoscaler.io/v1alpha1
      kind: VolumeAutoscaler
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
