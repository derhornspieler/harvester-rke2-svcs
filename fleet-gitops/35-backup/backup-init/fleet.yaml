defaultNamespace: backup
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: backup-minio
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: pki-vault-bootstrap-store
diff:
  comparePatches:
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
