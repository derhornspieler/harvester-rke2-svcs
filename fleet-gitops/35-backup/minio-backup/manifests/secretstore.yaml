apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: backup
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: "eso-reader-backup"
          serviceAccountRef:
            name: external-secrets
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-writer
  namespace: backup
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: "eso-writer-backup"
          serviceAccountRef:
            name: external-secrets
