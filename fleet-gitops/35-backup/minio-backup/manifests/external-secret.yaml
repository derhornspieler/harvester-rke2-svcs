# Read backup-minio root credentials from Vault.
# Credentials are seeded by vault-init Job (kv/admin/backup).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backup-minio-root-credentials
  namespace: backup
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: backup-minio-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: root-user
      remoteRef:
        key: admin/backup
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: admin/backup
        property: root-password
