# Onboard identity-portal to the platform:
#   1. Create OIDC client in Keycloak
#   2. Seed client secret in Vault
#   3. Create ESO reader role + SecretStore for dev-identity-webui namespace
#
# Auth: K8s auth to Vault (bootstrap-base-keycloak role). NO root token.
# Requires: Vault unsealed, Keycloak running with platform realm.
apiVersion: batch/v1
kind: Job
metadata:
  name: onboard-identity-portal
  namespace: keycloak
  labels:
    app.kubernetes.io/name: onboard-identity-portal
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: onboard-identity-portal
    spec:
      serviceAccountName: keycloak-init
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: vault-bin
          emptyDir: {}
      initContainers:
        - name: vault-bin
          image: ${IMAGE_VAULT}
          command: ["cp", "/bin/vault", "/vault-bin/vault"]
          volumeMounts:
            - name: vault-bin
              mountPath: /vault-bin
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: onboard
          image: ${IMAGE_ALPINE_K8S}
          env:
            - name: PATH
              value: "/vault-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: HOME
              value: "/tmp"
            - name: VAULT_ADDR
              value: "${VAULT_INTERNAL_URL}"
            - name: KEYCLOAK_URL
              value: "${KEYCLOAK_INTERNAL_URL}"
            - name: KC_REALM
              value: "${KEYCLOAK_REALM}"
            - name: KC_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              log() { echo "[$(date +%H:%M:%S)] $*" >&2; }

              vault_k8s_login() {
                local role="$1"
                local sa_token
                sa_token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                  role="${role}" jwt="${sa_token}")
                export VAULT_TOKEN
                log "[INFO] Authenticated to Vault as role: ${role}"
              }

              vault_get_or_generate() {
                local path="$1" property="$2" length="${3:-32}"
                local existing
                existing=$(vault kv get -field="${property}" "kv/${path}" 2>/dev/null || true)
                if [[ -n "${existing}" ]]; then
                  echo "${existing}"
                  return 0
                fi
                head -c 256 /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c "${length}" || true
              }

              # --- Authenticate to Vault ---
              vault_k8s_login "bootstrap-base-keycloak"

              # --- Step 1: Create OIDC client in Keycloak ---
              log "[INFO] Creating identity-portal OIDC client..."
              KC_TOKEN=$(curl -s --http1.1 -X POST \
                "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                --data-urlencode "grant_type=password" \
                --data-urlencode "client_id=admin-cli" \
                --data-urlencode "username=admin" \
                --data-urlencode "password=${KC_ADMIN_SECRET}" \
                | jq -r '.access_token')

              if [[ -z "${KC_TOKEN}" || "${KC_TOKEN}" == "null" ]]; then
                log "[ERROR] Failed to get Keycloak admin token"
                exit 1
              fi

              CLIENT_ID="identity-portal"
              REDIRECT_URI="https://identity.dev.${DOMAIN}/*"
              CLIENT_SECRET=$(vault_get_or_generate "services/identity-portal" "oidc-client-secret")

              EXISTING_ID=$(curl -s --http1.1 -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/${KC_REALM}/clients?clientId=${CLIENT_ID}" \
                | jq -r '.[0].id // empty' 2>/dev/null || true)

              CLIENT_JSON=$(jq -n \
                --arg clientId "${CLIENT_ID}" \
                --arg secret "${CLIENT_SECRET}" \
                --arg redirectUri "${REDIRECT_URI}" \
                '{
                  clientId: $clientId,
                  enabled: true,
                  protocol: "openid-connect",
                  publicClient: false,
                  secret: $secret,
                  redirectUris: [$redirectUri],
                  webOrigins: ["https://identity.dev.'"${DOMAIN}"'"],
                  standardFlowEnabled: true,
                  directAccessGrantsEnabled: false,
                  attributes: {
                    "post.logout.redirect.uris": $redirectUri,
                    "pkce.code.challenge.method": "S256"
                  }
                }')

              if [[ -n "${EXISTING_ID}" ]]; then
                curl -s --http1.1 -X PUT -H "Authorization: Bearer ${KC_TOKEN}" \
                  -H "Content-Type: application/json" \
                  "${KEYCLOAK_URL}/admin/realms/${KC_REALM}/clients/${EXISTING_ID}" \
                  -d "${CLIENT_JSON}" >/dev/null
                log "[INFO] Updated OIDC client: ${CLIENT_ID}"
              else
                curl -s --http1.1 -X POST -H "Authorization: Bearer ${KC_TOKEN}" \
                  -H "Content-Type: application/json" \
                  "${KEYCLOAK_URL}/admin/realms/${KC_REALM}/clients" \
                  -d "${CLIENT_JSON}" >/dev/null
                log "[INFO] Created OIDC client: ${CLIENT_ID}"
              fi

              # Assign groups scope
              SCOPE_ID=$(curl -s --http1.1 -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/${KC_REALM}/client-scopes" \
                | jq -r '.[] | select(.name=="groups") | .id' 2>/dev/null || echo "")
              CLIENT_UUID=$(curl -s --http1.1 -H "Authorization: Bearer ${KC_TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/${KC_REALM}/clients?clientId=${CLIENT_ID}" \
                | jq -r '.[0].id // empty' 2>/dev/null || echo "")
              if [[ -n "${SCOPE_ID}" && -n "${CLIENT_UUID}" ]]; then
                curl -s --http1.1 -X PUT -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/${KC_REALM}/clients/${CLIENT_UUID}/default-client-scopes/${SCOPE_ID}" >/dev/null 2>&1 || true
                log "[INFO] Assigned groups scope to ${CLIENT_ID}"
              fi

              # --- Step 2: Seed client secret in Vault ---
              log "[INFO] Seeding OIDC secret in Vault..."
              vault kv put "kv/services/identity-portal" \
                oidc-client-secret="${CLIENT_SECRET}"
              log "[INFO] Written to kv/services/identity-portal"

              # --- Step 3: Create ESO reader role for dev-identity-webui namespace ---
              log "[INFO] Creating ESO Vault role for dev-identity-webui..."

              # Policy: read services/identity-portal
              vault policy write eso-reader-dev-identity-webui - <<POLICY
              path "kv/data/services/identity-portal" {
                capabilities = ["read"]
              }
              path "kv/data/services/identity-portal/*" {
                capabilities = ["read"]
              }
              path "kv/metadata/services/identity-portal" {
                capabilities = ["read"]
              }
              path "kv/metadata/services/identity-portal/*" {
                capabilities = ["read"]
              }
              POLICY
              log "[INFO] Created Vault policy: eso-reader-dev-identity-webui"

              # K8s auth role
              vault write auth/kubernetes/role/eso-reader-dev-identity-webui \
                bound_service_account_names="eso-secrets,external-secrets" \
                bound_service_account_namespaces="dev-identity-webui" \
                policies="eso-reader-dev-identity-webui" \
                ttl=1h
              log "[INFO] Created Vault K8s role: eso-reader-dev-identity-webui"

              # Create SecretStore in dev-identity-webui namespace
              kubectl apply -f - <<SSEOF
              apiVersion: external-secrets.io/v1
              kind: SecretStore
              metadata:
                name: vault-backend
                namespace: dev-identity-webui
              spec:
                provider:
                  vault:
                    server: "${VAULT_ADDR}"
                    path: kv
                    version: v2
                    auth:
                      kubernetes:
                        mountPath: kubernetes
                        role: "eso-reader-dev-identity-webui"
                        serviceAccountRef:
                          name: external-secrets
              SSEOF
              log "[INFO] Created SecretStore in dev-identity-webui"

              log "[INFO] identity-portal onboarding complete"
          volumeMounts:
            - name: vault-bin
              mountPath: /vault-bin
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
