# Password generator + PushSecret for Keycloak admin credentials
# Generates KC_BOOTSTRAP_ADMIN_PASSWORD and combines with static
# KC_BOOTSTRAP_ADMIN_USERNAME "admin", then pushes to Vault
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: keycloak-admin-password-gen
  namespace: keycloak
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-generated
  namespace: keycloak
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: keycloak-admin-generated
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: keycloak-admin-password-gen
      rewrite:
        - regexp:
            source: "password"
            target: "KC_BOOTSTRAP_ADMIN_PASSWORD"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: keycloak-admin-push
  namespace: keycloak
spec:
  updatePolicy: IfNotExists
  secretStoreRefs:
    - name: vault-writer
      kind: SecretStore
  selector:
    secret:
      name: keycloak-admin-generated
  data:
    - match:
        secretKey: KC_BOOTSTRAP_ADMIN_USERNAME
        remoteRef:
          remoteKey: services/keycloak/admin-secret
          property: KC_BOOTSTRAP_ADMIN_USERNAME
    - match:
        secretKey: KC_BOOTSTRAP_ADMIN_PASSWORD
        remoteRef:
          remoteKey: services/keycloak/admin-secret
          property: KC_BOOTSTRAP_ADMIN_PASSWORD
