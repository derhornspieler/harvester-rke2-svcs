defaultNamespace: keycloak
helm:
  releaseName: keycloak
  chart: ${OCI_CHART_KEYCLOAKX}
  version: "${CHART_VER_KEYCLOAKX}"
  valuesFiles:
    - values.yaml
dependsOn:
  - name: identity-keycloak-init
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
