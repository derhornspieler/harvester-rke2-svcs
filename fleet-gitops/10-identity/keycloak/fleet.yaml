defaultNamespace: keycloak
helm:
  releaseName: keycloak
  chart: ${OCI_CHART_KEYCLOAKX}
  version: "${CHART_VER_KEYCLOAKX}"
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: identity-keycloak-init
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: identity-cnpg-keycloak
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
    - apiVersion: apps/v1
      kind: StatefulSet
      operations:
        - op: remove
          path: /spec/template/metadata/annotations/checksum~1config-startup
        - op: remove
          path: /spec/template/metadata/annotations/checksum~1secrets
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
