# keycloakx Helm values — migrated from raw manifests
# Chart: codecentric/keycloakx 7.1.9 (via DHI oci://dhi.io/keycloak-chart)

fullnameOverride: keycloak

# --- Replicas (disabled when autoscaling is enabled) ---
replicas: 2

# --- Image: DHI hardened image (dhi.io/keycloak:26.5.6-debian13) ---
# Uses chart defaults: repository, tag, and pinned digest from DHI.
# Do NOT override — the DHI image is pre-built with kc.sh build.
# Do NOT set command or args — chart sets [kc.sh, start], image handles the rest.
# The "build time options differ" warning at startup is harmless — runtime values take effect.

# --- Pod Management ---
podManagementPolicy: Parallel
updateStrategy: RollingUpdate

# --- Service Account & RBAC (needed for KUBE_PING cache discovery) ---
serviceAccount:
  create: true
  name: keycloak
  # allowReadPods creates ClusterRole for JGroups KUBE_PING discovery
  allowReadPods: true
  automountServiceAccountToken: true

# rbac.create: false — allowReadPods handles KUBE_PING RBAC via ClusterRole
rbac:
  create: false

# --- Security Context: DHI image runs as UID 65532 (nonroot) ---
podSecurityContext:
  fsGroup: 65532

securityContext:
  runAsUser: 65532
  runAsNonRoot: true

# --- Database ---
database:
  vendor: postgres
  hostname: ${KEYCLOAK_DB_HOST}
  port: 5432
  database: ${KEYCLOAK_DB_NAME}
  existingSecret: keycloak-postgres-secret
  existingSecretKey: POSTGRES_PASSWORD

# --- Cache: keep kubernetes stack (KUBE_PING via JGroups DNS) ---
cache:
  stack: custom

# --- Proxy ---
proxy:
  enabled: true
  mode: xforwarded
  http:
    enabled: true

# --- Metrics & Health ---
metrics:
  enabled: true
health:
  enabled: true

# --- HTTP path (modern Keycloak uses / not /auth) ---
http:
  relativePath: "/"
  internalPort: http-internal
  internalScheme: HTTP

# --- Extra environment variables ---
extraEnv: |
  - name: KC_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-postgres-secret
        key: POSTGRES_USER
  - name: KC_HOSTNAME
    value: ${KEYCLOAK_FQDN}
  - name: KC_CACHE
    value: ispn
  - name: KC_CACHE_STACK
    value: kubernetes
  - name: JAVA_OPTS_APPEND
    value: -Djgroups.dns.query=keycloak-headless.keycloak.svc.cluster.local
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-secret
        key: KC_BOOTSTRAP_ADMIN_USERNAME
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-secret
        key: KC_BOOTSTRAP_ADMIN_PASSWORD

# --- Extra ports (JGroups for kubernetes cache stack) ---
extraPorts:
  - name: jgroups
    containerPort: 7800
    protocol: TCP

# --- Resources (requests only, no limits — allows bursting) ---
resources:
  requests:
    cpu: 500m
    memory: 512Mi

# --- Probes ---
startupProbe: |
  httpGet:
    path: /health/started
    port: 9000
  failureThreshold: 30
  periodSeconds: 5

readinessProbe: |
  httpGet:
    path: /health/ready
    port: 9000
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe: |
  httpGet:
    path: /health/live
    port: 9000
  initialDelaySeconds: 60
  periodSeconds: 30

# --- Node placement ---
nodeSelector:
  workload-type: general

topologySpreadConstraints: |
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        {{- include "keycloak.selectorLabels" . | nindent 6 }}

affinity: |
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              {{- include "keycloak.selectorLabels" . | nindent 12 }}
          topologyKey: kubernetes.io/hostname

# --- Headless service (add JGroups port) ---
serviceHeadless:
  extraPorts:
    - name: jgroups
      port: 7800
      targetPort: 7800
      protocol: TCP

# --- Service ---
# IMPORTANT: Do NOT add management/9000 as extraPort — chart already exposes
# port 9000 as 'http-internal' on keycloak-http. Duplicate port causes K8s rejection.
# Result: keycloak-http service has ports: http-internal(9000), http(8080)
service:
  type: ClusterIP
  httpPort: 8080
  httpsPort: null  # Disable HTTPS port — TLS terminates at Traefik Gateway

# --- Pod Disruption Budget (new — chart bonus) ---
podDisruptionBudget:
  minAvailable: 1

# --- HPA ---
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300

# --- Gateway API HTTPRoute (new in chart 7.1.9) ---
# NOTE: Chart hardcodes backendRef to keycloak-http:servicePort.
# Do NOT specify backendRefs in rules — the chart template ignores them.
httpRoute:
  enabled: true
  servicePort: 8080
  parentRefs:
    - name: keycloak
      namespace: keycloak
      sectionName: https
  hostnames:
    - "${KEYCLOAK_FQDN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

# --- ServiceMonitor ---
# NOTE: Chart creates ServiceMonitor named 'keycloak-keycloakx' that selects
# the 'keycloak-http' service. Without relabeling, the Prometheus 'job' label
# changes from 'keycloak' to the service name, breaking all alert expressions
# and Grafana dashboard queries that filter on job="keycloak".
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: http-internal
  relabelings:
    - targetLabel: job
      replacement: keycloak

# --- PrometheusRule ---
prometheusRule:
  enabled: true
  rules:
    - alert: KeycloakDown
      expr: up{job="keycloak"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Keycloak is down"
        description: 'Keycloak instance {{ "{{ $labels.instance }}" }} has been unreachable for more than 5 minutes.'

    - alert: KeycloakAllReplicasDown
      expr: |
        sum(up{job="keycloak"}) == 0
        and count(up{job="keycloak"}) > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "All Keycloak replicas are down"
        description: "No Keycloak replicas are responding. All OIDC authentication is unavailable."

    - alert: KeycloakHighLoginFailureRate
      expr: |
        (
          sum(rate(http_server_requests_seconds_count{job="keycloak",uri=~".*/protocol/openid-connect/token",status=~"4.."}[5m]))
          / sum(rate(http_server_requests_seconds_count{job="keycloak",uri=~".*/protocol/openid-connect/token"}[5m]))
        ) > 0.3
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Keycloak login failure rate > 30%"
        description: '{{ "{{ $value | humanizePercentage }}" }} of OIDC token requests are failing (4xx).'

    - alert: KeycloakHighTokenLatency
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_server_requests_seconds_bucket{job="keycloak",uri=~".*/protocol/openid-connect/token"}[5m])) by (le)
        ) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Keycloak token request p99 latency > 2s"
        description: 'Keycloak OIDC token request p99 latency is {{ "{{ $value | humanizeDuration }}" }}.'

    - alert: KeycloakHighServerErrorRate
      expr: |
        sum(rate(http_server_requests_seconds_count{job="keycloak",status=~"5.."}[5m])) > 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Keycloak returning server errors"
        description: 'Keycloak is returning {{ "{{ $value | humanize }}" }} server errors per second (5xx).'

    - alert: KeycloakJvmHeapPressure
      expr: |
        (jvm_memory_used_bytes{job="keycloak",area="heap"}
        / jvm_memory_max_bytes{job="keycloak",area="heap"}) > 0.9
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Keycloak JVM heap usage > 90%"
        description: 'Keycloak instance {{ "{{ $labels.instance }}" }} heap is at {{ "{{ $value | humanizePercentage }}" }}.'

    - alert: KeycloakHighGCPause
      expr: |
        rate(jvm_gc_pause_seconds_sum{job="keycloak"}[5m])
        / rate(jvm_gc_pause_seconds_count{job="keycloak"}[5m]) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Keycloak GC pauses averaging > 500ms"
        description: 'Keycloak instance {{ "{{ $labels.instance }}" }} average GC pause is {{ "{{ $value | humanizeDuration }}" }}.'

# --- Networking ---
networkPolicy:
  enabled: false

# --- Ingress (disabled — using Gateway API) ---
ingress:
  enabled: false
