defaultNamespace: keycloak
dependsOn:
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: identity-cnpg-keycloak
  - selector:
      matchLabels:
        fleet.cattle.io/bundle-name: pki-vault-bootstrap-store
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
