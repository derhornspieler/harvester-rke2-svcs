apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: database
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: database
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-database"
          serviceAccountRef:
            name: "external-secrets"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-writer
  namespace: database
spec:
  provider:
    vault:
      server: "${VAULT_INTERNAL_URL}"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-writer-database"
          serviceAccountRef:
            name: "external-secrets"
