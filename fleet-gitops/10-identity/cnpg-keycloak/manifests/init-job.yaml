# cnpg-keycloak init: Create SecretStores and seed database credentials
# for the database namespace.
#
# Auth: K8s auth to Vault as eso-writer-database (pre-created by vault-init).
# Vault policies and ESO auth roles are pre-created by vault-init in
# 05-pki-secrets. This Job creates the namespace SecretStores and seeds
# keycloak-pg credentials to Vault KV.
#
# Requires: Vault unsealed with K8s auth enabled (05-pki-secrets).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets
  namespace: database
---
# external-secrets SA — referenced by SecretStores for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: database
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: database-init
  namespace: database
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: database-init
  namespace: database
subjects:
  - kind: ServiceAccount
    name: eso-secrets
    namespace: database
roleRef:
  kind: Role
  name: database-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: database-init
  namespace: database
  labels:
    app.kubernetes.io/name: database-init
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database-init
    spec:
      serviceAccountName: eso-secrets
      restartPolicy: OnFailure
      nodeSelector:
        workload-type: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: vault-bin
          emptyDir: {}
      initContainers:
        - name: vault-bin
          image: ${IMAGE_VAULT}
          command: ["cp", "/bin/vault", "/vault-bin/vault"]
          volumeMounts:
            - name: vault-bin
              mountPath: /vault-bin
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: database-init
          image: ${IMAGE_ALPINE_K8S}
          env:
            - name: PATH
              value: "/vault-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: VAULT_ADDR
              value: "${VAULT_INTERNAL_URL}"
          command: ["/bin/bash", "-euo", "pipefail", "-c"]
          args:
            - |
              # database-init: SecretStores + keycloak-pg credential seeding
              # Idempotent — safe to re-run.
              #
              # Vault policies and ESO auth roles are pre-created by vault-init.
              # This Job handles namespace-level resources and credential seeding.

              NAMESPACE="database"

              ###############################################################
              # Inline helpers (no init-lib.sh dependency)
              ###############################################################
              log() { echo "[$(date +%H:%M:%S)] $*" >&2; }

              vault_k8s_login() {
                local role="$1"
                local sa_token
                sa_token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                  role="${role}" jwt="${sa_token}")
                export VAULT_TOKEN
                log "[INFO] Authenticated to Vault as role: ${role}"
              }

              vault_get_or_generate() {
                local path="$1" field="$2" length="${3:-32}"
                local existing
                existing=$(vault kv get -field="${field}" "kv/${path}" 2>/dev/null || true)
                if [[ -n "${existing}" ]]; then
                  echo "${existing}"
                  return 0
                fi
                head -c 256 /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c "${length}" || true
              }

              vault_kv_put() {
                local path="$1"; shift
                vault kv put "kv/${path}" "$@"
                log "[INFO] Written to kv/${path}"
              }

              ###############################################################
              # Main
              ###############################################################

              # --- Authenticate to Vault ---
              # eso-writer-database role is pre-created by vault-init, bound to
              # eso-secrets SA in database namespace with eso-writer policy.
              vault_k8s_login "eso-writer-database"

              # --- Create SecretStores in database namespace ---
              log "[INFO] Creating SecretStores in ${NAMESPACE}..."
              kubectl apply -f - <<SSEOF
              apiVersion: external-secrets.io/v1
              kind: SecretStore
              metadata:
                name: vault-backend
                namespace: ${NAMESPACE}
              spec:
                provider:
                  vault:
                    server: "${VAULT_ADDR}"
                    path: kv
                    version: v2
                    auth:
                      kubernetes:
                        mountPath: kubernetes
                        role: "eso-reader-${NAMESPACE}"
                        serviceAccountRef:
                          name: external-secrets
              ---
              apiVersion: external-secrets.io/v1
              kind: SecretStore
              metadata:
                name: vault-writer
                namespace: ${NAMESPACE}
              spec:
                provider:
                  vault:
                    server: "${VAULT_ADDR}"
                    path: kv
                    version: v2
                    auth:
                      kubernetes:
                        mountPath: kubernetes
                        role: "eso-writer-${NAMESPACE}"
                        serviceAccountRef:
                          name: external-secrets
              SSEOF
              log "[INFO] SecretStores created in ${NAMESPACE}"

              # --- Seed keycloak-pg database credentials ---
              log "[INFO] Seeding keycloak-pg database credentials..."
              DB_PASSWORD=$(vault_get_or_generate "services/database/keycloak-pg" "password")
              vault_kv_put "services/database/keycloak-pg" \
                username="keycloak" \
                password="${DB_PASSWORD}"
              log "[INFO] keycloak-pg database credentials stored"

              log "[INFO] database-init complete"
          volumeMounts:
            - name: vault-bin
              mountPath: /vault-bin
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
