defaultNamespace: redis-operator
helm:
  releaseName: redis-operator
  chart: ${OCI_HELM_PREFIX}/redis-operator
  version: "${CHART_VER_REDIS_OPERATOR}"
  valuesFiles:
    - values.yaml
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
