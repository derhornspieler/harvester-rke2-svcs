defaultNamespace: cnpg-system
helm:
  releaseName: cnpg
  chart: ${OCI_HELM_PREFIX}/cloudnative-pg
  version: "${CHART_VER_CNPG}"
  valuesFiles:
    - values.yaml
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      operations:
        - op: remove
          path: /spec/resources/requests/storage
        - op: remove
          path: /spec/resources/requests
    - apiVersion: batch/v1
      kind: Job
      operations:
        - op: remove
          path: /status
targets:
  - clusterName: ${FLEET_TARGET_CLUSTER}
