---
# Overprovisioning pause pods for the general node pool
# Reserve capacity on general nodes (4 CPU, 16Gi per node)
# 1 replica x 2 CPU/6Gi = buffer on one node
# Using 1 replica so Fleet sees 1/1 Ready (Pending pause pods are by-design
# but Fleet interprets them as "not minimum availability")
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overprovisioning-general
  namespace: cluster-autoscaler
  labels:
    app.kubernetes.io/name: overprovisioning
    app.kubernetes.io/component: general
    app.kubernetes.io/part-of: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: overprovisioning
      app.kubernetes.io/component: general
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overprovisioning
        app.kubernetes.io/component: general
    spec:
      priorityClassName: overprovisioning
      terminationGracePeriodSeconds: 0
      nodeSelector:
        workload-type: general
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: overprovisioning
                    app.kubernetes.io/component: general
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
---
# Overprovisioning pause pods for the compute node pool
# Reserve capacity on compute nodes (16 CPU, 32Gi per node)
# 1 replica x 2 CPU/4Gi = modest buffer on the existing node
# (compute pool min=1, so 1 replica avoids Pending from anti-affinity)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overprovisioning-compute
  namespace: cluster-autoscaler
  labels:
    app.kubernetes.io/name: overprovisioning
    app.kubernetes.io/component: compute
    app.kubernetes.io/part-of: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: overprovisioning
      app.kubernetes.io/component: compute
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overprovisioning
        app.kubernetes.io/component: compute
    spec:
      priorityClassName: overprovisioning
      terminationGracePeriodSeconds: 0
      nodeSelector:
        workload-type: compute
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: overprovisioning
                    app.kubernetes.io/component: compute
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
