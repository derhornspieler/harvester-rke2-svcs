# Milvus MinIO Init Job
# Creates the forge-milvus bucket and stores credentials in Vault
# for the milvus namespace ESO to consume.
#
# Runs as a one-shot Job in the minio namespace (where root creds exist).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: milvus-minio-init
  namespace: minio
  labels:
    app.kubernetes.io/part-of: forge
    app.kubernetes.io/component: milvus-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: milvus-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: minio-init
      initContainers:
        - name: vault-bin
          image: docker.io/alpine/k8s:1.32.4
          command: ["sh", "-c", "cp /usr/bin/kubectl /shared/kubectl"]
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: init
          image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
          command:
            - /bin/sh
            - -euc
            - |
              echo "[$(date +%H:%M:%S)] Waiting for MinIO..."
              until mc alias set myminio http://minio.minio.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                sleep 5
              done

              echo "[$(date +%H:%M:%S)] Creating bucket forge-milvus..."
              mc mb --ignore-existing myminio/forge-milvus

              echo "[$(date +%H:%M:%S)] Creating MinIO user for Milvus..."
              MILVUS_ACCESS_KEY="milvus-sa"
              MILVUS_SECRET_KEY=$(head -c 24 /dev/urandom | od -An -tx1 | tr -d ' \n')
              mc admin user add myminio "$MILVUS_ACCESS_KEY" "$MILVUS_SECRET_KEY" 2>/dev/null || \
                echo "User already exists, updating password..." && \
                mc admin user add myminio "$MILVUS_ACCESS_KEY" "$MILVUS_SECRET_KEY"
              mc admin policy attach myminio readwrite --user "$MILVUS_ACCESS_KEY" 2>/dev/null || true

              echo "[$(date +%H:%M:%S)] Storing credentials in Vault..."
              # Use kubectl exec to write to Vault (same pattern as harbor-init)
              INIT_JSON=$(/shared/kubectl get secret vault-init-keys -n vault \
                -o jsonpath='{.data.init\.json}' | base64 -d)
              ROOT_TOKEN=$(echo "$INIT_JSON" \
                | grep -o '"root_token"[[:space:]]*:[[:space:]]*"[^"]*"' \
                | grep -o '"[^"]*"$' | tr -d '"')

              /shared/kubectl exec -n vault vault-0 -- env \
                VAULT_ADDR=http://127.0.0.1:8200 \
                VAULT_TOKEN="$ROOT_TOKEN" \
                vault kv put kv/services/milvus/minio \
                  access-key="$MILVUS_ACCESS_KEY" \
                  secret-key="$MILVUS_SECRET_KEY" \
                  bucket="forge-milvus" \
                  endpoint="http://minio.minio.svc.cluster.local:9000"

              echo "[$(date +%H:%M:%S)] Milvus MinIO init complete"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: root-password
          volumeMounts:
            - name: shared
              mountPath: /shared
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: shared
          emptyDir: {}
